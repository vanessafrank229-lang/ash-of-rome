<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash of Rome</title>
  <style>
    :root{
      --bg:#efe7dc;
      --panel:#fff8ef;
      --panel2:rgba(255,248,239,0.94);
      --text:#211c18;
      --muted:#6b6259;
      --line:#d8c7ac;
      --gold:#b08946;
      --choice:#f7eedf;
      --choice-hover:#eedfc7;
      --blood:#7a1e1e;
      --blood2:#4b0e0e;
      --shadow:0 18px 46px rgba(0,0,0,0.14);
    }

    body.theme1{
      --bg:#efe7dc; --panel:#fff8ef; --panel2:rgba(255,248,239,0.94);
      --text:#211c18; --muted:#6b6259; --line:#d8c7ac;
      --choice:#f7eedf; --choice-hover:#eedfc7;
    }
    body.theme2{
      --bg:#e4d8c7; --panel:#f1e5d7; --panel2:rgba(241,229,215,0.94);
      --text:#2a241f; --muted:#62584f; --line:#c3b09a;
      --choice:#e8dbc8; --choice-hover:#dbc6ad;
    }
    body.theme3{
      --bg:#b8ab9d; --panel:#cdc0b2; --panel2:rgba(205,192,178,0.94);
      --text:#28221e; --muted:#514941; --line:#a08d7b;
      --choice:#c4b4a3; --choice-hover:#b39d89;
    }
    body.theme4{
      --bg:#6d6760; --panel:#847b72; --panel2:rgba(132,123,114,0.94);
      --text:#f0ebe4; --muted:#ddd2c9; --line:#5e5650;
      --choice:#776d65; --choice-hover:#665c55;
    }
    body.theme5{
      --bg:#383635; --panel:#4a4543; --panel2:rgba(74,69,67,0.96);
      --text:#f4eee8; --muted:#cec4bb; --line:#34302e;
      --choice:#514947; --choice-hover:#433d3a;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:Georgia, "Times New Roman", serif;
      background:var(--bg);
      color:var(--text);
      transition:background .6s ease,color .4s ease;
    }

    .app{
      max-width:1300px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:.02em;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      max-width:840px;
      line-height:1.55;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .pill{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:999px;
      padding:8px 12px;
      font-size:.92rem;
      color:var(--muted);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      white-space:nowrap;
    }

    .layout{
      display:grid;
      grid-template-columns:1.45fr .9fr;
      gap:18px;
    }

    @media (max-width:1000px){
      .layout{ grid-template-columns:1fr; }
    }

    .card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }

    .scene-wrap{ padding:16px; }

    .scene{
      position:relative;
      width:100%;
      height:720px;
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#d8d1c9;
    }

    @media (max-width:1000px){
      .scene{ height:560px; }
    }

    @media (max-width:640px){
      .scene{ height:430px; }
    }

    .world{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .camera{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    .world-inner{
      position:absolute;
      top:0;
      left:0;
      width:2800px;
      height:100%;
      transform:translateX(0);
      will-change:transform;
    }

    .layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .sky.bright{
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.45) 0 8%, transparent 9%),
        linear-gradient(180deg,#86cbff 0%,#dff3ff 38%,#f3e7d4 100%);
    }
    .sky.warm{
      background:
        radial-gradient(circle at 18% 18%, rgba(255,246,210,.35) 0 8%, transparent 9%),
        linear-gradient(180deg,#d2b886 0%,#ead7ba 40%,#d4c4ae 100%);
    }
    .sky.dirty{
      background:
        radial-gradient(circle at 20% 16%, rgba(186,177,164,.18) 0 7%, transparent 9%),
        linear-gradient(180deg,#8a8377 0%,#9a9181 38%,#756d67 100%);
    }
    .sky.ash{
      background:
        radial-gradient(circle at 20% 16%, rgba(110,108,106,.14) 0 7%, transparent 8%),
        linear-gradient(180deg,#4b4a49 0%,#5a5653 36%,#3b3938 100%);
    }

    .sun{
      position:absolute;
      top:38px;
      left:58px;
      width:92px;
      height:92px;
      border-radius:50%;
      z-index:2;
      box-shadow:0 0 40px rgba(255,255,255,.25);
    }
    .sun.sunny{
      background:radial-gradient(circle at 35% 35%, #fffbe6 0%, #ffe191 40%, #efba4d 80%, rgba(239,186,77,.1) 100%);
    }
    .sun.fade{
      background:radial-gradient(circle at 35% 35%, #ece1bf 0%, #c19c67 42%, #8b6f53 80%, rgba(139,111,83,.12) 100%);
      opacity:.8;
    }
    .sun.hidden{
      background:radial-gradient(circle at 35% 35%, #8e857a 0%, #625c57 48%, #4a4744 80%, rgba(74,71,68,.1) 100%);
      opacity:.35;
      filter:blur(1px);
    }

    .blood-layer, .task-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:8;
    }

    .task{
      position:absolute;
      border:2px dashed rgba(255,255,255,.52);
      background:rgba(255,255,255,.08);
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.84rem;
      color:white;
      text-align:center;
      padding:6px;
      backdrop-filter:blur(3px);
      box-shadow:0 0 18px rgba(255,240,180,.12);
    }

    .task.done{
      border-style:solid;
      border-color:rgba(168,255,168,.7);
      background:rgba(120,180,120,.15);
    }

    .player{
      position:absolute;
      width:180px;
      height:250px;
      left:160px;
      top:300px;
      z-index:20;
      transform-origin:center bottom;
      transition:filter .2s ease;
      will-change:transform,left,top;
    }
    .player.face-left{ transform:scaleX(-1); }
    .player.rolling{ transform:rotate(18deg) scale(.92); }
    .player.face-left.rolling{ transform:scaleX(-1) rotate(18deg) scale(.92); }
    .player svg{
      width:100%;
      height:100%;
      overflow:visible;
      filter:drop-shadow(0 12px 18px rgba(0,0,0,.28));
    }

    .scene-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,.03) 0%, rgba(0,0,0,.06) 42%, rgba(0,0,0,.24) 100%);
      pointer-events:none;
      z-index:25;
    }

    .dialogue{ padding:20px; }
    .scene-title{ margin:0 0 8px 0; font-size:1.52rem; }
    .scene-meta{ margin:0 0 14px; color:var(--muted); line-height:1.5; }
    .story{
      min-height:180px;
      line-height:1.84;
      white-space:pre-line;
      margin-bottom:16px;
      font-size:1.02rem;
    }

    .choices{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      background:var(--choice);
      color:var(--text);
      cursor:pointer;
      font:inherit;
      transition:background .18s ease, transform .12s ease;
    }
    .choice:hover{
      background:var(--choice-hover);
      transform:translateY(-1px);
    }

    .char-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .char-btn{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--choice);
      padding:16px;
      text-align:left;
      cursor:pointer;
      font:inherit;
      color:var(--text);
    }
    .char-btn:hover{ background:var(--choice-hover); }

    .char-btn h3{ margin:0 0 8px; font-size:1.2rem; }
    .char-btn p{ margin:0; color:var(--muted); line-height:1.6; }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .small-btn{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      font:inherit;
    }
    .small-btn:hover{ background:var(--choice); }

    .note{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:var(--muted);
      line-height:1.55;
      font-size:.95rem;
    }

    .memory-list{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .memory{
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.08);
      font-size:.9rem;
    }

    .objective{
      margin-top:8px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:14px;
      color:var(--muted);
      font-size:.94rem;
      line-height:1.5;
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.5;
    }

    .symbol{
      letter-spacing:.08em;
      font-style:italic;
    }

    .drip-anim{
      animation: drip 1.8s infinite ease-in;
      transform-origin: top center;
    }

    @keyframes drip {
      0%{ transform: scaleY(.25); opacity:.55; }
      45%{ transform: scaleY(1); opacity:1; }
      100%{ transform: scaleY(1.18); opacity:.2; }
    }

    .pulse-blood{
      animation: pulseblood 2.2s infinite ease-in-out;
    }

    @keyframes pulseblood{
      0%,100%{ opacity:.72; }
      50%{ opacity:1; }
    }
  </style>
</head>
<body class="theme1">
  <div class="app">
    <div class="top">
      <div>
        <h1>Ash of Rome</h1>
        <div class="sub">A browser-based interactive tragedy inspired by Titus Andronicus. Move left and right, jump, roll, enter task zones, and watch the world decay from ordered brightness into blood and ruin.</div>
      </div>
      <div class="stats">
        <div class="pill" id="actStat">Act —</div>
        <div class="pill" id="charStat">Character —</div>
        <div class="pill" id="violenceStat">Violence 0</div>
        <div class="pill" id="memoryStat">Memories 0/3</div>
        <div class="pill" id="swordStat">Sword Honorable</div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="scene-wrap">
          <div class="scene" id="scene">
            <div class="world">
              <div class="layer sky bright" id="sky"></div>
              <div class="sun sunny" id="sun"></div>
              <div class="camera">
                <div class="world-inner" id="worldInner">
                  <svg class="layer" id="worldSvg" viewBox="0 0 2800 720" preserveAspectRatio="none"></svg>
                  <div class="blood-layer" id="bloodLayer"></div>
                  <div class="task-layer" id="taskLayer"></div>
                  <div class="player" id="player"></div>
                </div>
              </div>
              <div class="scene-overlay"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="dialogue">
          <div id="game"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      node: "intro",
      act: 0,
      character: null,
      violence: 0,
      memories: [],
      sword: "Honorable",
      log: [],
      laviniaSilent: false,
      x: 160,
      y: 0,
      vx: 0,
      vy: 0,
      worldWidth: 2800,
      sceneWidth: 0,
      sceneHeight: 0,
      groundY: 500,
      playerW: 180,
      playerH: 250,
      facing: "right",
      onGround: true,
      rolling: false,
      rollTimer: 0,
      currentTasks: [],
      keys: {},
      movementEnabled: false,
      _lastNode: null
    };

    const memoryNames = {
      honor: "Honor in Rome",
      family: "Family Pride",
      grief: "The Seed of Grief"
    };

    function addMemory(key){
      if(!state.memories.includes(key)) state.memories.push(key);
    }

    function updateTheme(){
      let level = 1;
      if (state.act === 1 && state.violence >= 3) level = 2;
      if (state.act === 2) {
        if (state.violence <= 4) level = 3;
        else if (state.violence <= 8) level = 4;
        else level = 5;
      }
      document.body.className = "theme" + level;
    }

    function updateStats(){
      document.getElementById("actStat").textContent = "Act " + (state.act || "—");
      document.getElementById("charStat").textContent = "Character " + (state.character || "—");
      document.getElementById("violenceStat").textContent = "Violence " + state.violence;
      document.getElementById("memoryStat").textContent = "Memories " + state.memories.length + "/3";
      document.getElementById("swordStat").textContent = "Sword " + state.sword;
    }

    function titusExpression(){
      if (state.act === 0) return "smile";
      if (state.act === 1 && state.violence <= 2) return "smile";
      if (state.act === 1) return "neutral";
      if (state.act === 2 && state.violence <= 6) return "neutral";
      return "grim";
    }

    function titusSVG(expression, darkArmor, stainedSword){
      const mouth = expression === "smile"
        ? `<path d="M118 74 Q128 82 140 78" stroke="#7b4337" stroke-width="3.5" fill="none" stroke-linecap="round"/>`
        : expression === "neutral"
          ? `<line x1="118" y1="78" x2="138" y2="78" stroke="#6e4036" stroke-width="3.4" stroke-linecap="round"/>`
          : `<path d="M118 81 Q128 73 140 77" stroke="#603730" stroke-width="3.5" fill="none" stroke-linecap="round"/>`;

      const brow = expression === "grim"
        ? `<line x1="118" y1="50" x2="132" y2="47" stroke="#5d463a" stroke-width="3" stroke-linecap="round"/>`
        : `<line x1="118" y1="49" x2="132" y2="49" stroke="#5d463a" stroke-width="2.6" stroke-linecap="round"/>`;

      const armorTop = darkArmor ? "#8e8d96" : "#c9ced7";
      const armorMid = darkArmor ? "#6d6e78" : "#aab2bf";
      const armorBot = darkArmor ? "#4b4f56" : "#7d8694";
      const trim = darkArmor ? "#6a4b35" : "#c39a4a";
      const swordBlade = stainedSword ? "#786968" : "#dbe0e7";
      const swordEdge = stainedSword ? "#534447" : "#9aa1ab";

      return `
      <svg viewBox="0 0 180 250" aria-hidden="true">
        <defs>
          <linearGradient id="skinT" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#f1cfaf"/>
            <stop offset="100%" stop-color="#ddb28d"/>
          </linearGradient>
          <linearGradient id="armorT" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${armorTop}"/>
            <stop offset="55%" stop-color="${armorMid}"/>
            <stop offset="100%" stop-color="${armorBot}"/>
          </linearGradient>
          <linearGradient id="clothT" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${armorMid}"/>
            <stop offset="100%" stop-color="${armorBot}"/>
          </linearGradient>
          <linearGradient id="swordT" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#f7fbff"/>
            <stop offset="45%" stop-color="${swordBlade}"/>
            <stop offset="100%" stop-color="${swordEdge}"/>
          </linearGradient>
        </defs>

        <g>
          <path d="M74 28 Q90 6 123 12 Q141 16 152 33 L146 47 Q125 31 95 34 Q79 35 69 42 Z" fill="#6a6b72"/>
          <path d="M67 38 Q58 47 58 68 Q58 94 89 106 Q126 120 153 98 Q168 86 168 64 Q168 46 155 36 Q137 23 113 23 Q84 23 67 38 Z" fill="url(#skinT)"/>
          <path d="M157 67 Q169 72 166 80 Q164 85 156 86 Z" fill="url(#skinT)"/>
          <ellipse cx="144" cy="66" rx="4.2" ry="4.6" fill="#2b1e19"/>
          <path d="M157 71 L168 77 L156 84 Z" fill="rgba(171,110,79,.58)"/>
          ${brow}
          <circle cx="127" cy="67" r="2.2" fill="#2b1e19" opacity=".74"/>
          ${mouth}

          <path d="M66 116 Q83 106 92 104 Q118 97 145 106 Q157 111 167 123 L161 154 Q127 138 96 142 Q81 144 68 154 Z" fill="url(#armorT)" stroke="${trim}" stroke-width="3"/>
          <path d="M79 114 L106 198 L97 199 L68 129 Z" fill="${trim}" opacity=".22"/>
          <path d="M113 104 L122 198 L114 199 L103 106 Z" fill="${trim}" opacity=".18"/>
          <path d="M145 112 L135 199 L143 199 L157 125 Z" fill="${trim}" opacity=".2"/>

          <path d="M67 126 Q50 138 42 168 Q38 186 47 203 L60 199 Q54 177 65 151 Z" fill="url(#clothT)" stroke="${trim}" stroke-width="2"/>
          <path d="M160 132 Q172 142 178 165 Q183 184 175 202 L162 199 Q167 179 160 151 Z" fill="url(#clothT)" stroke="${trim}" stroke-width="2"/>

          <path d="M42 201 Q51 199 57 205 Q60 211 56 217 Q48 221 40 215 Z" fill="url(#skinT)"/>
          <path d="M40 211 l5 1 l0 7 l-5 -1z" fill="#ddb28d"/>
          <path d="M45 211 l4 1 l0 7 l-4 -1z" fill="#ddb28d"/>
          <path d="M49 211 l4 1 l0 7 l-4 -1z" fill="#ddb28d"/>
          <path d="M53 211 l3 1 l0 7 l-3 -1z" fill="#ddb28d"/>

          <path d="M170 198 Q180 199 183 205 Q184 212 178 216 Q169 219 163 213 Z" fill="url(#skinT)"/>
          <path d="M162 210 l5 1 l0 7 l-5 -1z" fill="#ddb28d"/>
          <path d="M167 210 l4 1 l0 7 l-4 -1z" fill="#ddb28d"/>
          <path d="M171 210 l4 1 l0 7 l-4 -1z" fill="#ddb28d"/>
          <path d="M175 210 l3 1 l0 7 l-3 -1z" fill="#ddb28d"/>

          <path d="M77 153 Q108 162 155 151 L161 217 Q120 228 69 218 Z" fill="url(#armorT)" stroke="${trim}" stroke-width="2.8"/>
          <path d="M68 216 Q116 229 162 216 L164 228 Q118 242 66 228 Z" fill="${trim}"/>
          <path d="M85 221 Q98 238 97 250 L78 250 Q78 236 70 221 Z" fill="${darkArmor ? "#50545c" : "#676f7e"}"/>
          <path d="M86 247 Q96 246 103 250 L75 250 Q81 247 86 247 Z" fill="#2f2a28"/>
          <path d="M128 221 Q142 238 143 250 L124 250 Q123 236 115 221 Z" fill="${darkArmor ? "#616772" : "#78808d"}"/>
          <path d="M129 247 Q139 246 147 250 L118 250 Q124 247 129 247 Z" fill="#2f2a28"/>

          <g transform="translate(150,124)">
            <path d="M26 0 L31 0 L31 78 L26 78 Z" fill="url(#swordT)"/>
            ${stainedSword ? `<path d="M28 18 C29 32 31 41 34 61" stroke="rgba(110,25,25,.82)" stroke-width="4.5" stroke-linecap="round"/>` : ``}
            <rect x="20" y="77" width="18" height="5" rx="2" fill="${stainedSword ? "#85593d" : "#c39a4a"}"/>
            <rect x="25" y="82" width="8" height="18" rx="4" fill="${stainedSword ? "#573d2f" : "#7d5640"}"/>
          </g>
        </g>
      </svg>`;
    }

    function laviniaSVG(silent){
      const mouth = silent
        ? `
          <rect x="116" y="76" width="20" height="8" rx="4" fill="url(#sealedM)"/>
          <line x1="121" y1="75" x2="121" y2="85" stroke="#231515" stroke-width="1"/>
          <line x1="130" y1="75" x2="130" y2="85" stroke="#231515" stroke-width="1"/>
        `
        : `<line x1="118" y1="79" x2="133" y2="79" stroke="#8b4c45" stroke-width="3.2" stroke-linecap="round"/>`;

      const leftHand = silent ? `` : `
        <path d="M39 210 Q47 207 53 213 Q56 219 51 224 Q43 227 36 221 Z" fill="url(#skinL)"/>
        <path d="M37 220 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M41 220 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M45 220 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M49 220 l3 1 l0 6 l-3 -1z" fill="#e4baa0"/>`;
      const rightHand = silent ? `` : `
        <path d="M167 205 Q176 204 181 210 Q183 217 177 221 Q169 224 163 218 Z" fill="url(#skinL)"/>
        <path d="M162 217 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M166 217 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M170 217 l4 1 l0 6 l-4 -1z" fill="#e4baa0"/>
        <path d="M174 217 l3 1 l0 6 l-3 -1z" fill="#e4baa0"/>`;

      const woundL = silent ? `<ellipse cx="47" cy="218" rx="7" ry="5.5" fill="url(#woundL)"/>` : ``;
      const woundR = silent ? `<ellipse cx="170" cy="215" rx="7" ry="5.5" fill="url(#woundL)"/>` : ``;

      return `
      <svg viewBox="0 0 180 250" aria-hidden="true">
        <defs>
          <linearGradient id="skinL" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#f3d7c1"/>
            <stop offset="100%" stop-color="#e1b79b"/>
          </linearGradient>
          <linearGradient id="dressL" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="${silent ? "#b89f90" : "#f1dbc7"}"/>
            <stop offset="55%" stop-color="${silent ? "#8b7465" : "#d7b89a"}"/>
            <stop offset="100%" stop-color="${silent ? "#645248" : "#b89074"}"/>
          </linearGradient>
          <linearGradient id="sealedM" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stop-color="#6a4038"/>

    function setTasks(tasks){
      const allDoneHandler = tasks.onAllDone;
      state.currentTasks = tasks.map(t => ({ ...t, done:false }));
      state.currentTasks.onAllDone = allDoneHandler;
      renderTasks();
      state.movementEnabled = true;
    }

    function renderTasks(){
      const layer = document.getElementById("taskLayer");
      if (!state.currentTasks || !state.currentTasks.length) {
        layer.innerHTML = "";
        return;
      }

      layer.innerHTML = state.currentTasks.map(t => `
        <div class="task ${t.done ? "done" : ""}" 
          style="left:${t.x}px;top:${t.y}px;width:${t.w}px;height:${t.h}px;">
          ${t.label}
        </div>
      `).join("");
    }

    function playerRect(){
      return { x: state.x + 34, y: state.y + 18, w: 110, h: 220 };
    }

    function intersects(a,b){
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function checkTasks(){
      if (!state.currentTasks || !state.currentTasks.length) return;

      let changed = false;
      const p = playerRect();

      state.currentTasks.forEach(t => {
        if (t.done) return;
        if (intersects(p, t)) {
          t.done = true;
          changed = true;
          if (typeof t.onComplete === "function") t.onComplete();
        }
      });

      if (changed) {
        renderTasks();
        const remaining = state.currentTasks.filter(t => !t.done);
        if (remaining.length === 0) {
          state.movementEnabled = false;
          if (typeof state.currentTasks.onAllDone === "function") {
            setTimeout(() => state.currentTasks.onAllDone(), 300);
          }
        }
      }
    }

      const node = nodes[state.node];
      const choices = typeof node.choices === "function" ? node.choices() : node.choices;
      const selected = choices[index];
      if (selected.violence) state.violence += selected.violence;
      if (selected.memory) addMemory(selected.memory);
      if (selected.sword) state.sword = selected.sword;
      if (selected.silent === true) state.laviniaSilent = true;
      if (selected.note) state.log.push(selected.note);
      state.node = selected.next;
      render();
    }

          <h2 class="scene-title">Side Quest — Memory Fragment</h2>
          <p class="scene-meta">Collect Titus's past.</p>
          <div class="story">A younger Titus stands before Rome believing honor and identity are the same thing. Virtus rests at his side unstained, ceremonial, almost holy.</div>
          <div class="objective">Objective: Collect the memory fragment.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:1450, y:305, w:170, h:140, label:"Memory", onComplete(){ addMemory("honor"); state.log.push("Memory fragment collected: Honor in Rome."); } }
          ];
          tasks.onAllDone = () => { state.node = "turning_point"; render(); };
          setTasks(tasks);
        }
      },

      explore_palace: {
        render: () => `
          <h2 class="scene-title">Act 1 — Bright Rome</h2>
          <p class="scene-meta">Move Lavinia through the palace and court.</p>
          <div class="story">You are Lavinia. The city is still beautiful enough to trust. Your voice still belongs to you.</div>
          <div class="objective">Objective: Visit the court hall, the family wing, and the terrace.</div>
          <div class="hint">Walk into the glowing boxes.</div>
        `,
        onEnter(){
          state.act = 1;
          state.x = 120;
          const tasks = [
            { x:250, y:330, w:150, h:115, label:"Court Hall", onComplete(){ state.log.push("The court smiles and measures."); } },
            { x:1150, y:430, w:180, h:100, label:"Family Wing", onComplete(){ state.log.push("Family pride still feels protective."); } },
            { x:2050, y:220, w:180, h:130, label:"Terrace", onComplete(){ state.log.push("The world still looks open from a height."); } }
          ];
          tasks.onAllDone = () => { state.node = "lavinia_choice1"; render(); };
          setTasks(tasks);
        }
      },

      lavinia_choice1: {
        title: "Decision — In the Court",
        meta: "Voice still works here.",
        text: `The palace still glows. Your words still have shape and force.`,
        choices: [
          { label:"Speak gently with the court.", next:"forest_explore", violence:0, note:"Gentleness earns approval, but also attention." },
          { label:"Speak boldly for your family.", next:"forest_explore", violence:1, note:"Confidence makes you visible." },
          { label:"Remain careful and observant.", next:"forest_explore", violence:0, note:"Silence delays conflict, but never removes it." }
        ]
      },

      forest_explore: {
        render: () => `
          <h2 class="scene-title">Act 1 — The Forest</h2>
          <p class="scene-meta">The last place that still resembles peace.</p>
          <div class="story">The hunt begins beneath soft sunlight. The forest seems almost painted: green, gold, and harmless.</div>
          <div class="objective">Objective: Explore the path, the grove, and the clearing.</div>
          <div class="hint">Walk into the glowing boxes.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:200, y:425, w:140, h:100, label:"Path", onComplete(){ state.log.push("The path narrows."); } },
            { x:1180, y:330, w:170, h:120, label:"Grove", onComplete(){ state.log.push("Beauty begins to feel theatrical."); } },
            { x:2140, y:430, w:180, h:100, label:"Clearing", onComplete(){ state.log.push("The silence deepens."); } }
          ];
          tasks.onAllDone = () => { state.node = "memory_family"; render(); };
          setTasks(tasks);
        }
      },

      memory_family: {
        render: () => `
          <h2 class="scene-title">Side Quest — Memory Fragment</h2>
          <p class="scene-meta">Collect Titus's past.</p>
          <div class="story">There is warmth in the household. Family pride appears solid, almost architectural, like something made of stone.</div>
          <div class="objective">Objective: Collect the memory fragment.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:1520, y:315, w:180, h:140, label:"Memory", onComplete(){ addMemory("family"); state.log.push("Memory fragment collected: Family Pride."); } }
          ];
          tasks.onAllDone = () => { state.node = "turning_point"; render(); };
          setTasks(tasks);
        }
      },

      turning_point: {
        title: "Turning Point — The Forest Closes",
        meta: "Act 1 gives way to Act 2.",
        text: `The sunlight thins. Colors lose their warmth. For one last moment, the game pretends caution or speed might save you.`,
        choices: [
          { label:"Who is there?", next:"act2_silence", violence:1, note:"No answer comes that language can meet." },
          { label:"Show yourself.", next:"act2_silence", violence:1, note:"The world responds with force, not clarity." },
          { label:"Run.", next:"act2_silence", violence:1, note:"Escape is denied." }
        ]
      },

      act2_silence: {
        render: () => `
          <h2 class="scene-title">Act 2 — Silence</h2>
          <p class="scene-meta">Beauty decays. Speech collapses.</p>
          <div class="story">${state.character === "Lavinia"
            ? `You wake in a changed world. Brown and grey replace ivory and gold. You try to speak. Nothing comes. Your hands are gone.`
            : `Rome no longer looks clean. The walls seem yellowed, cracked, and tired. News reaches Titus and changes the texture of the world.`}</div>
          <div class="objective">Objective: Cross the ruined city and reach the central ruin.</div>
          <div class="hint">Walk into the glowing boxes.</div>
        `,
        onEnter(){
          state.act = 2;
          if (state.character === "Lavinia") state.laviniaSilent = true;
          state.x = 120;
          const tasks = [
            { x:360, y:430, w:160, h:100, label:"Ruin 1", onComplete(){ state.log.push("The old order looks brittle."); } },
            { x:1280, y:320, w:180, h:120, label:"Ruin 2", onComplete(){ state.log.push("Language fails under pain."); } },
            { x:2140, y:250, w:190, h:140, label:"Central Ruin", onComplete(){ state.log.push("Act 2 fully takes hold."); } }
          ];
          tasks.onAllDone = () => { state.node = "act2_choice1"; render(); };
          setTasks(tasks);
        }
      },

      act2_choice1: {
        title: "Decision — First Response",
        meta: "Peaceful language is gone.",
        text: `${state.character === "Lavinia"
          ? `The game still offers options, but now they are broken.`
          : `The first responses are no longer truly peaceful.`}`,
        choices: () => {
          if (state.character === "Lavinia") {
            return [
              { label:"[trace symbols in the dirt]", next:"memory_grief", violence:1, silent:true, note:"They only partly understand you." },
              { label:"[gesture with your body]", next:"memory_grief", violence:1, silent:true, note:"They see pain, not its full meaning." },
              { label:"[stand in stillness]", next:"memory_grief", violence:0, silent:true, note:"Silence communicates suffering, not explanation." }
            ];
          }
          return [
            { label:"Ask what happened.", next:"memory_grief", violence:1, note:"The question is calm. The answer cannot be." },
            { label:"Demand names.", next:"memory_grief", violence:2, note:"You leap from grief toward revenge." },
            { label:"Swear revenge at once.", next:"memory_grief", violence:3, note:"The oath arrives before reason does." }
          ];
        }
      },

      memory_grief: {
        render: () => `
          <h2 class="scene-title">Final Memory Fragment</h2>
          <p class="scene-meta">Understanding does not save anyone.</p>
          <div class="story">Titus remembers not only duty, but wounded pride. The seed of revenge was always there. Grief merely watered it.</div>
          <div class="objective">Objective: Collect the final memory fragment.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:1520, y:315, w:180, h:140, label:"Memory", onComplete(){ addMemory("grief"); state.log.push("Memory fragment collected: The Seed of Grief."); } }
          ];
          tasks.onAllDone = () => { state.node = "blood_tasks"; render(); };
          setTasks(tasks);
        }
      },

      blood_tasks: {
        render: () => `
          <h2 class="scene-title">Act 2 — Blood Demands Blood</h2>
          <p class="scene-meta">Now the world becomes uglier, more stained, and more animal.</p>
          <div class="story">Move through the late-stage violence spaces. Blood now marks the environment. Every task pushes the story deeper into revenge.</div>
          <div class="objective">Objective: Reach the prisoner chamber, the weapon stand, and the vengeance hall.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:300, y:410, w:170, h:110, label:"Prisoner Chamber", onComplete(){ state.violence += 2; state.log.push("An enemy is within reach."); } },
            { x:1320, y:305, w:180, h:125, label:"Weapon Stand", onComplete(){ state.sword = "Stained"; state.log.push("Virtus darkens and no longer looks honorable."); } },
            { x:2170, y:255, w:200, h:145, label:"Vengeance Hall", onComplete(){ state.violence += 2; state.log.push("Cruelty becomes easier to choose."); } }
          ];
          tasks.onAllDone = () => { state.node = "blood_choice"; render(); };
          setTasks(tasks);
        }
      },

      blood_choice: {
        title: "Decision — Blood Demands Blood",
        meta: "No nonviolent option remains.",
        text: `An enemy falls within reach. In another story, mercy might interrupt the cycle. In this one, mercy only changes the texture of the same ruin.`,
        choices: [
          { label:"End it quickly.", next:"feast_tasks", violence:2, sword:"Corrupted", note:"Efficiency does not cleanse cruelty." },
          { label:"Force a confession.", next:"feast_tasks", violence:3, sword:"Corrupted", note:"Pain is made to imitate truth." },
          { label:"Make them suffer.", next:"feast_tasks", violence:4, sword:"Corrupted", note:"Cruelty no longer needs an excuse." }
        ]
      },

      feast_tasks: {
        render: () => `
          <h2 class="scene-title">Act 2 — The Feast</h2>
          <p class="scene-meta">Ceremony becomes one more mask for violence.</p>
          <div class="story">Walk through the feast hall and prepare the final stage of the tragedy.</div>
          <div class="objective">Objective: Reach the table, the candles, and the host position.</div>
        `,
        onEnter(){
          state.x = 120;
          const tasks = [
            { x:430, y:360, w:180, h:115, label:"Table", onComplete(){ state.log.push("Violence is dressed as ritual."); } },
            { x:1290, y:230, w:180, h:130, label:"Candles", onComplete(){ state.log.push("Calm lighting makes the horror colder."); } },
            { x:2180, y:300, w:200, h:130, label:"Host Position", onComplete(){ state.log.push("The last performance is ready."); } }
          ];
          tasks.onAllDone = () => { state.node = "feast_choice"; render(); };
          setTasks(tasks);
        }
      },

      feast_choice: {
        title: "Decision — The Feast",
        meta: "The ugliest form of revenge is the one performed politely.",
        text: `The room pretends to be civilized. The illusion has become grotesque.`,
        choices: [
          { label:"Remain calm.", next:"final_choice", violence:2, note:"Cold control makes the horror sharper." },
          { label:"Taunt them.", next:"final_choice", violence:3, note:"Words become blades before the blade is drawn." },
          { label:"Reveal the truth slowly.", next:"final_choice", violence:4, note:"Delay becomes a form of cruelty." }
        ]
      },

      final_choice: {
        title: "Final Choice — No Choice Left",
        meta: "The final illusion of agency.",
        text: `The game offers one last decision, not because it can save anyone, but because tragedy loves to imitate freedom even as it destroys it.`,
        choices: [
          { label:"Stop.", next:"ending", violence:1, note:"You hesitate. The violence continues anyway." },
          { label:"Finish it.", next:"ending", violence:2, note:"You move without the comfort of illusion." }
        ]
      },

      ending: {
        render: () => `
          <h2 class="scene-title">Ending — Ash</h2>
          <p class="scene-meta">All paths end in tragedy. What changes is only the tone of the descent.</p>
          <div class="story">The sky has turned grey and ugly. The brightness of Act 1 is gone. Pearl white walls have become brown, cracked, and stained with blood.

${getEndingTone()}

${state.character === "Lavinia"
  ? "Lavinia's path makes the loss of agency literal. She begins with voice and ends with visible silence: mouth sealed, hands gone, meaning forced through suffering."
  : "Titus begins as an honorable Roman general. As the game continues, his smile disappears, his sword darkens, and his choices become increasingly violent."}

${state.memories.length === 3
  ? "You collected all three memory fragments. They reveal the tragedy was not a sudden break, but a slow exposure of what was already inside Titus."
  : "You did not collect every memory fragment. The ending remains the same anyway."}

No matter what you chose, revenge consumed honor, violence replaced speech, and human beings descended toward something animal in instinct and ruin.</div>

          <div class="memory-list">
            ${state.memories.length ? state.memories.map(m => `<div class="memory">${memoryNames[m]}</div>`).join("") : `<div class="memory">No memory fragments collected</div>`}
          </div>

          <div class="controls">
            <button class="small-btn" id="restartBtn">Play again</button>
          </div>

          <div class="note">Final violence score: ${state.violence}. Final sword state: ${state.sword}. The ending is fixed by design.</div>
        `
      }
    };

    function renderGamePanel(){
      const game = document.getElementById("game");
      const node = nodes[state.node];

      if (node.onEnter && state._lastNode !== state.node) {
        node.onEnter();
      }

      if (node.render) {
        game.innerHTML = node.render();
      } else {
        const text = typeof node.text === "function" ? node.text() : node.text;
        const choices = typeof node.choices === "function" ? node.choices() : node.choices;
        game.innerHTML = `
          <h2 class="scene-title">${node.title}</h2>
          <p class="scene-meta">${node.meta}</p>
          <div class="story">${text}</div>
          <div class="choices">
            ${choices.map((choice, index) => `
              <button class="choice" data-index="${index}">
                ${state.laviniaSilent && state.character === "Lavinia" && state.act === 2 ? `<span class="symbol">${choice.label}</span>` : choice.label}
              </button>
            `).join("")}
          </div>
          <div class="note">${state.log.length ? state.log[state.log.length - 1] : "Choose a path."}</div>
        `;
      }

      state._lastNode = state.node;
    }

    function updateSceneMetrics(){
      const scene = document.getElementById("scene");
      state.sceneWidth = scene.clientWidth;
      state.sceneHeight = scene.clientHeight;
      state.groundY = state.sceneHeight - 170 - state.playerH + 10;
      document.getElementById("worldInner").style.width = state.worldWidth + "px";
      document.getElementById("worldSvg").setAttribute("viewBox", `0 0 ${state.worldWidth} ${state.sceneHeight}`);
    }

    function updateCamera(){
      const worldInner = document.getElementById("worldInner");
      const target = state.x - state.sceneWidth / 2 + state.playerW / 2;
      const maxCam = state.worldWidth - state.sceneWidth;
      const camX = Math.max(0, Math.min(maxCam, target));
      worldInner.style.transform = `translateX(${-camX}px)`;
    }

    function renderPlayer(){
      const player = document.getElementById("player");
      player.innerHTML = characterSVG();
      player.className = `player ${state.facing === "left" ? "face-left" : ""} ${state.rolling ? "rolling" : ""}`;
      player.style.left = state.x + "px";
      player.style.top = state.y + "px";
    }

    function sceneType(){
      if (["forest_explore","memory_family","turning_point"].includes(state.node)) return "forest";
      if (["act2_silence","memory_grief","blood_tasks"].includes(state.node)) return "ruins";
      if (["feast_tasks"].includes(state.node)) return "feast";
      if (state.node === "ending") return "ash";
      return "rome";
    }

    function sceneMood(){
      if (state.act === 0) return "bright";
      if (state.act === 1 && state.violence < 3) return "bright";
      if (state.act === 1) return "warm";
      if (state.act === 2 && state.violence <= 4) return "dirty";
      return "ash";
    }

    function setSky(){
      const sky = document.getElementById("sky");
      const sun = document.getElementById("sun");
      const mood = sceneMood();
      sky.className = "layer sky " + mood;
      if (mood === "bright") sun.className = "sun sunny";
      else if (mood === "warm") sun.className = "sun fade";
      else sun.className = "sun hidden";
    }

    function renderScene(){
      updateSceneMetrics();
      setSky();
      renderWorldSVG(sceneType(), sceneMood());
      renderPlayer();
      renderTasks();
      renderBlood();
      updateCamera();
    }

    function bindEvents(){
      document.querySelectorAll("[data-character]").forEach(btn => {
        btn.onclick = () => chooseCharacter(btn.getAttribute("data-character"));
      });

      document.querySelectorAll(".choice").forEach(btn => {
        btn.onclick = () => choose(Number(btn.getAttribute("data-index")));
      });

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.onclick = restart;
    }

    function render(){
      renderGamePanel();
      renderScene();
      updateStats();
      updateTheme();
      bindEvents();
    }

    function startRoll(){
      if (!state.onGround || state.rolling || !state.movementEnabled) return;
      state.rolling = true;
      state.rollTimer = 18;
      state.vx = state.facing === "right" ? 11 : -11;
      renderPlayer();
      updateCamera();
    }

    function handleMovementInput(){
      if (!state.movementEnabled) return;

      const left = state.keys["ArrowLeft"] || state.keys["a"] || state.keys["A"];
      const right = state.keys["ArrowRight"] || state.keys["d"] || state.keys["D"];

      if (!state.rolling) {
        if (left && !right) {
          state.vx = -4.8;
          state.facing = "left";
        } else if (right && !left) {
          state.vx = 4.8;
          state.facing = "right";
        } else {
          state.vx *= 0.78;
          if (Math.abs(state.vx) < 0.2) state.vx = 0;
        }
      }

      const jump = state.keys["ArrowUp"] || state.keys["w"] || state.keys["W"] || state.keys[" "];
      if (jump && state.onGround && !state.rolling) {
        state.vy = -12.8;
        state.onGround = false;
      }
    }

    function physicsStep(){
      if (!state.movementEnabled) return;

      handleMovementInput();

      if (state.rolling) {
        state.rollTimer -= 1;
        state.vx *= 0.96;
        if (state.rollTimer <= 0) state.rolling = false;
      }

      state.vy += 0.6;
      state.x += state.vx;
      state.y += state.vy;

      if (state.x < 0) state.x = 0;
      if (state.x > state.worldWidth - state.playerW) state.x = state.worldWidth - state.playerW;

      if (state.y >= state.groundY) {
        state.y = state.groundY;
        state.vy = 0;
        state.onGround = true;
      } else {
        state.onGround = false;
      }

      const player = document.getElementById("player");
      if (player) {
        player.style.left = state.x + "px";
        player.style.top = state.y + "px";
        player.classList.toggle("face-left", state.facing === "left");
        player.classList.toggle("rolling", state.rolling);
      }

      renderBlood();
      updateCamera();
      checkTasks();
    }

    function loop(){
      physicsStep();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => {
      state.keys[e.key] = true;
      if (e.key === "Shift" || e.key === "k" || e.key === "K") startRoll();
    });

    window.addEventListener("keyup", e => {
      state.keys[e.key] = false;
    });

    window.addEventListener("resize", () => {
      renderScene();
    });

    render();
    loop();
  </script>
</body>
</html>
