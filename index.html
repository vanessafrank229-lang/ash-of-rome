<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titus Andronicus — Tragedy of Revenge</title>
  <style>
    :root{
      --world-width: 3200px;
      --sky-top:#9fdcff;
      --sky-bottom:#fff0cf;
      --sun:#ffd567;
      --cloud:#ffffff55;
      --ground-top:#9ccc76;
      --ground-bottom:#69874d;
      --grass:#75ad52;
      --grass-dark:#57803d;
      --stone:#f8f2ec;
      --marble:#fffdf8;
      --roof:#d6a07d;
      --leaf:#76a854;
      --trunk:#7a573d;
      --flower1:#ffd4de;
      --flower2:#fff3a8;
      --flower3:#d7d1ff;

      --panel:rgba(255,255,255,0.92);
      --panel-border:rgba(102,80,70,0.18);
      --text:#241b18;

      --choice1:#ffffff;
      --choice2:#f3e6d7;
      --choice3:#d8beb0;
      --choiceText:#2a1e1a;

      --fade: radial-gradient(circle at center, transparent 35%, rgba(40,24,18,0.08) 100%);
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      font-family: Georgia, "Times New Roman", serif;
      background:#0f0d0c;
    }

    body.ending{
      background:#100908;
    }

    #game{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      color:var(--text);
      background:linear-gradient(var(--sky-top),var(--sky-bottom));
    }

    #worldView{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    #world{
      position:absolute;
      top:0;
      left:0;
      width:var(--world-width);
      height:100%;
    }

    #sky, #sun, #clouds, #far, #backBuildings, #midDecor, #flowers, #grassLayer, #ground, #interactables, #vignette{
      position:absolute;
      inset:0;
    }

    #sky{
      background:linear-gradient(to bottom,var(--sky-top) 0%,var(--sky-bottom) 62%, #dbc7b2 100%);
    }

    #sun{
      position:absolute;
      top:78px;
      left:110px;
      width:120px;
      height:120px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff9db, var(--sun));
      box-shadow:0 0 70px rgba(255,214,103,0.6);
    }

    #clouds::before,#clouds::after{
      content:"";
      position:absolute;
      background:var(--cloud);
      filter:blur(4px);
      border-radius:50%;
    }
    #clouds::before{ top:110px; left:480px; width:260px; height:80px; }
    #clouds::after{ top:150px; right:390px; width:320px; height:90px; }

    #far::before,#far::after{
      content:"";
      position:absolute;
      bottom:210px;
      width:700px;
      border-radius:45% 45% 0 0;
      background:rgba(255,255,255,0.18);
      filter:blur(7px);
    }
    #far::before{left:70px;height:220px}
    #far::after{right:140px;height:150px}

    .building, .pillar, .arch, .villa, .tree, .cypress, .altar, .ruin, .statue, .fountain{
      position:absolute;
      bottom:170px;
    }

    .villa{
      width:320px;
      height:220px;
      background:linear-gradient(to bottom,var(--marble),#ebe2d8);
      border:4px solid rgba(120,94,78,0.16);
      border-radius:18px 18px 6px 6px;
      box-shadow:0 10px 30px rgba(0,0,0,0.06);
    }
    .villa::before{
      content:"";
      position:absolute;
      left:-24px; top:-100px;
      width:368px; height:110px;
      clip-path:polygon(50% 0,100% 100%,0 100%);
      background:var(--roof);
      border-radius:10px;
    }
    .villa::after{
      content:"";
      position:absolute;
      left:130px; bottom:0;
      width:60px; height:108px;
      background:#8d664d;
      border-radius:12px 12px 0 0;
      box-shadow:
        -80px -85px 0 -70px rgba(120,95,80,0.22),
        80px -85px 0 -70px rgba(120,95,80,0.22);
    }

    .building{
      width:250px;
      height:210px;
      background:linear-gradient(to bottom,#fffefc,#ece3da);
      border:4px solid rgba(112,90,78,0.16);
      border-radius:16px 16px 4px 4px;
    }
    .building::before{
      content:"";
      position:absolute;
      inset:20px 18px auto 18px;
      height:64px;
      background:
        linear-gradient(to right, transparent 0 12%, rgba(120,100,88,0.14) 12% 16%, transparent 16% 32%, rgba(120,100,88,0.14) 32% 36%, transparent 36% 52%, rgba(120,100,88,0.14) 52% 56%, transparent 56% 72%, rgba(120,100,88,0.14) 72% 76%, transparent 76% 100%);
    }
    .building::after{
      content:"";
      position:absolute;
      left:-20px; top:-28px;
      width:290px; height:30px;
      border-radius:10px;
      background:linear-gradient(to bottom,#ffffff,#e9dfd4);
    }

    .pillar{
      width:60px;
      height:250px;
      background:linear-gradient(to bottom,#ffffff,var(--stone));
      border:3px solid rgba(117,100,92,0.15);
      border-bottom-width:10px;
      border-radius:10px;
    }
    .pillar::before{
      content:"";
      position:absolute;
      left:-10px; top:-22px;
      width:80px; height:24px;
      border-radius:8px;
      background:linear-gradient(to bottom,#ffffff,#ece2d8);
    }

    .arch{
      width:240px;
      height:220px;
      background:linear-gradient(to bottom,#fffefb,#e9ddd2);
      border:4px solid rgba(112,90,78,0.16);
      border-radius:20px 20px 6px 6px;
      overflow:hidden;
    }
    .arch::before{
      content:"";
      position:absolute;
      left:55px;
      bottom:0;
      width:130px;
      height:150px;
      background:#d8cabd;
      border-radius:80px 80px 0 0;
      box-shadow: inset 0 0 0 10px rgba(255,255,255,0.55);
    }

    .fountain{
      width:180px;
      height:120px;
      background:linear-gradient(to bottom,#efe7df,#d8cabd);
      border-radius:14px;
      border:4px solid rgba(100,80,70,0.16);
    }
    .fountain::before{
      content:"";
      position:absolute;
      left:70px; top:-38px;
      width:40px; height:40px;
      border-radius:50%;
      background:#f5f2ee;
      border:4px solid rgba(100,80,70,0.12);
    }
    .fountain::after{
      content:"";
      position:absolute;
      left:86px; top:-6px;
      width:8px; height:44px;
      border-radius:10px;
      background:linear-gradient(to bottom,#c8ebff,#89d0ff);
      box-shadow:0 0 14px rgba(137,208,255,0.45);
    }

    .statue{
      width:70px;
      height:180px;
      background:linear-gradient(to bottom,#f7f2ec,#d7ccc2);
      border-radius:18px 18px 8px 8px;
      border:3px solid rgba(110,92,80,0.14);
    }
    .statue::before{
      content:"";
      position:absolute;
      left:14px; top:-24px;
      width:36px; height:36px;
      border-radius:50%;
      background:#f0e7dd;
      border:3px solid rgba(110,92,80,0.12);
    }

    .tree{
      width:44px;
      height:180px;
      background:var(--trunk);
      border-radius:12px;
    }
    .tree::before{
      content:"";
      position:absolute;
      left:-56px; top:-96px;
      width:156px; height:116px;
      background:radial-gradient(circle at 50% 55%, #98d26d 0%, var(--leaf) 60%, transparent 68%);
    }

    .cypress{
      width:36px;
      height:210px;
      background:linear-gradient(to bottom,#517538,#2f4a22);
      border-radius:18px 18px 12px 12px;
    }
    .cypress::before{
      content:"";
      position:absolute;
      left:8px; top:-30px;
      width:20px; height:40px;
      border-radius:12px;
      background:#4f7338;
    }

    .altar{
      width:180px; height:130px;
      background:linear-gradient(to bottom,#f7f2ee,#d9ccc0);
      border-radius:14px;
      border:4px solid rgba(98,83,77,0.2);
    }

    .ruin{
      width:250px;
      height:230px;
      background:linear-gradient(to bottom,#d2c6bc,#90857d);
      border:5px solid rgba(65,54,49,0.28);
      border-radius:16px 16px 4px 4px;
      overflow:hidden;
    }
    .ruin::before, .ruin::after{
      content:"";
      position:absolute;
      background:rgba(50,40,35,0.26);
    }
    .ruin::before{left:24px; top:42px; width:34px; height:100px}
    .ruin::after{right:28px; top:20px; width:90px; height:40px}

    #flowers, #grassLayer{
      pointer-events:none;
    }

    .flowerPatch{
      position:absolute;
      bottom:162px;
      width:180px;
      height:40px;
      opacity:0.95;
      background:
        radial-gradient(circle at 12% 72%, var(--flower1) 0 5px, transparent 6px),
        radial-gradient(circle at 18% 52%, #6c9b46 0 2px, transparent 3px),
        radial-gradient(circle at 28% 68%, var(--flower2) 0 5px, transparent 6px),
        radial-gradient(circle at 38% 54%, #6c9b46 0 2px, transparent 3px),
        radial-gradient(circle at 46% 70%, var(--flower3) 0 5px, transparent 6px),
        radial-gradient(circle at 56% 56%, #6c9b46 0 2px, transparent 3px),
        radial-gradient(circle at 68% 74%, var(--flower1) 0 5px, transparent 6px),
        radial-gradient(circle at 78% 58%, #6c9b46 0 2px, transparent 3px),
        radial-gradient(circle at 86% 70%, var(--flower2) 0 5px, transparent 6px);
    }

    .grassPatch{
      position:absolute;
      bottom:160px;
      width:220px;
      height:34px;
      opacity:0.95;
      background:
        linear-gradient(70deg, transparent 0 6%, var(--grass) 6% 8%, transparent 8% 12%, var(--grass-dark) 12% 14%, transparent 14% 19%, var(--grass) 19% 21%, transparent 21% 26%, var(--grass-dark) 26% 28%, transparent 28% 33%, var(--grass) 33% 35%, transparent 35% 40%, var(--grass-dark) 40% 42%, transparent 42% 47%, var(--grass) 47% 49%, transparent 49% 54%, var(--grass-dark) 54% 56%, transparent 56% 61%, var(--grass) 61% 63%, transparent 63% 68%, var(--grass-dark) 68% 70%, transparent 70% 75%, var(--grass) 75% 77%, transparent 77% 82%, var(--grass-dark) 82% 84%, transparent 84% 100%);
      filter:drop-shadow(0 1px 0 rgba(0,0,0,0.06));
    }

    #ground{
      top:auto;
      height:180px;
      bottom:0;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.14), transparent 30%),
        linear-gradient(to bottom,var(--ground-top),var(--ground-bottom));
      border-top:6px solid rgba(255,255,255,0.17);
    }
    #ground::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle at 10% 32%, rgba(255,255,255,0.08) 0 3px, transparent 4px),
        radial-gradient(circle at 55% 60%, rgba(0,0,0,0.08) 0 2px, transparent 4px),
        radial-gradient(circle at 82% 20%, rgba(0,0,0,0.08) 0 3px, transparent 5px);
      background-size:170px 90px;
    }

    /* Player */
    #player{
      position:absolute;
      left:200px;
      bottom:142px;
      width:120px;
      height:210px;
      z-index:20;
      transition:filter .35s ease;
    }
    .shadow{
      position:absolute;
      left:20px; bottom:-2px;
      width:76px; height:14px;
      border-radius:50%;
      background:rgba(0,0,0,0.25);
      filter:blur(2px);
    }
    .sprite{position:absolute; inset:0;}

    .cape{
      position:absolute;
      left:14px; top:54px;
      width:30px; height:92px;
      border-radius:16px;
      background:linear-gradient(to bottom,#8c2f2f,#4b1717);
      z-index:0;
      opacity:0.8;
    }

    .head{
      position:absolute;
      left:34px; top:0;
      width:54px; height:58px;
      z-index:3;
    }
    .face{
      position:absolute;
      left:4px; right:4px; top:7px; bottom:0;
      background:#efceb9;
      border-radius:48% 48% 42% 42%;
      border:2px solid rgba(82,53,36,0.22);
      overflow:visible;
    }
    .hair{
      position:absolute;
      left:2px; top:0;
      width:50px; height:24px;
      border-radius:50% 50% 14px 14px;
    }
    .eye{
      position:absolute;
      top:14px;
      width:6px; height:6px;
      border-radius:50%;
      background:#241919;
    }
    .eye.left{left:11px}
    .eye.right{right:11px}
    .brow{
      position:absolute;
      top:10px;
      width:10px;
      height:3px;
      background:#553b2d;
      border-radius:4px;
    }
    .brow.left{left:8px}
    .brow.right{right:8px}
    .mouth{
      position:absolute;
      left:13px; bottom:9px;
      width:16px; height:8px;
      border-bottom:3px solid #7f3d3d;
      border-radius:0 0 10px 10px;
    }

    .torso{
      position:absolute;
      left:30px; top:50px;
      width:50px; height:68px;
      border-radius:12px;
      border:2px solid rgba(47,58,73,0.23);
      z-index:2;
    }

    .skirt{
      position:absolute;
      left:26px; top:112px;
      width:58px; height:26px;
      border-radius:0 0 16px 16px;
      z-index:2;
    }

    .arm, .leg, .hand{
      position:absolute;
      border-radius:12px;
      z-index:2;
    }
    .arm{width:15px; height:56px; top:56px;}
    .arm.left{left:14px}
    .arm.right{right:14px}
    .hand{width:13px; height:13px; top:108px}
    .hand.left{left:15px}
    .hand.right{right:15px}
    .leg{width:18px; height:72px; top:132px;}
    .leg.left{left:30px}
    .leg.right{right:30px}

    .sword{
      position:absolute;
      left:88px; top:44px;
      width:10px; height:110px;
      background:linear-gradient(to bottom,#f5f5f5,#b7c6d0 52%, #88766d);
      border-radius:8px;
      transform:rotate(10deg);
      box-shadow:0 0 8px rgba(255,255,255,0.35);
      z-index:1;
    }
    .sword::before{
      content:"";
      position:absolute;
      left:-11px; top:12px;
      width:32px; height:8px;
      border-radius:8px;
      background:#b78f49;
    }

    /* Titus */
    #player.titus .hair{
      background:linear-gradient(to bottom,#9da0a6,#6f7378);
    }
    #player.titus .torso{
      background:linear-gradient(to bottom,#dde3ea,#98a5b2);
    }
    #player.titus .torso::before{
      content:"";
      position:absolute;
      left:14px; top:0;
      width:20px; height:68px;
      background:linear-gradient(to bottom,#d9b46c,#9d7c3d);
      opacity:0.85;
    }
    #player.titus .skirt{
      background:
        linear-gradient(to right, transparent 0 8%, #d9b46c 8% 16%, transparent 16% 24%, #d9b46c 24% 32%, transparent 32% 40%, #d9b46c 40% 48%, transparent 48% 56%, #d9b46c 56% 64%, transparent 64% 72%, #d9b46c 72% 80%, transparent 80% 100%);
    }
    #player.titus .arm{ background:#ccb2a0; }
    #player.titus .hand{ background:#efceb9; }
    #player.titus .leg{ background:#67606b; }
    #player.titus .cape{ display:block; }

    /* Lavinia */
    #player.lavinia .hair{
      background:linear-gradient(to bottom,#6a4039,#4d2b26);
      height:28px;
    }
    #player.lavinia .torso{
      background:linear-gradient(to bottom,#f3dbe5,#bc8aa0);
      border-color:rgba(94,56,72,0.18);
    }
    #player.lavinia .torso::before{
      content:"";
      position:absolute;
      left:18px; top:8px;
      width:14px; height:14px;
      border-radius:50%;
      background:rgba(255,255,255,0.55);
      box-shadow:
        -10px 18px 0 rgba(255,255,255,0.35),
        10px 18px 0 rgba(255,255,255,0.35);
    }
    #player.lavinia .skirt{
      background:linear-gradient(to bottom,#d9a8bc,#936677);
      height:38px;
      top:108px;
      border-radius:0 0 22px 22px;
    }
    #player.lavinia .arm{ background:#efceb9; }
    #player.lavinia .hand{ background:#efceb9; }
    #player.lavinia .leg{ background:#7b6072; }
    #player.lavinia .sword{ display:none; }
    #player.lavinia .cape{ display:none; }
    #player.lavinia .head::after{
      content:"";
      position:absolute;
      left:2px; top:10px;
      width:50px; height:40px;
      border-radius:50% 50% 44% 44%;
      border:2px solid rgba(86,52,42,0.08);
    }

    /* Front / side */
    #player.front .arm.left{left:12px}
    #player.front .arm.right{right:12px}
    #player.side .head{left:36px}
    #player.side .face{border-radius:54% 44% 40% 52%}
    #player.side.left .sprite{transform:scaleX(-1); transform-origin:center;}

    #player.jump{filter:brightness(1.08)}
    #player.roll .sprite{
      transform:rotate(74deg) translateY(24px);
      transform-origin:center bottom;
    }
    #player.roll.left .sprite{
      transform:scaleX(-1) rotate(74deg) translateY(24px);
    }

    /* Walking animation */
    #player.walk .leg.left{animation:legA .35s infinite alternate ease-in-out}
    #player.walk .leg.right{animation:legB .35s infinite alternate ease-in-out}
    #player.walk .arm.left{animation:armA .35s infinite alternate ease-in-out}
    #player.walk .arm.right{animation:armB .35s infinite alternate ease-in-out}

    @keyframes legA { from{transform:rotate(8deg)} to{transform:rotate(-10deg)} }
    @keyframes legB { from{transform:rotate(-10deg)} to{transform:rotate(8deg)} }
    @keyframes armA { from{transform:rotate(-10deg)} to{transform:rotate(12deg)} }
    @keyframes armB { from{transform:rotate(12deg)} to{transform:rotate(-10deg)} }

    /* Titus decline */
    #player.titus.frown1 .mouth{
      width:12px; left:14px; border-bottom-width:2px;
    }
    #player.titus.frown2 .mouth{
      width:15px; left:12px; bottom:13px; height:6px;
      border-bottom:none; border-top:3px solid #6a2c2c; border-radius:10px 10px 0 0;
    }
    #player.titus.frown3 .mouth{
      width:18px; left:10px; bottom:11px; height:6px;
      border-bottom:none; border-top:4px solid #491d1d; border-radius:10px 10px 0 0;
    }
    #player.titus.frown2 .torso{
      filter:saturate(0.9) brightness(0.95);
    }
    #player.titus.frown3{
      filter:saturate(0.84) brightness(0.88);
    }
    #player.titus.frown3 .sword{
      filter:saturate(0.52) brightness(0.7);
      box-shadow:none;
    }
    #player.titus.frown3 .torso{
      background:linear-gradient(to bottom,#b6aca5,#726962);
    }

    /* Lavinia change */
    #player.lavinia.silent .mouth{
      width:22px;
      height:16px;
      left:10px;
      border-bottom:none;
      background:#d8a8a8;
      border-radius:8px;
      box-shadow:inset 0 0 0 2px rgba(118,62,62,0.12);
    }
    #player.lavinia.maimed .mouth{
      width:24px;
      height:20px;
      left:9px;
      background:linear-gradient(to bottom,#8d3d3d,#a44f4f);
      border-radius:0 0 12px 12px;
      box-shadow:inset 0 0 0 4px rgba(50,0,0,0.18);
      border-bottom:none;
    }
    #player.lavinia.maimed .hand{
      display:none;
    }
    #player.lavinia.maimed .arm{
      height:38px;
      top:60px;
      border-radius:10px 10px 18px 18px;
      background:linear-gradient(to bottom,#ddb2b2,#a55b5b);
    }
    #player.lavinia.maimed{
      filter:saturate(0.82) brightness(0.9);
    }
    #player.lavinia.maimed .torso{
      background:
        radial-gradient(circle at 20% 30%, rgba(150,32,32,0.65) 0 8px, transparent 9px),
        radial-gradient(circle at 70% 46%, rgba(150,32,32,0.55) 0 7px, transparent 8px),
        radial-gradient(circle at 52% 70%, rgba(130,28,28,0.5) 0 6px, transparent 7px),
        linear-gradient(to bottom,#ceb2ba,#946675);
    }
    #player.lavinia.maimed .skirt{
      background:
        radial-gradient(circle at 30% 24%, rgba(130,20,20,0.45) 0 7px, transparent 8px),
        radial-gradient(circle at 70% 46%, rgba(120,22,22,0.35) 0 6px, transparent 7px),
        linear-gradient(to bottom,#bc879a,#7c5260);
    }

    /* Markers */
    .marker{
      position:absolute;
      bottom:178px;
      width:64px; height:100px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      cursor:pointer;
      z-index:25;
    }
    .marker::before{
      content:"";
      position:absolute;
      width:30px; height:30px;
      border-radius:50%;
      box-shadow:0 0 24px rgba(255,255,255,0.85);
      animation:pulse 1.6s infinite ease-in-out;
    }
    .marker.story::before{background:rgba(230,245,255,0.84)}
    .marker.memory::before{background:rgba(255,234,170,0.9)}
    .marker.end::before{background:rgba(161,58,58,0.92)}
    .marker::after{
      content:attr(data-label);
      position:absolute;
      bottom:48px;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(38,29,24,0.75);
      color:#fff7ef;
      font-size:13px;
      white-space:nowrap;
      letter-spacing:.03em;
    }
    @keyframes pulse{
      0%,100%{transform:translateY(0) scale(1); opacity:.9}
      50%{transform:translateY(-8px) scale(1.08); opacity:1}
    }

    /* HUD */
    #hud{
      position:absolute;
      inset:0 0 auto 0;
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      padding:14px 18px;
      z-index:40;
      pointer-events:none;
    }
    .logo{
      font-size:24px;
      font-weight:700;
      letter-spacing:.02em;
      text-shadow:0 2px 8px rgba(255,255,255,0.25);
    }
    #actLabel, #roleLabel, #memoryLabel{

    #vignette{

      inset:0;

    .startCard{

      border-radius:28px;
      text-align:center;
      background:rgba(255,255,255,0.82);

      border-radius:999px;

        steps: [
          { speaker:'', portrait:'none', text:'Will you go on?', choices:[
            { text:'Go on.', tone:'hard', effect:() => nextLevel() }
          ]}
        ]
      },

      s5: {
        steps: [
          { speaker: roleName, portrait: rolePortrait, text: roleText(
            "Rome is only stone now.",
            "There is no bright place left."
          )},
          { speaker:'', portrait:'none', text:'What do you choose?', choices:[
            choice('Seek justice.', 'mild', 'Justice', () => autoAdvance(() => funnel(2,'endingChoice', "Justice arrives stained."))),
            choice('Seek revenge.', 'hard', 'Revenge', () => autoAdvance(() => funnel(3,'endingChoice', "Revenge calls itself balance."))),
            choice('Seek slaughter.', 'brutal', 'Slaughter', () => autoAdvance(() => funnel(4,'endingChoice', "Slaughter is the most honest word left.")))
          ]}
        ]
      },

      c5: {
        steps: [
          { speaker:'', portrait:'none', text:'How will you end it?', choices:[
            choice('End it.', 'mild', '', () => autoAdvance(() => openScene('endingChoice'))),
            choice('End it.', 'hard', '', () => autoAdvance(() => openScene('endingChoice'))),
            choice('End it.', 'brutal', '', () => autoAdvance(() => openScene('endingChoice')))
          ]}
        ]
      },

      endingChoice: {
        steps: [
          {
            speaker:'',
            portrait:'none',
            text:'How will you end it?',
            choices:[
              { text:'End it.', tone:'mild', effect:() => autoAdvance(() => openScene('reveal')) },
              { text:'End it.', tone:'hard', effect:() => autoAdvance(() => openScene('reveal')) },
              { text:'End it.', tone:'brutal', effect:() => autoAdvance(() => openScene('reveal')) }
            ]
          }
        ]
      },

      reveal: {
        steps: [
          {
            speaker:'Chorus',
            portrait:'none',
            text: `It would not have mattered.

Every road was already bending here.
You were offered choices in posture, not escape.
Revenge does not heal injury.
It trains the wounded to resemble what wounded them.`
          },
          {
            speaker:'Chorus',
            portrait:'none',
            text: roleText(
              `Titus entered as a Roman general, stern and honourable, with grey hair, a clean sword, and the shape of discipline.
He leaves with his smile gone, his honour hollowed out, and his blade reduced to shame.`,
              `Lavinia entered bright, feminine, graceful, and whole.
She leaves turned into a sign of violence, her beauty made tragic by what revenge could not undo.`
            )
          },
          {
            speaker:'Chorus',
            portrait:'none',
            text: `Memories gathered: ${state.memory} / 3

No matter what was chosen,
the fact remained the same:
revenge drives everyone toward tragedy.`
          },
          {
            speaker:'',
            portrait:'none',
            text:'Will you end it?',
            choices:[
              { text:'End.', tone:'brutal', effect:() => endGame() }
            ]
          }
        ]
      }
    };

    function roleName() {
      return state.role === 'lavinia' ? 'Lavinia' : 'Titus';
    }
    function rolePortrait() {
      return state.role;
    }
    function roleText(titusText, laviniaText) {
      return state.role === 'lavinia' ? laviniaText : titusText;
    }
    function roleSpecific(titusChoice, laviniaChoice) {
      return state.role === 'lavinia' ? laviniaChoice : titusChoice;
    }
    function choice(text, tone, tag, effect) {
      return { text, tone, tag, effect };
    }

    function chooseRole(role){
      state.role = role;
      roleLabel.textContent = `Role: ${role === 'titus' ? 'Titus' : 'Lavinia'}`;
      player.className = `front ${role}`;
      updateCharacterVisuals();
      closeScene();
    }

    function renderLevel(index){
      state.level = index;
      const level = levels[index];
      actLabel.textContent = level.title;
      game.classList.toggle('phase2', level.phase === 2);
      renderScenery(level.scenery);
      renderFlowers(level.flowerPatches);
      renderGrass(level.grassPatches);
      renderMarkers(level.markers);
      state.player.x = 120;
      state.player.y = 0;
      state.player.vy = 0;
      state.lockMovement = true;
      updateCharacterVisuals();
      updateCamera();
    }

    function renderScenery(items){
      backBuildings.innerHTML = '';
      midDecor.innerHTML = '';
      items.forEach(item => {
        const el = document.createElement('div');
        el.className = item.type;
        el.style.left = item.x + 'px';
        if(item.layer === 'back') backBuildings.appendChild(el);
        else midDecor.appendChild(el);
      });
    }

    function renderFlowers(list){
      flowers.innerHTML = '';
      list.forEach(x => {
        const el = document.createElement('div');
        el.className = 'flowerPatch';
        el.style.left = x + 'px';
        flowers.appendChild(el);
      });
    }

    function renderGrass(list){
      grassLayer.innerHTML = '';
      list.forEach(x => {
        const el = document.createElement('div');
        el.className = 'grassPatch';
        el.style.left = x + 'px';
        grassLayer.appendChild(el);
      });
    }

    function renderMarkers(markers){
      interactables.innerHTML = '';
      markers.forEach(marker => {
        if(state.usedMarkers[marker.id]) return;
        const el = document.createElement('div');
        el.className = `marker ${marker.type}`;
        el.dataset.id = marker.id;
        el.dataset.scene = marker.scene;
        el.dataset.label = marker.label;
        el.style.left = marker.x + 'px';
        interactables.appendChild(el);
      });
    }

    function openScene(name){
      state.currentScene = scenes[name];
      state.sceneName = name;
      state.step = 0;
      state.lockMovement = true;
      overlay.classList.add('visible');
      showStep();
    }

    function closeScene(){
      state.currentScene = null;
      state.sceneName = null;
      state.step = 0;
      overlay.classList.remove('visible');
      state.lockMovement = false;
    }

    function resolve(v){
      return typeof v === 'function' ? v() : v;
    }

    function showStep(){
      const scene = state.currentScene;
      if(!scene) return;
      const step = scene.steps[state.step];
      if(!step){
        closeScene();
        return;
      }

      const speaker = resolve(step.speaker);
      const text = resolve(step.text);
      const portrait = resolve(step.portrait);

      speakerEl.textContent = speaker || ' ';
      textEl.textContent = text || ' ';
      updatePortraits(portrait);
      choicesEl.innerHTML = '';

      if(step.choices){
        step.choices.forEach(c => {
          const btn = document.createElement('button');
          btn.className = `btn ${c.tone || 'mild'}`;
          const ct = typeof c.text === 'function' ? c.text() : c.text;
          const tag = c.tag ? `<span class="tag">${c.tag}</span>` : '';
          btn.innerHTML = `${tag}${ct}`;
          btn.onclick = c.effect;
          choicesEl.appendChild(btn);
        });
      } else {
        const btn = document.createElement('button');
        btn.className = 'btn mild';
        btn.textContent = 'Continue';
        btn.onclick = () => {
          state.step += 1;
          showStep();
        };
        choicesEl.appendChild(btn);
      }
    }

    function updatePortraits(active = null){
      portraitTitus.className = 'portrait titus';
      portraitLavinia.className = 'portrait lavinia';

      if(state.role === 'lavinia' && player.classList.contains('silent')){
        portraitLavinia.classList.add('silent');
      }
      if(state.role === 'lavinia' && player.classList.contains('maimed')){
        portraitLavinia.classList.add('maimed');
      }

      if(active === 'titus') portraitTitus.classList.add('active');
      else if(active === 'lavinia') portraitLavinia.classList.add('active');
    }

    function takeMemory(id){
      if(!state.memorySeen[id]){
        state.memorySeen[id] = true;
        state.memory += 1;
        memoryLabel.textContent = `Memories: ${state.memory} / 3`;
      }
      state.usedMarkers[id] = true;
      renderMarkers(levels[state.level].markers);
      closeScene();
    }

    function funnel(amount, nextScene, summary){
      state.violence += amount;
      updateCharacterVisuals();
      openAutoMessage(summary, () => openScene(nextScene));
    }

    function brutalShift(amount, nextScene, laviniaStage, titusStage, summary){
      state.violence += amount;

      if(state.role === 'lavinia'){
        player.classList.remove('silent','maimed');
        player.classList.add(laviniaStage);
      }
      if(state.role === 'titus'){
        player.classList.remove('frown1','frown2','frown3');
        player.classList.add(titusStage);
      }

      updateCharacterVisuals();
      openAutoMessage(summary, () => openScene(nextScene));
    }

    function openAutoMessage(text, nextFn){
      overlay.classList.add('visible');
      state.lockMovement = true;
      speakerEl.textContent = '';
      textEl.textContent = text;
      choicesEl.innerHTML = '';
      updatePortraits('none');

      setTimeout(() => {
        if(nextFn) nextFn();
      }, 900);
    }

    function autoAdvance(fn){
      choicesEl.innerHTML = '';
      fn();
    }

    function updateCharacterVisuals(){
      if(!state.role) return;

      player.classList.remove('titus','lavinia','frown1','frown2','frown3');
      player.classList.add(state.role);

      if(state.role === 'titus'){
        if(state.violence >= 10) player.classList.add('frown3');
        else if(state.violence >= 6) player.classList.add('frown2');
        else if(state.violence >= 3) player.classList.add('frown1');
      }

      if(state.role === 'lavinia'){
        if(levels[state.level].phase === 2 && !player.classList.contains('maimed')){
          player.classList.add('silent');
        }
      }

      updatePortraits();
    }

    function nextLevel(){
      const next = state.level + 1;
      if(next < levels.length){
        renderLevel(next);
        closeScene();
      }
    }

    function endGame(){
      document.body.classList.add('ending');
      state.lockMovement = true;
      choicesEl.innerHTML = '';
    }

    function tryInteract(){
      const markers = [...document.querySelectorAll('.marker')];
      const marker = markers.find(m => {
        const x = parseFloat(m.style.left);
        return Math.abs((x + 20) - state.player.x) < 80;
      });
      if(!marker) return;
      triggerMarker(marker);
    }

    function triggerMarker(marker){
      const id = marker.dataset.id;
      const scene = marker.dataset.scene;

      if(!id.startsWith('m')){
        state.usedMarkers[id] = true;
        renderMarkers(levels[state.level].markers);
      }

      openScene(scene);
    }

    function startRoll(){
      if(state.player.jumping || state.player.rolling) return;
      state.player.rolling = true;
      state.player.rollTimer = 18;
    }

    function updatePlayer(){
      if(!state.lockMovement){
        let moving = false;

        if(keys['a'] || keys['arrowleft']){
          state.player.x -= state.player.speed + (state.player.rolling ? 3.4 : 0);
          state.player.facing = 'left';
          moving = true;
        }
        if(keys['d'] || keys['arrowright']){
          state.player.x += state.player.speed + (state.player.rolling ? 3.4 : 0);
          state.player.facing = 'right';
          moving = true;
        }

        if((keys['w'] || keys['arrowup'] || keys[' ']) && !state.player.jumping){
          state.player.vy = 14;
          state.player.jumping = true;
        }

        if(state.player.rolling){
          state.player.rollTimer -= 1;
          if(state.player.rollTimer <= 0) state.player.rolling = false;
        }

        state.player.x = Math.max(20, Math.min(WORLD_WIDTH - 130, state.player.x));
        state.player.y += state.player.vy;
        state.player.vy -= 0.8;

        if(state.player.y <= 0){
          state.player.y = 0;
          state.player.vy = 0;
          state.player.jumping = false;
        }

        updatePose(moving);
      }

      player.style.left = state.player.x + 'px';
      player.style.bottom = (GROUND_Y + state.player.y) + 'px';
    }

    function updatePose(moving){
      player.classList.remove('front','side','left','right','jump','roll','walk');
      player.classList.add(state.role || 'titus');

      if(state.player.rolling){
        player.classList.add('roll', state.player.facing);
      } else if(state.player.jumping){
        player.classList.add('side', state.player.facing, 'jump');
      } else if(moving){
        player.classList.add('side', state.player.facing, 'walk');
      } else {
        player.classList.add('front');
      }

      if(state.role === 'lavinia'){
        if(levels[state.level].phase === 2 && !player.classList.contains('maimed')){
          player.classList.add('silent');
        }
      }
    }

    function updateCamera(){
      const vw = window.innerWidth;
      const cx = Math.max(0, Math.min(WORLD_WIDTH - vw, state.player.x - vw / 2));
      world.style.transform = `translateX(${-cx}px)`;
    }

    function loop(){
      updatePlayer();
      updateCamera();
      requestAnimationFrame(loop);
    }

    function bind(){
      window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        keys[k] = true;
        if(['arrowup','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

        if((k === 'e' || e.key === 'Enter') && !state.lockMovement) tryInteract();
        if((k === 'r' || e.key === 'Shift') && !state.lockMovement) startRoll();
      });

      window.addEventListener('keyup', e => {
        keys[e.key.toLowerCase()] = false;
      });

      interactables.addEventListener('click', e => {
        const marker = e.target.closest('.marker');
        if(!marker || state.lockMovement) return;
        triggerMarker(marker);
      });

      startBtn.addEventListener('click', () => {
        startScreen.classList.add('hidden');
        openScene('chooseRole');
      });

      window.addEventListener('resize', updateCamera);
    }

    function init(){
      bind();
      renderLevel(0);
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
