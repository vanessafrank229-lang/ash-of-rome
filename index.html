<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titus Andronicus — Revenge and Tragedy</title>
  <style>
    :root{
      --world-width: 3600px;
      --sky-top:#a9dcff;
      --sky-mid:#d8f0ff;
      --sky-bottom:#fff0d8;
      --sun:#ffd76c;
      --marble:#fffdf9;
      --marble2:#ede4da;
      --roof:#d6a07d;
      --stone-shadow:#c9bcb1;
      --leaf:#7aab58;
      --leaf-dark:#5f8445;
      --trunk:#75553d;
      --ground-top:#9ecc77;
      --ground-bottom:#6f8d53;
      --grass:#74ab51;
      --grass-dark:#557d3d;
      --flower1:#ffd6e0;
      --flower2:#fff2a0;
      --flower3:#d9d1ff;
      --ui-bg:rgba(255,255,255,0.92);
      --ui-border:rgba(110,88,75,0.2);
      --text:#221917;
      --choice1:#ffffff;
      --choice2:#f2e3d4;
      --choice3:#dcc2b0;
      --choice-text:#2a1e1a;
      --blood:#d9001b;
      --blood-dark:#8c0012;
      --vignette: radial-gradient(circle at center, transparent 35%, rgba(32,20,15,0.08) 100%);
      --progress: 0;
    }

    *{ box-sizing:border-box; }
    html, body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:#0d0b0a;
      font-family: Georgia, "Times New Roman", serif;
    }

    #game{
      position:relative;
      width:100vw;
      height:100vh;
      overflow:hidden;
      color:var(--text);
      background:linear-gradient(var(--sky-top), var(--sky-bottom));
    }

    #worldView{
      position:absolute;
      inset:0;
      overflow:hidden;
    }

    #world{
      position:absolute;
      inset:0 auto 0 0;
      width:var(--world-width);
      height:100%;
      transform:translateX(0);
    }

    #sky, #sun, #clouds, #mountains, #farRome, #midRome, #flowers, #grassLayer, #ground, #interactables, #vignette, #transition{
      position:absolute;
      inset:0;
    }

    #sky{
      background:
        linear-gradient(to bottom,
          var(--sky-top) 0%,
          var(--sky-mid) 35%,
          var(--sky-bottom) 70%,
          #dbc7b1 100%);
      transition:background 1s ease;
    }

    #sun{
      position:absolute;
      left:120px;
      top:70px;
      width:130px;
      height:130px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff8db, var(--sun));
      box-shadow:0 0 80px rgba(255,215,108,0.62);
      transition:all 1s ease;
    }

    #clouds::before, #clouds::after{
      content:"";
      position:absolute;
      background:rgba(255,255,255,0.3);
      filter:blur(5px);
      border-radius:50%;
      transition:background 1s ease;
    }

    #clouds::before{
      left:420px;
      top:110px;
      width:300px;
      height:84px;
    }

    #clouds::after{
      right:420px;
      top:150px;
      width:360px;
      height:95px;
    }

    #mountains::before, #mountains::after{
      content:"";
      position:absolute;
      bottom:220px;
      width:760px;
      border-radius:45% 45% 0 0;
      background:rgba(255,255,255,0.16);
      filter:blur(7px);
      transition:background 1s ease;
    }

    #mountains::before{
      left:80px;
      height:240px;
    }

    #mountains::after{
      right:140px;
      height:170px;
    }

    .villa, .temple, .arch, .fountain, .statue, .tree, .cypress, .ruin, .altar, .pillarGroup, .columnDetail {
      position:absolute;
      bottom:170px;
    }

    .villa{
      width:350px;
      height:230px;
      background:linear-gradient(to bottom, var(--marble), var(--marble2));
      border:4px solid rgba(116,92,80,0.16);
      border-radius:18px 18px 6px 6px;
      box-shadow:0 18px 40px rgba(0,0,0,0.06);
    }

    .villa::before{
      content:"";
      position:absolute;
      left:-25px;
      top:-104px;
      width:400px;
      height:112px;
      clip-path:polygon(50% 0,100% 100%,0 100%);
      background:var(--roof);
      border-radius:8px;
    }

    .villa::after{
      content:"";
      position:absolute;
      left:145px;
      bottom:0;
      width:60px;
      height:112px;
      background:#8d664d;
      border-radius:12px 12px 0 0;
      box-shadow:
        -95px -94px 0 -76px rgba(104,82,72,0.22),
        95px -94px 0 -76px rgba(104,82,72,0.22);
    }

    .temple{
      width:300px;
      height:220px;
      background:linear-gradient(to bottom, #fffefc, #ece2d8);
      border:4px solid rgba(116,92,80,0.16);
      border-radius:14px 14px 4px 4px;
      box-shadow:0 16px 36px rgba(0,0,0,0.06);
      overflow:hidden;
    }

    .temple::before{
      content:"";
      position:absolute;
      left:-20px;
      top:-34px;
      width:340px;
      height:38px;
      background:linear-gradient(to bottom,#ffffff,#e8ddd2);
      border-radius:10px;
    }

    .temple::after{
      content:"";
      position:absolute;
      inset:20px 18px auto 18px;
      height:78px;
      background:
        repeating-linear-gradient(
          to right,
          transparent 0 26px,
          rgba(120,100,88,0.16) 26px 42px
        );
      opacity:0.75;
    }

    .arch{
      width:250px;
      height:230px;
      background:linear-gradient(to bottom,#fffefb,#e7dbd0);
      border:4px solid rgba(114,90,78,0.16);
      border-radius:20px 20px 6px 6px;
      overflow:hidden;
    }

    .arch::before{
      content:"";
      position:absolute;
      left:58px;
      bottom:0;
      width:135px;
      height:158px;
      border-radius:90px 90px 0 0;
      background:#d8cabd;
      box-shadow: inset 0 0 0 11px rgba(255,255,255,0.52);
    }

    .fountain{
      width:190px;
      height:120px;
      background:linear-gradient(to bottom,#efe7df,#d8cabd);
      border:4px solid rgba(104,82,70,0.15);
      border-radius:16px;
    }

    .fountain::before{
      content:"";
      position:absolute;
      left:74px;
      top:-40px;
      width:42px;
      height:42px;
      border-radius:50%;
      background:#f6f2ed;
      border:4px solid rgba(104,82,70,0.12);
    }

    .fountain::after{
      content:"";
      position:absolute;
      left:90px;
      top:-8px;
      width:8px;
      height:46px;
      border-radius:10px;
      background:linear-gradient(to bottom,#cbecff,#8bd1ff);
      box-shadow:0 0 16px rgba(139,209,255,0.45);
    }

    .statue{
      width:76px;
      height:185px;
      background:linear-gradient(to bottom,#f6f1ea,#d3c8bd);
      border:3px solid rgba(111,93,81,0.13);
      border-radius:18px 18px 8px 8px;
    }

    .statue::before{
      content:"";
      position:absolute;
      left:16px;
      top:-26px;
      width:38px;
      height:38px;
      border-radius:50%;
      background:#eee6dc;
      border:3px solid rgba(111,93,81,0.11);
    }

    .tree{
      width:46px;
      height:185px;
      background:var(--trunk);
      border-radius:12px;
    }

    .tree::before{
      content:"";
      position:absolute;
      left:-58px;
      top:-100px;
      width:164px;
      height:122px;
      background:radial-gradient(circle at 50% 55%, #9ad16f 0%, var(--leaf) 60%, transparent 69%);
    }

    .cypress{
      width:38px;
      height:220px;
      background:linear-gradient(to bottom,#52763a,#2f4b23);
      border-radius:20px 20px 12px 12px;
    }

    .cypress::before{
      content:"";
      position:absolute;
      left:9px;
      top:-30px;
      width:20px;
      height:42px;
      border-radius:12px;
      background:#4f7338;
    }

    .altar{
      width:180px;
      height:130px;
      background:linear-gradient(to bottom,#f7f2ee,#d9ccc0);
      border-radius:14px;
      border:4px solid rgba(98,83,77,0.2);
    }

    .ruin{
      width:260px;
      height:230px;
      background:linear-gradient(to bottom,#d0c2b8,#8d8179);
      border:5px solid rgba(65,54,49,0.28);
      border-radius:16px 16px 4px 4px;
      overflow:hidden;
    }

    .ruin::before, .ruin::after{
      content:"";
      position:absolute;
      background:rgba(50,40,35,0.26);
    }

    .ruin::before{
      left:24px;
      top:42px;
      width:34px;
      height:100px;
    }

    .ruin::after{
      right:28px;
      top:20px;
      width:90px;
      height:40px;
    }

    .pillarGroup{
      width:210px;
      height:270px;
      display:flex;
      gap:12px;
      align-items:flex-end;
    }

    .columnDetail{
      position:relative;
      width:58px;
      height:250px;
      background:
        linear-gradient(to right,
          #ffffff 0%,
          #f2ebe4 20%,
          #ffffff 40%,
          #e4d8cc 60%,
          #ffffff 100%);
      border:3px solid rgba(117,100,92,0.15);
      border-bottom-width:10px;
      border-radius:10px;
      box-shadow:
        inset 10px 0 0 rgba(255,255,255,0.35),
        inset -8px 0 0 rgba(160,140,128,0.08);
    }

    .columnDetail::before{
      content:"";
      position:absolute;
      left:-10px;
      top:-24px;
      width:78px;
      height:24px;
      border-radius:8px;
      background:linear-gradient(to bottom,#ffffff,#ece2d8);
      box-shadow:0 4px 0 rgba(140,120,108,0.08);
    }

    .columnDetail::after{
      content:"";
      position:absolute;
      inset:10px 12px 14px 12px;
      background:
        repeating-linear-gradient(
          to right,
          rgba(150,132,120,0.12) 0 2px,
          transparent 2px 8px
        );
      opacity:0.65;
      border-radius:8px;
    }

    #flowers, #grassLayer{
      pointer-events:none;
    }

    .flowerPatch{
      position:absolute;
      bottom:162px;
      width:180px;
      height:40px;
      opacity:0.96;
      background:
        radial-gradient(circle at 12% 72%, var(--flower1) 0 5px, transparent 6px),
        radial-gradient(circle at 18% 52%, #6d9d48 0 2px, transparent 3px),
        radial-gradient(circle at 28% 68%, var(--flower2) 0 5px, transparent 6px),
        radial-gradient(circle at 38% 54%, #6d9d48 0 2px, transparent 3px),
        radial-gradient(circle at 46% 70%, var(--flower3) 0 5px, transparent 6px),
        radial-gradient(circle at 56% 56%, #6d9d48 0 2px, transparent 3px),
        radial-gradient(circle at 68% 74%, var(--flower1) 0 5px, transparent 6px),
        radial-gradient(circle at 78% 58%, #6d9d48 0 2px, transparent 3px),
        radial-gradient(circle at 86% 70%, var(--flower2) 0 5px, transparent 6px);
      transition:filter 1s ease, opacity 1s ease;
    }

    .grassPatch{
      position:absolute;
      bottom:160px;
      width:240px;
      height:36px;
      opacity:0.98;
      background:
        linear-gradient(70deg,
          transparent 0 5%, var(--grass) 5% 7%, transparent 7% 10%, var(--grass-dark) 10% 12%, transparent 12% 15%,
          var(--grass) 15% 17%, transparent 17% 21%, var(--grass-dark) 21% 23%, transparent 23% 27%,
          var(--grass) 27% 29%, transparent 29% 33%, var(--grass-dark) 33% 35%, transparent 35% 39%,
          var(--grass) 39% 41%, transparent 41% 45%, var(--grass-dark) 45% 47%, transparent 47% 51%,
          var(--grass) 51% 53%, transparent 53% 57%, var(--grass-dark) 57% 59%, transparent 59% 63%,
          var(--grass) 63% 65%, transparent 65% 69%, var(--grass-dark) 69% 71%, transparent 71% 75%,
          var(--grass) 75% 77%, transparent 77% 81%, var(--grass-dark) 81% 83%, transparent 83% 87%,
          var(--grass) 87% 89%, transparent 89% 100%);
      filter:drop-shadow(0 1px 0 rgba(0,0,0,0.06));
      transition:filter 1s ease, opacity 1s ease;
    }

    #ground{
      top:auto;
      bottom:0;
      height:180px;
      background:
        linear-gradient(to bottom, rgba(255,255,255,0.14), transparent 30%),
        linear-gradient(to bottom,var(--ground-top),var(--ground-bottom));
      border-top:6px solid rgba(255,255,255,0.18);
      transition:background 1s ease;
    }

    #ground::before{
      content:"";
      position:absolute;
      inset:0;
      background-image:
        radial-gradient(circle at 10% 32%, rgba(255,255,255,0.08) 0 3px, transparent 4px),
        radial-gradient(circle at 55% 60%, rgba(0,0,0,0.08) 0 2px, transparent 4px),
        radial-gradient(circle at 82% 20%, rgba(0,0,0,0.08) 0 3px, transparent 5px);
      background-size:170px 90px;
    }

    #player{
      position:absolute;
      left:180px;
      bottom:142px;
      width:132px;
      height:225px;
      z-index:25;
      transition:filter .35s ease;
    }

    .shadow{
      position:absolute;
      left:24px;
      bottom:-2px;
      width:84px;
      height:14px;
      border-radius:50%;
      background:rgba(0,0,0,0.25);
      filter:blur(2px);
    }

    .sprite{
      position:absolute;
      inset:0;
    }

    .cape{
      position:absolute;
      left:14px;
      top:58px;
      width:38px;
      height:106px;
      background:linear-gradient(to bottom,#982d2d,#4d1818);
      border-radius:18px;
      opacity:0.88;
      z-index:0;
    }

    .head{
      position:absolute;
      left:36px;
      top:0;
      width:58px;
      height:62px;
      z-index:4;
    }

    .face{
      position:absolute;
      left:4px;
      right:4px;
      top:7px;
      bottom:0;
      background:#efceb9;
      border:2px solid rgba(82,53,36,0.22);
      border-radius:48% 48% 42% 42%;
      overflow:visible;
    }

    .hair{
      position:absolute;
      left:1px;
      top:0;
      width:56px;
      height:26px;
      border-radius:50% 50% 14px 14px;
    }

    .eye{
      position:absolute;
      top:15px;
      width:6px;
      height:6px;
      border-radius:50%;
      background:#211817;
    }

    .eye.left{ left:11px; }
    .eye.right{ right:11px; }

    .brow{
      position:absolute;
      top:11px;
      width:11px;
      height:3px;
      background:#54392d;
      border-radius:4px;
    }

    .brow.left{ left:8px; }
    .brow.right{ right:8px; }

    .mouth{
      position:absolute;
      left:15px;
      bottom:10px;
      width:17px;
      height:8px;
      border-bottom:3px solid #7f3d3d;
      border-radius:0 0 10px 10px;
    }

    .torso{
      position:absolute;
      left:32px;
      top:54px;
      width:54px;
      height:72px;
      border-radius:12px;
      border:2px solid rgba(47,58,73,0.23);
      z-index:3;
    }

    .skirt{
      position:absolute;
      left:28px;
      top:121px;
      width:62px;
      height:30px;
      z-index:3;
    }

    .arm, .leg, .hand{
      position:absolute;
      z-index:3;
      border-radius:12px;
    }

    .arm{
      width:16px;
      height:58px;
      top:59px;
    }

    .arm.left{ left:15px; }
    .arm.right{ right:15px; }

    .hand{
      width:14px;
      height:14px;
      top:112px;
    }

    .hand.left{ left:16px; }
    .hand.right{ right:16px; }

    .leg{
      width:18px;
      height:76px;
      top:145px;
    }

    .leg.left{ left:32px; }
    .leg.right{ right:32px; }

    .sword{
      position:absolute;
      left:96px;
      top:44px;
      width:11px;
      height:122px;
      background:linear-gradient(to bottom,#f5f5f5,#b7c6d0 52%, #88766d);
      border-radius:8px;
      transform:rotate(10deg);
      box-shadow:0 0 8px rgba(255,255,255,0.35);
      z-index:2;
    }

    .sword::before{
      content:"";
      position:absolute;
      left:-12px;
      top:12px;
      width:36px;
      height:8px;
      border-radius:8px;
      background:#b78f49;
    }

    #player.titus .hair{
      background:linear-gradient(to bottom,#a2a5aa,#6e7277);
    }

    #player.titus .torso{
      background:linear-gradient(to bottom,#dde3ea,#98a5b2);
    }

    #player.titus .torso::before{
      content:"";
      position:absolute;
      left:16px;
      top:0;
      width:22px;
      height:72px;
      background:linear-gradient(to bottom,#d9b46c,#9d7c3d);
      opacity:0.86;
    }

    #player.titus .skirt{
      background:
        linear-gradient(to right,
          transparent 0 8%, #d9b46c 8% 16%,
          transparent 16% 24%, #d9b46c 24% 32%,
          transparent 32% 40%, #d9b46c 40% 48%,
          transparent 48% 56%, #d9b46c 56% 64%,
          transparent 64% 72%, #d9b46c 72% 80%,
          transparent 80% 100%);
    }

    #player.titus .arm{ background:#ccb2a0; }
    #player.titus .hand{ background:#efceb9; }
    #player.titus .leg{ background:#66606b; }
    #player.titus .cape{ display:block; }

    #player.lavinia .hair{
      background:linear-gradient(to bottom,#f6e58b,#cfb443);
      height:72px;
      width:58px;
      border-radius:40% 40% 30% 30%;
      box-shadow:
        0 20px 0 0 rgba(214,187,76,0.95),
        0 40px 0 0 rgba(198,170,67,0.9);
    }

    #player.lavinia .torso{
      background:linear-gradient(to bottom,#f6f0e9,#d9d0c8);
      border-color:rgba(130,110,96,0.16);
    }

    #player.lavinia .torso::before{
      content:"";
      position:absolute;
      left:16px;
      top:8px;
      width:18px;
      height:18px;
      border-radius:50%;
      background:rgba(255,255,255,0.75);
      box-shadow:
        -12px 20px 0 rgba(255,255,255,0.5),
        12px 20px 0 rgba(255,255,255,0.5);
    }

    #player.lavinia .skirt{
      top:116px;
      left:18px;
      width:82px;
      height:60px;
      background:linear-gradient(to bottom,#f7f2ec,#d8d0c9);
      border-radius:0 0 28px 28px;
    }

    #player.lavinia .arm{ background:#efceb9; }
    #player.lavinia .hand{ background:#efceb9; }
    #player.lavinia .leg{ background:#e8ddd3; }
    #player.lavinia .sword{ display:none; }
    #player.lavinia .cape{ display:none; }

    #player.front .arm.left{ left:13px; }
    #player.front .arm.right{ right:13px; }

    #player.side .head{ left:39px; }
    #player.side .face{ border-radius:54% 44% 40% 52%; }

    #player.side.left .sprite{
      transform:scaleX(-1);
      transform-origin:center;
    }

    #player.jump{ filter:brightness(1.08); }

    #player.roll .sprite{
      transform:rotate(74deg) translateY(24px);
      transform-origin:center bottom;
    }

    #player.roll.left .sprite{
      transform:scaleX(-1) rotate(74deg) translateY(24px);
    }

    #player.walk .leg.left{ animation:legA .35s infinite alternate ease-in-out; }
    #player.walk .leg.right{ animation:legB .35s infinite alternate ease-in-out; }
    #player.walk .arm.left{ animation:armA .35s infinite alternate ease-in-out; }
    #player.walk .arm.right{ animation:armB .35s infinite alternate ease-in-out; }

    @keyframes legA{ from{transform:rotate(8deg)} to{transform:rotate(-10deg)} }
    @keyframes legB{ from{transform:rotate(-10deg)} to{transform:rotate(8deg)} }
    @keyframes armA{ from{transform:rotate(-10deg)} to{transform:rotate(12deg)} }
    @keyframes armB{ from{transform:rotate(12deg)} to{transform:rotate(-10deg)} }

    #player.titus.frown1 .mouth{
      width:13px;
      left:15px;
      border-bottom-width:2px;
    }

    #player.titus.frown2 .mouth{
      width:16px;
      left:13px;
      bottom:13px;
      height:6px;
      border-bottom:none;
      border-top:3px solid #6a2c2c;
      border-radius:10px 10px 0 0;
    }

    #player.titus.frown3 .mouth{
      width:20px;
      left:11px;
      bottom:11px;
      height:6px;
      border-bottom:none;
      border-top:4px solid #491d1d;
      border-radius:10px 10px 0 0;
    }

    #player.titus.frown2 .torso{
      filter:saturate(0.88) brightness(0.94);
    }

    #player.titus.frown3{
      filter:saturate(0.82) brightness(0.88);
    }

    #player.titus.frown3 .sword{
      filter:saturate(0.45) brightness(0.7);
      box-shadow:none;
    }

    #player.titus.frown3 .cape{
      background:linear-gradient(to bottom,#6d2020,#301010);
    }

    #player.lavinia.silent .mouth{
      width:24px;
      height:18px;
      left:10px;
      border-bottom:none;
      background:#d8a8a8;
      border-radius:8px;
      box-shadow:inset 0 0 0 2px rgba(118,62,62,0.12);
    }

    #player.lavinia.maimed .mouth{
      width:26px;
      height:22px;
      left:10px;
      background:linear-gradient(to bottom,var(--blood),#ef3144);
      border-radius:0 0 12px 12px;
      box-shadow:inset 0 0 0 4px rgba(70,0,0,0.15);
      border-bottom:none;
    }

    #player.lavinia.maimed .hand{
      display:none;
    }

    #player.lavinia.maimed .arm{
      height:38px;
      top:64px;
      border-radius:10px 10px 18px 18px;
      background:linear-gradient(to bottom,#ff808d,#d93044);
    }

    #player.lavinia.maimed{
      filter:saturate(0.92) brightness(0.9);
    }

    #player.lavinia.maimed .torso{
      background:

            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'Rome receives Titus in triumph.',
              'Rome shines in ceremony around Lavinia.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'You have Tamora’s son. What are you going to do with him?',
            choices:[
              choice('Spare him and call for mercy.', 'mild', 'Mercy', () => autoAdvance(() => funnel(1, "Mercy is spoken, but blood still enters Rome."))),
              choice('Offer him up as a lawful sacrifice.', 'hard', 'Law', () => autoAdvance(() => funnel(2, "Law blesses the blade and makes cruelty look clean."))),
              choice('Take blood for blood before all of Rome.', 'brutal', 'Blood', () => autoAdvance(() => funnel(3, "Grief becomes spectacle, and the crowd learns to watch.")))
            ]
          }
        ]
      },

      l1_choice: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'Titus still carries himself like a Roman general.',
              'Lavinia still carries herself with grace and light.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'A plea is brought before power. How are you going to answer it?',
            choices:[
              choice('Wait and trust order.', 'mild', 'Order', () => autoAdvance(() => funnel(1, "Waiting only teaches violence patience."))),
              choice('Threaten force if justice is denied.', 'hard', 'Threat', () => autoAdvance(() => funnel(2, "Threat hardens every face in the room."))),
              choice('Strike before they can answer you.', 'brutal', 'Strike', () => autoAdvance(() => funnel(3, "The first strike invites the next one.")))
            ]
          }
        ]
      },

      l2_story: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'The gardens are still green. The sword still shines.',
              'The flowers are still bright. Her smile is still whole.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'Saturninus and Tamora rise higher in Rome. How are you going to answer the danger growing around you?',
            choices:[
              choice('Appeal softly to reason.', 'mild', 'Reason', () => autoAdvance(() => funnel(1, "Softness is heard and dismissed."))),
              choice('Demand justice openly.', 'hard', 'Justice', () => autoAdvance(() => funnel(2, "Justice turns into pride in another mouth."))),
              choice('Force the answer with violence.', 'brutal', 'Force', () => autoAdvance(() => funnel(3, "Force multiplies whatever it touches.")))
            ]
          }
        ]
      },

      l2_choice: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'Honour is still visible, but it is beginning to crack.',
              'Beauty is still visible, but it is standing too near danger.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'Aaron’s schemes are already moving beneath the surface. What are you going to do?',
            choices:[
              choice('Trust that Rome will hold.', 'mild', 'Trust', () => autoAdvance(() => funnel(1, "Trust is met with appetite."))),
              choice('Warn everyone and prepare for harm.', 'hard', 'Warning', () => autoAdvance(() => funnel(2, "Warnings sharpen fear, and fear sharpens harm."))),
              choice('Answer rage with rage now.', 'brutal', 'Rage', () => autoAdvance(() => funnel(3, "Rage recognizes itself and grows.")))
            ]
          }
        ]
      },

      l3_story: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'The forest has become a place of stain and omen.',
              'The forest no longer looks like a refuge. It looks like teeth.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text: roleText(
              'Lavinia has been attacked, mutilated, and made into a sign of unbearable grief. What is Titus going to do now?',
              'You are in the forest, hunted and wounded. What are you going to do now?'
            ),
            choices:[
              {
                text: roleSpecific('Seek Rome and ask for justice.', 'Run and try to escape.'),
                tone:'mild',
                tag:'Restraint',
                effect:() => autoAdvance(() => brutalShift(2, 'silent', 'frown1', roleSpecific(
                  'Rome answers too slowly for pain.',
                  'You run, but silence begins to overtake you.'
                )))
              },
              {
                text: roleSpecific('Swear private revenge.', 'Resist and fight them off.'),
                tone:'hard',
                tag:'Oath',
                effect:() => autoAdvance(() => brutalShift(3, 'maimed', 'frown2', roleSpecific(
                  'The oath enters him and will not leave.',
                  'You resist. The world answers with brighter blood.'
                )))
              },
              {
                text: roleSpecific('Promise atrocity in return.', 'Refuse to beg and face them.'),
                tone:'brutal',
                tag:'Retaliation',
                effect:() => autoAdvance(() => brutalShift(4, 'maimed', 'frown3', roleSpecific(
                  'The sword no longer looks noble.',
                  'You do not bend. Tragedy does not spare the brave.'
                )))
              }
            ]
          }
        ]
      },

      l3_choice: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'The grief is no longer containable.',
              'The body has become the proof of the world’s cruelty.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'You now know who has done this. How are you going to answer them?',
            choices:[
              choice('Appeal to law one last time.', 'mild', 'Law', () => autoAdvance(() => funnel(2, "Law stands beside pain but cannot master it."))),
              choice('Prepare revenge in secret.', 'hard', 'Secret', () => autoAdvance(() => funnel(3, "Revenge becomes craft, and craft becomes savagery."))),
              choice('Think only of blood from now on.', 'brutal', 'Blood', () => autoAdvance(() => funnel(4, "Blood becomes the only language left.")))
            ]
          }
        ]
      },

      l4_story: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'The house has become a place of terrible intention.',
              'The home itself now feels like part of the tragedy.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'You have the guilty in your grasp. What are you going to do with them?',
            choices:[
              choice('Hide revenge beneath ceremony.', 'mild', 'Ceremony', () => autoAdvance(() => funnel(2, "Ceremony becomes another mask for cruelty."))),
              choice('Prepare a punishment they will not understand until too late.', 'hard', 'Punishment', () => autoAdvance(() => funnel(3, "Punishment ripens into monstrosity."))),
              choice('Turn the feast itself into horror.', 'brutal', 'Horror', () => autoAdvance(() => funnel(4, "At last the violence stops pretending.")))
            ]
          }
        ]
      },

      l4_choice: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'Honour has nearly vanished from the face of Titus.',
              'Whatever beauty remains in Lavinia has been made tragic by grief and blood.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'The final gathering is near. How are you going to carry your revenge into it?',
            choices:[
              choice('With restraint.', 'mild', 'Restraint', () => autoAdvance(() => funnel(2, "Restraint now only slows what is coming."))),
              choice('With certainty.', 'hard', 'Certainty', () => autoAdvance(() => funnel(3, "Certainty hardens into violence."))),
              choice('With open cruelty.', 'brutal', 'Cruelty', () => autoAdvance(() => funnel(4, "Cruelty finally speaks its own true name.")))
            ]
          }
        ]
      },

      l5_story: {
        steps: [
          {
            speaker: roleName,
            portrait: rolePortrait,
            text: roleText(
              'Rome is now stone, smoke, and consequence.',
              'There is no bright place left in Rome.'
            )
          },
          {
            speaker:'',
            portrait:'none',
            text:'You stand at the end of everything. What are you going to seek now?',
            choices:[
              choice('Seek justice.', 'mild', 'Justice', () => autoAdvance(() => funnel(2, "Justice arrives already stained."))),
              choice('Seek revenge.', 'hard', 'Revenge', () => autoAdvance(() => funnel(3, "Revenge calls itself balance."))),
              choice('Seek slaughter.', 'brutal', 'Slaughter', () => autoAdvance(() => funnel(4, "Slaughter is the most honest word left.")))
            ]
          }
        ]
      },

      l5_choice: {
        steps: [
          {
            speaker:'',
            portrait:'none',
            text:'How are you going to end it?',
            choices:[
              { text:'End it.', tone:'mild', effect:() => autoAdvance(() => openScene('endingChoice')) },
              { text:'End it.', tone:'hard', effect:() => autoAdvance(() => openScene('endingChoice')) },
              { text:'End it.', tone:'brutal', effect:() => autoAdvance(() => openScene('endingChoice')) }
            ]
          }
        ]
      },

      endingChoice: {
        steps: [
          {
            speaker:'',
            portrait:'none',
            text:'How are you going to end it?',
            choices:[
              { text:'End it.', tone:'mild', effect:() => autoAdvance(() => openScene('reveal')) },
              { text:'End it.', tone:'hard', effect:() => autoAdvance(() => openScene('reveal')) },
              { text:'End it.', tone:'brutal', effect:() => autoAdvance(() => openScene('reveal')) }
            ]
          }
        ]
      },

      reveal: {
        steps: [
          {
            speaker:'Chorus',
            portrait:'none',
            text:`It would not have mattered.

Every road was already bending here.
You were offered choices in posture, not escape.
Revenge does not heal injury.
It teaches the wounded to resemble what wounded them.`
          },
          {
            speaker:'Chorus',
            portrait:'none',
            text: roleText(
              `Titus entered as an old Roman general: grey-haired, armed, disciplined, and honoured.
He leaves with his smile gone, his judgement consumed, and his mighty sword reduced to shame.`,
              `Lavinia entered radiant, noble, blonde, and graceful.
She leaves turned into the tragedy itself, her beauty overshadowed by the violence done to her and the vengeance that followed.`
            )
          },
          {
            speaker:'Chorus',
            portrait:'none',
            text:`Memories gathered: ${state.memory} / 3

No matter what was chosen,
the fact remained the same:
revenge drives everyone toward tragedy.`
          },
          {
            speaker:'',
            portrait:'none',
            text:'Will you end it?',
            choices:[
              { text:'End.', tone:'brutal', effect:() => endGame() }
            ]
          }
        ]
      },

      goNext: {
        steps: [
          {
            speaker:'',
            portrait:'none',
            text:'Will you go on?',
            choices:[
              { text:'Go on.', tone:'hard', effect:() => smoothNextLevel() }
            ]
          }
        ]
      },

      m1: {
        steps: [
          { speaker:'', portrait:'none', text:'A family table before the breaking.' },
          { speaker:'', portrait:'none', text:'Will you take this memory fragment?', choices:[
            { text:'Take the memory.', tone:'mild', effect:() => takeMemory('m1') }
          ]}
        ]
      },

      m2: {
        steps: [
          { speaker:'', portrait:'none', text:'A bright Roman morning before the gardens turned cruel.' },
          { speaker:'', portrait:'none', text:'Will you take this memory fragment?', choices:[
            { text:'Take the memory.', tone:'mild', effect:() => takeMemory('m2') }
          ]}
        ]
      },

      m3: {
        steps: [
          { speaker:'', portrait:'none', text:'A voice still whole. Hands still living. A day before the fall.' },
          { speaker:'', portrait:'none', text:'Will you take this memory fragment?', choices:[
            { text:'Take the memory.', tone:'mild', effect:() => takeMemory('m3') }
          ]}
        ]
      }
    };

    function roleName(){
      return state.role === 'lavinia' ? 'Lavinia' : 'Titus';
    }

    function rolePortrait(){
      return state.role;
    }

    function roleText(titusText, laviniaText){
      return state.role === 'lavinia' ? laviniaText : titusText;
    }

    function roleSpecific(titusChoice, laviniaChoice){
      return state.role === 'lavinia' ? laviniaChoice : titusChoice;
    }

    function choice(text, tone, tag, effect){
      return { text, tone, tag, effect };
    }

    function chooseRole(role){
      state.role = role;
      roleLabel.textContent = `Role: ${role === 'titus' ? 'Titus' : 'Lavinia'}`;
      player.className = `front ${role}`;
      updateCharacterVisuals();
      closeScene();
    }

    function renderLevel(index){
      state.level = index;
      const level = levels[index];
      game.className = level.phaseClass;
      actLabel.textContent = level.title;
      renderScenery(level.scenery);
      renderFlowers(level.flowerPatches);
      renderGrass(level.grassPatches);
      renderMarkers(level.markers);
      state.player.x = 120;
      state.player.y = 0;
      state.player.vy = 0;
      state.lockMovement = true;
      updateCharacterVisuals();
      updateCamera();
    }

    function renderScenery(items){
      farRome.innerHTML = '';
      midRome.innerHTML = '';

      items.forEach(item => {
        let el;
        if(item.type === 'pillarGroup'){
          el = document.createElement('div');
          el.className = 'pillarGroup';
          el.style.left = item.x + 'px';
          for(let i = 0; i < 3; i++){
            const c = document.createElement('div');
            c.className = 'columnDetail';
            el.appendChild(c);
          }
        } else {
          el = document.createElement('div');
          el.className = item.type;
          el.style.left = item.x + 'px';
        }

        if(item.layer === 'far') farRome.appendChild(el);
        else midRome.appendChild(el);
      });
    }

    function renderFlowers(list){
      flowers.innerHTML = '';
      list.forEach(x => {
        const el = document.createElement('div');
        el.className = 'flowerPatch';
        el.style.left = x + 'px';
        flowers.appendChild(el);
      });
    }

    function renderGrass(list){
      grassLayer.innerHTML = '';
      list.forEach(x => {
        const el = document.createElement('div');
        el.className = 'grassPatch';
        el.style.left = x + 'px';
        grassLayer.appendChild(el);
      });
    }

    function renderMarkers(markers){
      interactables.innerHTML = '';
      markers.forEach(marker => {
        if(state.usedMarkers[marker.id]) return;
        const el = document.createElement('div');
        el.className = `marker ${marker.type}`;
        el.dataset.id = marker.id;
        el.dataset.scene = marker.scene;
        el.dataset.label = marker.label;
        el.style.left = marker.x + 'px';
        interactables.appendChild(el);
      });
    }

    function openScene(name){
      state.currentScene = scenes[name];
      state.step = 0;
      state.lockMovement = true;
      overlay.classList.add('visible');
      showStep();
    }

    function closeScene(){
      state.currentScene = null;
      state.step = 0;
      overlay.classList.remove('visible');
      state.lockMovement = false;
    }

    function resolve(v){
      return typeof v === 'function' ? v() : v;
    }

    function showStep(){
      const scene = state.currentScene;
      if(!scene) return;
      const step = scene.steps[state.step];
      if(!step){
        closeScene();
        return;
      }

      const speaker = resolve(step.speaker);
      const text = resolve(step.text);
      const portrait = resolve(step.portrait);

      speakerEl.textContent = speaker || ' ';
      textEl.textContent = text || ' ';
      updatePortraits(portrait);
      choicesEl.innerHTML = '';

      if(step.choices){
        step.choices.forEach(c => {
          const btn = document.createElement('button');
          btn.className = `btn ${c.tone || 'mild'}`;
          const ct = typeof c.text === 'function' ? c.text() : c.text;
          const tag = c.tag ? `<span class="tag">${c.tag}</span>` : '';
          btn.innerHTML = `${tag}${ct}`;
          btn.onclick = c.effect;
          choicesEl.appendChild(btn);
        });
      } else {
        const btn = document.createElement('button');
        btn.className = 'btn mild';
        btn.textContent = 'Continue';
        btn.onclick = () => {
          state.step += 1;
          showStep();
        };
        choicesEl.appendChild(btn);
      }
    }

    function updatePortraits(active = null){
      portraitTitus.className = 'portrait titus';
      portraitLavinia.className = 'portrait lavinia';

      if(state.role === 'lavinia' && player.classList.contains('silent')){
        portraitLavinia.classList.add('silent');
      }
      if(state.role === 'lavinia' && player.classList.contains('maimed')){
        portraitLavinia.classList.add('maimed');
      }

      if(active === 'titus') portraitTitus.classList.add('active');
      else if(active === 'lavinia') portraitLavinia.classList.add('active');
    }

    function takeMemory(id){
      if(!state.memorySeen[id]){
        state.memorySeen[id] = true;
        state.memory += 1;
        memoryLabel.textContent = `Memories: ${state.memory} / 3`;
      }
      state.usedMarkers[id] = true;
      renderMarkers(levels[state.level].markers);
      closeScene();
    }

    function autoAdvance(fn){
      choicesEl.innerHTML = '';
      fn();
    }

    function openAutoMessage(text, nextFn){
      overlay.classList.add('visible');
      state.lockMovement = true;
      speakerEl.textContent = '';
      textEl.textContent = text;
      choicesEl.innerHTML = '';
      updatePortraits('none');

      setTimeout(() => {
        if(nextFn) nextFn();
      }, 950);
    }

    function funnel(amount, summary){
      state.violence += amount;
      updateCharacterVisuals();
      openAutoMessage(summary, () => {
        closeScene();
      });
    }

    function brutalShift(amount, laviniaStage, titusStage, summary){
      state.violence += amount;

      if(state.role === 'lavinia'){
        player.classList.remove('silent', 'maimed');
        player.classList.add(laviniaStage);
      }

      if(state.role === 'titus'){
        player.classList.remove('frown1', 'frown2', 'frown3');
        player.classList.add(titusStage);
      }

      updateCharacterVisuals();
      openAutoMessage(summary, () => {
        closeScene();
      });
    }

    function updateCharacterVisuals(){
      if(!state.role) return;

      player.classList.remove('titus','lavinia','frown1','frown2','frown3');
      player.classList.add(state.role);

      if(state.role === 'titus'){
        if(state.violence >= 11) player.classList.add('frown3');
        else if(state.violence >= 7) player.classList.add('frown2');
        else if(state.violence >= 3) player.classList.add('frown1');
      }

      if(state.role === 'lavinia'){
        if(levels[state.level].phaseClass !== 'phase1' && levels[state.level].phaseClass !== 'phase2' && !player.classList.contains('maimed')){
          player.classList.add('silent');
        }
      }

      updatePortraits();
    }

    function smoothNextLevel(){
      const next = state.level + 1;
      if(next >= levels.length) return;

      transition.classList.add('active');
      state.lockMovement = true;

      setTimeout(() => {
        renderLevel(next);
      }, 420);

      setTimeout(() => {
        transition.classList.remove('active');
        closeScene();
      }, 900);
    }

    function endGame(){
      document.body.classList.add('ending');
      state.lockMovement = true;
      choicesEl.innerHTML = '';
    }

    function tryInteract(){
      const markers = [...document.querySelectorAll('.marker')];
      const marker = markers.find(m => {
        const x = parseFloat(m.style.left);
        return Math.abs((x + 20) - state.player.x) < 84;
      });
      if(!marker) return;
      triggerMarker(marker);
    }

    function triggerMarker(marker){
      const id = marker.dataset.id;
      const scene = marker.dataset.scene;

      if(!id.includes('memory')){
        state.usedMarkers[id] = true;
        renderMarkers(levels[state.level].markers);
      }

      openScene(scene);
    }

    function startRoll(){
      if(state.player.jumping || state.player.rolling) return;
      state.player.rolling = true;
      state.player.rollTimer = 18;
    }

    function updatePlayer(){
      if(!state.lockMovement){
        let moving = false;

        if(keys['a'] || keys['arrowleft']){
          state.player.x -= state.player.speed + (state.player.rolling ? 3.4 : 0);
          state.player.facing = 'left';
          moving = true;
        }

        if(keys['d'] || keys['arrowright']){
          state.player.x += state.player.speed + (state.player.rolling ? 3.4 : 0);
          state.player.facing = 'right';
          moving = true;
        }

        if((keys['w'] || keys['arrowup'] || keys[' ']) && !state.player.jumping){
          state.player.vy = 14;
          state.player.jumping = true;
        }

        if(state.player.rolling){
          state.player.rollTimer -= 1;
          if(state.player.rollTimer <= 0) state.player.rolling = false;
        }

        state.player.x = Math.max(20, Math.min(WORLD_WIDTH - 150, state.player.x));
        state.player.y += state.player.vy;
        state.player.vy -= 0.8;

        if(state.player.y <= 0){
          state.player.y = 0;
          state.player.vy = 0;
          state.player.jumping = false;
        }

        updatePose(moving);
      }

      player.style.left = state.player.x + 'px';
      player.style.bottom = (GROUND_Y + state.player.y) + 'px';
    }

    function updatePose(moving){
      player.classList.remove('front','side','left','right','jump','roll','walk');
      player.classList.add(state.role || 'titus');

      if(state.player.rolling){
        player.classList.add('roll', state.player.facing);
      } else if(state.player.jumping){
        player.classList.add('side', state.player.facing, 'jump');
      } else if(moving){
        player.classList.add('side', state.player.facing, 'walk');
      } else {
        player.classList.add('front');
      }

      if(state.role === 'lavinia'){
        if((game.classList.contains('phase3') || game.classList.contains('phase4') || game.classList.contains('phase5')) && !player.classList.contains('maimed')){
          player.classList.add('silent');
        }
      }
    }

    function updateCamera(){
      const vw = window.innerWidth;
      const cx = Math.max(0, Math.min(WORLD_WIDTH - vw, state.player.x - vw / 2));
      world.style.transform = `translateX(${-cx}px)`;
    }

    function loop(){
      updatePlayer();
      updateCamera();
      requestAnimationFrame(loop);
    }

    function bind(){
      window.addEventListener('keydown', e => {
        const k = e.key.toLowerCase();
        keys[k] = true;
        if(['arrowup','arrowleft','arrowright',' '].includes(k)) e.preventDefault();

        if((k === 'e' || e.key === 'Enter') && !state.lockMovement) tryInteract();
        if((k === 'r' || e.key === 'Shift') && !state.lockMovement) startRoll();
      });

      window.addEventListener('keyup', e => {
        keys[e.key.toLowerCase()] = false;
      });

      interactables.addEventListener('click', e => {
        const marker = e.target.closest('.marker');
        if(!marker || state.lockMovement) return;
        triggerMarker(marker);
      });

      startBtn.addEventListener('click', () => {
        startScreen.classList.add('hidden');
        openScene('chooseRole');
      });

      window.addEventListener('resize', updateCamera);
    }

    function init(){
      bind();
      renderLevel(0);
      requestAnimationFrame(loop);
    }

    init();
  </script>
</body>
</html>
