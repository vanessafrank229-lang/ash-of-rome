<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash of Rome</title>
  <style>
    :root{
      --bg:#efe7dc;
      --panel:#fff8ef;
      --panel2:rgba(255,248,239,0.9);
      --text:#211c18;
      --muted:#6b6259;
      --line:#d8c7ac;
      --gold:#b08946;
      --choice:#f7eedf;
      --choice-hover:#eedfc7;
      --blood:#7a1e1e;
      --blood2:#4b0e0e;
      --shadow:0 18px 46px rgba(0,0,0,0.14);
    }

    body.theme1{
      --bg:#efe7dc;
      --panel:#fff8ef;
      --panel2:rgba(255,248,239,0.9);
      --text:#211c18;
      --muted:#6b6259;
      --line:#d8c7ac;
      --choice:#f7eedf;
      --choice-hover:#eedfc7;
    }

    body.theme2{
      --bg:#e4d8c7;
      --panel:#f1e5d7;
      --panel2:rgba(241,229,215,0.9);
      --text:#2a241f;
      --muted:#62584f;
      --line:#c3b09a;
      --choice:#e8dbc8;
      --choice-hover:#dbc6ad;
    }

    body.theme3{
      --bg:#b8ab9d;
      --panel:#cdc0b2;
      --panel2:rgba(205,192,178,0.9);
      --text:#28221e;
      --muted:#514941;
      --line:#a08d7b;
      --choice:#c4b4a3;
      --choice-hover:#b39d89;
    }

    body.theme4{
      --bg:#6d6760;
      --panel:#847b72;
      --panel2:rgba(132,123,114,0.9);
      --text:#f0ebe4;
      --muted:#ddd2c9;
      --line:#5e5650;
      --choice:#776d65;
      --choice-hover:#665c55;
    }

    body.theme5{
      --bg:#383635;
      --panel:#4a4543;
      --panel2:rgba(74,69,67,0.92);
      --text:#f4eee8;
      --muted:#cec4bb;
      --line:#34302e;
      --choice:#514947;
      --choice-hover:#433d3a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:Georgia, "Times New Roman", serif;
      background:var(--bg);
      color:var(--text);
      transition:background .6s ease,color .4s ease;
    }

    .app{
      max-width:1200px;
      margin:0 auto;
      padding:20px 16px 40px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:.02em;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      max-width:760px;
      line-height:1.5;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:flex-end;
    }

    .pill{
      border:1px solid var(--line);
      background:var(--panel);
      border-radius:999px;
      padding:8px 12px;
      font-size:.92rem;
      color:var(--muted);
      box-shadow:0 8px 24px rgba(0,0,0,.08);
      white-space:nowrap;
    }

    .layout{
      display:grid;
      grid-template-columns:1.3fr .9fr;
      gap:18px;
    }

    @media (max-width:980px){
      .layout{ grid-template-columns:1fr; }
    }

    .card{
      background:var(--panel2);
      border:1px solid var(--line);
      border-radius:24px;
      overflow:hidden;
      box-shadow:var(--shadow);
      backdrop-filter:blur(6px);
    }

    .scene-wrap{
      padding:16px;
    }

    .scene{
      position:relative;
      width:100%;
      height:680px;
      border-radius:20px;
      overflow:hidden;
      border:1px solid var(--line);
      background:#d8d1c9;
    }

    @media (max-width:980px){
      .scene{ height:520px; }
    }

    @media (max-width:640px){
      .scene{ height:420px; }
    }

    .layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .sky.bright{
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,.4) 0 8%, transparent 9%),
        linear-gradient(180deg,#88ccff 0%,#dff2ff 40%,#f4e5cf 100%);
    }

    .sky.warm{
      background:
        radial-gradient(circle at 18% 18%, rgba(255,248,210,.32) 0 8%, transparent 9%),
        linear-gradient(180deg,#d2b988 0%,#ead7bb 42%,#d4c4af 100%);
    }

    .sky.dirty{
      background:
        radial-gradient(circle at 20% 16%, rgba(185,176,163,.18) 0 7%, transparent 9%),
        linear-gradient(180deg,#8a8377 0%,#9a9181 38%,#756d67 100%);
    }

    .sky.ash{
      background:
        radial-gradient(circle at 20% 16%, rgba(110,108,106,.15) 0 7%, transparent 8%),
        linear-gradient(180deg,#4b4a49 0%,#5a5653 36%,#3b3938 100%);
    }

    .sun{
      position:absolute;
      top:38px;
      left:58px;
      width:90px;
      height:90px;
      border-radius:50%;
      box-shadow:0 0 40px rgba(255,255,255,.25);
    }

    .sun.sunny{
      background:radial-gradient(circle at 35% 35%, #fffbe6 0%, #ffe191 40%, #efba4d 80%, rgba(239,186,77,.1) 100%);
    }

    .sun.fade{
      background:radial-gradient(circle at 35% 35%, #ece1bf 0%, #c19c67 42%, #8b6f53 80%, rgba(139,111,83,.12) 100%);
      opacity:.8;
    }

    .sun.hidden{
      background:radial-gradient(circle at 35% 35%, #8e857a 0%, #625c57 48%, #4a4744 80%, rgba(74,71,68,.1) 100%);
      opacity:.35;
      filter:blur(1px);
    }

    .ground{
      position:absolute;
      left:0; right:0; bottom:0;
      height:140px;
    }

    .ground.green{ background:linear-gradient(180deg,#a5c36e 0%,#78934b 68%,#627339 100%); }
    .ground.brown{ background:linear-gradient(180deg,#7a6e5c 0%,#5a5145 68%,#453d35 100%); }

    .rome-wall{
      position:absolute;
      left:8%;
      right:8%;
      bottom:0;
      height:190px;
      border-radius:26px 26px 0 0;
    }

    .rome-wall.bright{ background:linear-gradient(180deg,#fffaf1 0%,#f5ead8 56%,#e0cfb4 100%); }
    .rome-wall.warm{ background:linear-gradient(180deg,#efe0cb 0%,#d7c2a2 56%,#b39173 100%); }
    .rome-wall.dirty{ background:linear-gradient(180deg,#b8aa9c 0%,#8f7f6d 56%,#675849 100%); }
    .rome-wall.ash{ background:linear-gradient(180deg,#7b756f 0%,#595550 56%,#3f3d3a 100%); }

    .column{
      position:absolute;
      bottom:150px;
      width:56px;
      border-radius:14px 14px 0 0;
    }

    .column.bright{ background:linear-gradient(180deg,#fffdf8 0%,#f3ece2 70%,#d8c6aa 100%); }
    .column.warm{ background:linear-gradient(180deg,#efe6d9 0%,#d9ccb9 70%,#b99f7e 100%); }
    .column.dirty{ background:linear-gradient(180deg,#b9afa2 0%,#968977 70%,#706255 100%); }
    .column.ash{ background:linear-gradient(180deg,#7f7871 0%,#5c5752 70%,#413d3a 100%); }

    .tree{
      position:absolute;
      bottom:120px;
      width:28px;
      border-radius:10px 10px 0 0;
      background:linear-gradient(180deg,#6f4a2b 0%,#4f341e 100%);
    }

    .tree.dark{
      background:linear-gradient(180deg,#463428 0%,#31241c 100%);
    }

    .crown{
      position:absolute;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #8bd16d 0%, #5f9e43 68%, #497534 100%);
    }

    .crown.dark{
      background:radial-gradient(circle at 35% 35%, #5e6d55 0%, #3f4a3d 68%, #2f372d 100%);
    }

    .feast-wall{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg,#6a5950 0%,#50423b 48%,#413733 100%);
    }

    .table{
      position:absolute;
      left:8%;
      right:8%;
      bottom:60px;
      height:110px;
      border-radius:18px 18px 0 0;
      background:linear-gradient(180deg,#5f4336 0%,#3b2a23 100%);
    }

    .candle{
      position:absolute;
      width:16px;
      bottom:158px;
      background:#e4d8c1;
      border-radius:4px 4px 0 0;
    }

    .flame{
      position:absolute;
      width:18px; height:26px;
      top:-22px; left:-1px;
      border-radius:50%;
      background:radial-gradient(circle at 50% 30%, #fff8da 0%, #ffc96f 45%, rgba(255,184,66,.12) 100%);
      box-shadow:0 0 18px rgba(255,195,92,.55);
    }

    .crack{
      position:absolute;
      width:2px;
      background:#453d39;
      opacity:.42;
      transform-origin:top center;
    }

    .blood{
      position:absolute;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, rgba(150,45,45,.95) 0%, rgba(102,25,25,.92) 60%, rgba(60,10,10,.8) 100%);
      opacity:.92;
    }

    .blood.smear{
      border-radius:999px;
      background:linear-gradient(90deg, rgba(86,15,15,.9) 0%, rgba(122,30,30,.76) 55%, rgba(66,12,12,.35) 100%);
    }

    .blood.drip{
      border-radius:0 0 8px 8px;
      background:linear-gradient(180deg, rgba(120,22,22,.92) 0%, rgba(67,10,10,.95) 100%);
    }

    .player{
      position:absolute;
      width:90px;
      height:150px;
      left:120px;
      top:320px;
      z-index:20;
      transition:filter .3s ease;
    }

    .player .head{
      position:absolute;
      top:8px;
      left:50%;
      transform:translateX(-50%);
      width:42px;
      height:48px;
      border-radius:22px;
      background:linear-gradient(180deg,#f1cfaf 0%,#ddb28d 100%);
      z-index:3;
    }

    .player.lavinia .head{
      background:linear-gradient(180deg,#f3d7c1 0%,#e1b79b 100%);
    }

    .player .hair{
      position:absolute;
      top:0;
      left:50%;
      transform:translateX(-50%);
      z-index:2;
    }

    .player.titus .hair{
      width:50px;
      height:42px;
      border-radius:25px 25px 18px 18px;
      background:#66686f;
    }

    .player.lavinia .hair{
      width:54px;
      height:64px;
      border-radius:28px 28px 20px 20px;
      background:#6d442d;
    }

    .player .eye{
      position:absolute;
      top:18px;
      width:6px; height:6px;
      border-radius:50%;
      background:#2d1f1a;
    }

    .player .eye.left{ left:12px; }
    .player .eye.right{ right:12px; }

    .player .mouth{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      bottom:10px;
      z-index:5;
    }

    .player.titus.smile .mouth{
      width:16px; height:8px;
      border-bottom:3px solid #7c4337;
      border-radius:0 0 18px 18px;
    }

    .player.titus.neutral .mouth{
      width:14px; height:2px;
      background:#6e4036;
      border-radius:999px;
    }

    .player.titus.grim .mouth{
      width:16px; height:7px;
      border-top:3px solid #603730;
      border-radius:18px 18px 0 0;
      bottom:14px;
    }

    .player.lavinia .mouth{
      width:14px; height:2px;
      background:#8b4c45;
      border-radius:999px;
    }

    .player.lavinia.silent .mouth{
      width:22px; height:8px;
      background:linear-gradient(180deg,#6a4038 0%,#4d2f2c 100%);
      border-radius:999px;
      box-shadow:0 0 0 1px rgba(0,0,0,.18);
    }

    .player.lavinia.silent .mouth::before,
    .player.lavinia.silent .mouth::after{
      content:"";
      position:absolute;
      top:-1px;
      bottom:-1px;
      width:1px;
      background:#251717;
      opacity:.65;
    }

    .player.lavinia.silent .mouth::before{ left:6px; }
    .player.lavinia.silent .mouth::after{ right:6px; }

    .player .torso{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      top:42px;
      width:58px;
      height:90px;
      border-radius:24px 24px 14px 14px;
    }

    .player.titus .torso{
      background:linear-gradient(180deg,#c9ced7 0%,#aab2bf 56%,#7d8694 100%);
      border:2px solid #c39a4a;
    }

    .player.titus.dark .torso{
      background:linear-gradient(180deg,#8e8d96 0%,#6d6e78 56%,#4b4f56 100%);
      border-color:#6a4b35;
    }

    .player.lavinia .torso{
      background:linear-gradient(180deg,#f1dbc7 0%,#d7b89a 55%,#b89074 100%);
      border:2px solid #d0a86f;
    }

    .player.lavinia.silent .torso{
      background:linear-gradient(180deg,#b89f90 0%,#8b7465 55%,#645248 100%);
      border-color:#6e5443;
    }

    .arm{
      position:absolute;
      top:54px;
      width:14px;
      height:58px;
      border-radius:10px;
    }

    .player.titus .arm{
      background:linear-gradient(180deg,#d9dee4 0%,#9ba5b2 100%);
      border:1px solid #c39a4a;
    }

    .player.titus.dark .arm{
      background:linear-gradient(180deg,#8a8a94 0%,#646873 100%);
      border-color:#6a4b35;
    }

    .player.lavinia .arm{
      background:linear-gradient(180deg,#f0d4bf 0%,#d9b297 100%);
      border:1px solid #d0a86f;
    }

    .player.lavinia.silent .arm{
      background:linear-gradient(180deg,#b8a090 0%,#896f62 100%);
      border-color:#6e5443;
      height:42px;
      opacity:.78;
    }

    .arm.left{ left:7px; transform:rotate(10deg); }
    .arm.right{ right:7px; transform:rotate(-10deg); }

    .hand{
      position:absolute;
      width:14px;
      height:14px;
      border-radius:50%;
      bottom:-6px;
      left:50%;
      transform:translateX(-50%);
      background:#ddb18d;
    }

    .player.lavinia .hand{ background:#e4baa0; }
    .player.lavinia.silent .hand{ display:none; }

    .player.lavinia.silent .arm::after{
      content:"";
      position:absolute;
      bottom:-4px;
      left:50%;
      transform:translateX(-50%);
      width:10px;
      height:8px;
      border-radius:999px;
      background:linear-gradient(180deg,#633b36 0%,#442927 100%);
    }

    .leg{
      position:absolute;
      width:14px;
      height:46px;
      bottom:0;
      border-radius:10px;
      background:#70584a;
    }

    .leg.left{ left:26px; }
    .leg.right{ right:26px; }

    .player.titus .leg{ background:#6c7280; }
    .player.titus.dark .leg{ background:#4d5158; }
    .player.lavinia .leg{ background:#9f755e; }
    .player.lavinia.silent .leg{ background:#6d584d; }

    .sword{
      position:absolute;
      right:-6px;
      top:50px;
      width:14px;
      height:84px;
    }

    .blade{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:4px;
      height:64px;
      border-radius:6px;
      background:linear-gradient(180deg,#f7fbff 0%,#d6dbe2 46%,#9aa1ab 100%);
    }

    .hilt{
      position:absolute;
      bottom:14px;
      left:50%;
      transform:translateX(-50%);
      width:20px;
      height:5px;
      border-radius:999px;
      background:#c39a4a;
    }

    .grip{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:6px;
      height:16px;
      border-radius:6px;
      background:#7d5640;
    }

    .sword.stained .blade{
      background:linear-gradient(180deg,#d9d9db 0%,#a99f99 30%,#786968 68%,#534447 100%);
      box-shadow:inset 0 -20px 10px rgba(92,37,35,.28);
    }

    .sword.stained .hilt{ background:#85593d; }
    .sword.stained .grip{ background:#573d2f; }

    .task{
      position:absolute;
      border:2px dashed rgba(255,255,255,.45);
      background:rgba(255,255,255,.08);
      border-radius:14px;
      z-index:12;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:.82rem;
      color:white;
      text-align:center;
      padding:6px;
      backdrop-filter:blur(2px);
    }

    .task.active{
      border-color:rgba(255,229,145,.92);
      box-shadow:0 0 0 3px rgba(255,229,145,.18);
    }

    .task.done{
      border-style:solid;
      border-color:rgba(168,255,168,.65);
      background:rgba(120,180,120,.15);
    }

    .dialogue{
      padding:20px;
    }

    .scene-title{
      margin:0 0 8px 0;
      font-size:1.5rem;
    }

    .scene-meta{
      margin:0 0 14px;
      color:var(--muted);
      line-height:1.5;
    }

    .story{
      min-height:180px;
      line-height:1.8;
      white-space:pre-line;
      margin-bottom:16px;
      font-size:1.02rem;
    }

    .choices{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      background:var(--choice);
      color:var(--text);
      cursor:pointer;
      font:inherit;
      transition:background .18s ease, transform .12s ease;
    }

    .choice:hover{
      background:var(--choice-hover);
      transform:translateY(-1px);
    }

    .char-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .char-btn{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--choice);
      padding:16px;
      text-align:left;
      cursor:pointer;
      font:inherit;
      color:var(--text);
    }

    .char-btn:hover{ background:var(--choice-hover); }

    .char-btn h3{
      margin:0 0 8px;
      font-size:1.2rem;
    }

    .char-btn p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .small-btn{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      font:inherit;
    }

    .small-btn:hover{ background:var(--choice); }

    .note{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:var(--muted);
      line-height:1.55;
      font-size:.95rem;
    }

    .memory-list{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .memory{
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,.08);
      font-size:.9rem;
    }

    .objective{
      margin-top:8px;
      padding:10px 12px;
      background:rgba(255,255,255,.06);
      border:1px solid var(--line);
      border-radius:14px;
      color:var(--muted);
      font-size:.94rem;
      line-height:1.5;
    }

    .hint{
      margin-top:10px;
      color:var(--muted);
      font-size:.9rem;
      line-height:1.5;
    }

    .symbol{
      letter-spacing:.08em;
      font-style:italic;
    }
  </style>
</head>
<body class="theme1">
  <div class="app">
    <div class="top">
      <div>
        <h1>Ash of Rome</h1>
        <div class="sub">A browser-based interactive tragedy inspired by Titus Andronicus. Move with WASD or arrow keys. Complete tasks, trigger scenes, collect memories, and watch the world decay.</div>
      </div>
      <div class="stats">
        <div class="pill" id="actStat">Act —</div>
        <div class="pill" id="charStat">Character —</div>
        <div class="pill" id="violenceStat">Violence 0</div>
        <div class="pill" id="memoryStat">Memories 0/3</div>
        <div class="pill" id="swordStat">Sword Honorable</div>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <div class="scene-wrap">
          <div class="scene" id="scene">
            <div class="layer sky bright" id="sky"></div>
            <div class="sun sunny" id="sun"></div>
            <div class="layer" id="worldLayer"></div>
            <div class="layer" id="bloodLayer"></div>
            <div class="layer" id="taskLayer"></div>
            <div class="player titus smile" id="player"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="dialogue">
          <div id="game"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      node: "intro",
      act: 0,
      character: null,
      violence: 0,
      memories: [],
      sword: "Honorable",
      log: [],
      laviniaSilent: false,
      x: 120,
      y: 320,
      sceneWidth: 900,
      sceneHeight: 680,
      currentTasks: [],
      keys: {},
      movementEnabled: false,
      activeObjective: "",
      interactHint: "Move with WASD or arrow keys. Walk into glowing task zones.",
      soundOn: false
    };

    const memoryNames = {
      honor: "Honor in Rome",
      family: "Family Pride",
      grief: "The Seed of Grief"
    };

    function addMemory(key){
      if(!state.memories.includes(key)) state.memories.push(key);
    }

    function updateTheme(){
      let level = 1;
      if (state.act === 1 && state.violence >= 3) level = 2;
      if (state.act === 2) {
        if (state.violence <= 4) level = 3;
        else if (state.violence <= 8) level = 4;
        else level = 5;
      }
      document.body.className = "theme" + level;
    }

    function updateStats(){
      document.getElementById("actStat").textContent = "Act " + (state.act || "—");

      if (["lavinia2","turningPoint"].includes(state.node)) return "forest";
      if (["act2silence","act2breaking","memoryGrief","bloodDemandsBlood"].includes(state.node)) return "ruins";
      if (["feast","finalChoice"].includes(state.node)) return "feast";
      if (state.node === "ending") return "ash";

    function setTasks(tasks){
      state.currentTasks = tasks.map(t => ({ ...t, done:false }));
      renderTasks();
      state.movementEnabled = true;
    }

    function renderTasks(){
      const layer = document.getElementById("taskLayer");
      if (!state.currentTasks || !state.currentTasks.length) {
        layer.innerHTML = "";
        return;
      }

      layer.innerHTML = state.currentTasks.map((t, i) => `
        <div class="task ${t.done ? "done" : ""}" id="task-${i}"
          style="left:${t.x}px;top:${t.y}px;width:${t.w}px;height:${t.h}px;">
          ${t.label}
        </div>
      `).join("");
    }

    function setObjective(text, hint){
      state.activeObjective = text || "";
      if (hint) state.interactHint = hint;
    }

    function checkTasks(){
      if (!state.currentTasks || !state.currentTasks.length) return;

      let changed = false;
      state.currentTasks.forEach((t, i) => {
        if (t.done) return;
        const px = state.x + 45;
        const py = state.y + 75;
        if (px > t.x && px < t.x + t.w && py > t.y && py < t.y + t.h) {
          t.done = true;
          changed = true;
          if (typeof t.onComplete === "function") t.onComplete();
        }
      });

      if (changed) {
        renderTasks();
        const remaining = state.currentTasks.filter(t => !t.done);
        if (remaining.length === 0) {
          state.movementEnabled = false;
          if (state.currentTasks.onAllDone) state.currentTasks.onAllDone();
        }
      }
    }

      state.character = character;
      state.node = character === "Titus" ? "explore_rome" : "explore_palace";
      state.log.push("Character selected: " + character);
      render();
    }

    function choose(index){
      const node = nodes[state.node];
      const choices = typeof node.choices === "function" ? node.choices() : node.choices;
      const selected = choices[index];
      if (selected.violence) state.violence += selected.violence;
      if (selected.memory) addMemory(selected.memory);
      if (selected.sword) state.sword = selected.sword;
      if (selected.silent === true) state.laviniaSilent = true;
      if (selected.note) state.log.push(selected.note);
      state.node = selected.next;
      render();
    }

              { label:"[trace symbols in the dirt]", next:"memory_grief", violence:1, silent:true, note:"They only partly understand you." },
              { label:"[gesture with your body]", next:"memory_grief", violence:1, silent:true, note:"They see pain, not its full meaning." },
              { label:"[stand in stillness]", next:"memory_grief", violence:0, silent:true, note:"Silence communicates suffering, not explanation." }
            ];
          }
          return [
            { label:"Ask what happened.", next:"memory_grief", violence:1, note:"The question is calm. The answer cannot be." },
            { label:"Demand names.", next:"memory_grief", violence:2, note:"You leap from grief toward revenge." },
            { label:"Swear revenge at once.", next:"memory_grief", violence:3, note:"The oath arrives before reason does." }
          ];
        }
      },

      memory_grief: {
        render: () => `
          <h2 class="scene-title">Final Memory Fragment</h2>
          <p class="scene-meta">Understanding does not save anyone.</p>
          <div class="story">Titus remembers not only duty, but wounded pride. The seed of revenge was always there. Grief merely watered it.

Collect the fragment and continue into blood.</div>
          <div class="objective">Objective: Collect the final memory fragment.</div>
          <div class="hint">${state.interactHint}</div>
        `,
        onEnter(){
          state.x = 90; state.y = 330;
          const tasks = [
            { x:500, y:250, w:120, h:120, label:"Memory", onComplete(){ addMemory("grief"); state.log.push("Memory fragment collected: The Seed of Grief."); } }
          ];
          tasks.onAllDone = () => { state.node = "blood_tasks"; render(); };
          setTasks(tasks);
        }
      },

      blood_tasks: {
        render: () => `
          <h2 class="scene-title">Act 2 — Blood Demands Blood</h2>
          <p class="scene-meta">Now the world becomes uglier, more stained, and more animal.</p>
          <div class="story">Move through the late-stage violence spaces. Blood now marks the environment. Every task pushes the story deeper into revenge.</div>
          <div class="objective">Objective: Reach the prisoner chamber, the weapon stand, and the vengeance hall.</div>
          <div class="hint">${state.interactHint}</div>
        `,
        onEnter(){
          state.x = 110; state.y = 330;
          const tasks = [
            { x:120, y:320, w:120, h:100, label:"Prisoner Chamber", onComplete(){ state.violence += 2; state.log.push("An enemy is within reach."); } },
            { x:390, y:250, w:130, h:100, label:"Weapon Stand", onComplete(){ state.sword = "Stained"; state.log.push("Virtus darkens and no longer looks honorable."); } },
            { x:650, y:220, w:140, h:120, label:"Vengeance Hall", onComplete(){ state.violence += 2; state.log.push("Cruelty becomes easier to choose."); } }
          ];
          tasks.onAllDone = () => { state.node = "blood_choice"; render(); };
          setTasks(tasks);
        }
      },

      blood_choice: {
        title: "Decision — Blood Demands Blood",
        meta: "No nonviolent option remains.",
        text: `An enemy falls within reach. In another story, mercy might interrupt the cycle. In this one, mercy only changes the texture of the same ruin.`,
        choices: [
          { label:"End it quickly.", next:"feast_tasks", violence:2, sword:"Corrupted", note:"Efficiency does not cleanse cruelty." },
          { label:"Force a confession.", next:"feast_tasks", violence:3, sword:"Corrupted", note:"Pain is made to imitate truth." },
          { label:"Make them suffer.", next:"feast_tasks", violence:4, sword:"Corrupted", note:"Cruelty no longer needs an excuse." }
        ]
      },

      feast_tasks: {
        render: () => `
          <h2 class="scene-title">Act 2 — The Feast</h2>
          <p class="scene-meta">Ceremony becomes one more mask for violence.</p>
          <div class="story">Walk through the feast hall and prepare the final stage of the tragedy.</div>
          <div class="objective">Objective: Reach the table, the candles, and the host position.</div>
          <div class="hint">${state.interactHint}</div>
        `,
        onEnter(){
          state.x = 110; state.y = 330;
          const tasks = [
            { x:130, y:310, w:120, h:90, label:"Table", onComplete(){ state.log.push("Violence is dressed as ritual."); } },
            { x:390, y:180, w:130, h:100, label:"Candles", onComplete(){ state.log.push("Calm lighting makes the horror colder."); } },
            { x:650, y:260, w:140, h:100, label:"Host Position", onComplete(){ state.log.push("The last performance is ready."); } }
          ];
          tasks.onAllDone = () => { state.node = "feast_choice"; render(); };
          setTasks(tasks);
        }
      },

      feast_choice: {
        title: "Decision — The Feast",
        meta: "The ugliest form of revenge is the one performed politely.",
        text: `The room pretends to be civilized. The illusion has become grotesque.`,
        choices: [
          { label:"Remain calm.", next:"final_choice", violence:2, note:"Cold control makes the horror sharper." },
          { label:"Taunt them.", next:"final_choice", violence:3, note:"Words become blades before the blade is drawn." },
          { label:"Reveal the truth slowly.", next:"final_choice", violence:4, note:"Delay becomes a form of cruelty." }
        ]
      },

      final_choice: {
        title: "Final Choice — No Choice Left",
        meta: "The final illusion of agency.",
        text: `The game offers one last decision, not because it can save anyone, but because tragedy loves to imitate freedom even as it destroys it.`,
        choices: [
          { label:"Stop.", next:"ending", violence:1, note:"You hesitate. The violence continues anyway." },
          { label:"Finish it.", next:"ending", violence:2, note:"You move without the comfort of illusion." }
        ]
      },

      ending: {
        render: () => `
          <h2 class="scene-title">Ending — Ash</h2>
          <p class="scene-meta">All paths end in tragedy. What changes is only the tone of the descent.</p>
          <div class="story">The sky has turned grey and ugly. The brightness of Act 1 is gone. Pearl white walls have become brown, cracked, and stained with blood.

${getEndingTone()}

${state.character === "Lavinia"
  ? "Lavinia's path makes the loss of agency literal. She begins with voice and ends with visible silence: mouth sealed, hands gone, meaning forced through suffering."
  : "Titus begins as an honorable Roman general. As the game continues, his smile disappears, his sword darkens, and his choices become increasingly violent."}

${state.memories.length === 3
  ? "You collected all three memory fragments. They reveal the tragedy was not a sudden break, but a slow exposure of what was already inside Titus."
  : "You did not collect every memory fragment. The ending remains the same anyway."}

No matter what you chose, revenge consumed honor, violence replaced speech, and human beings descended toward something animal in instinct and ruin.</div>

          <div class="memory-list">
            ${state.memories.length ? state.memories.map(m => `<div class="memory">${memoryNames[m]}</div>`).join("") : `<div class="memory">No memory fragments collected</div>`}
          </div>

          <div class="controls">
            <button class="small-btn" id="restartBtn">Play again</button>
          </div>

          <div class="note">Final violence score: ${state.violence}. Final sword state: ${state.sword}. The ending is fixed by design.</div>
        `
      }
    };

    function renderGamePanel(){
      const game = document.getElementById("game");
      const node = nodes[state.node];

      if (node.onEnter && state._lastNode !== state.node) {
        node.onEnter();
      }

      if (node.render) {
        game.innerHTML = node.render();
      } else {
        const text = typeof node.text === "function" ? node.text() : node.text;
        const choices = typeof node.choices === "function" ? node.choices() : node.choices;
        game.innerHTML = `
          <h2 class="scene-title">${node.title}</h2>
          <p class="scene-meta">${node.meta}</p>
          <div class="story">${text}</div>
          <div class="choices">
            ${choices.map((choice, index) => `
              <button class="choice" data-index="${index}">
                ${state.laviniaSilent && state.character === "Lavinia" && state.act === 2 ? `<span class="symbol">${choice.label}</span>` : choice.label}
              </button>
            `).join("")}
          </div>
          <div class="note">${state.log.length ? state.log[state.log.length - 1] : "Choose a path."}</div>
        `;
      }

      state._lastNode = state.node;
    }

    function renderScene(){
      renderSkyAndWorld(sceneType(), sceneMood());
      renderPlayer();
      renderTasks();
      renderBlood();
    }

    function bindEvents(){
      document.querySelectorAll("[data-character]").forEach(btn => {
        btn.onclick = () => chooseCharacter(btn.getAttribute("data-character"));
      });

      document.querySelectorAll(".choice").forEach(btn => {
        btn.onclick = () => choose(Number(btn.getAttribute("data-index")));
      });

      const restartBtn = document.getElementById("restartBtn");
      if (restartBtn) restartBtn.onclick = restart;
    }

    function render(){
      renderGamePanel();
      renderScene();
      updateStats();
      updateTheme();
      bindEvents();
    }

    function movePlayer(){
      if (!state.movementEnabled) return;
      let speed = 4;

      if (state.keys["ArrowLeft"] || state.keys["a"] || state.keys["A"]) state.x -= speed;
      if (state.keys["ArrowRight"] || state.keys["d"] || state.keys["D"]) state.x += speed;
      if (state.keys["ArrowUp"] || state.keys["w"] || state.keys["W"]) state.y -= speed;
      if (state.keys["ArrowDown"] || state.keys["s"] || state.keys["S"]) state.y += speed;

      const scene = document.getElementById("scene");
      const maxX = scene.clientWidth - 90;
      const maxY = scene.clientHeight - 150;

      state.x = Math.max(0, Math.min(maxX, state.x));
      state.y = Math.max(0, Math.min(maxY, state.y));

      const player = document.getElementById("player");
      if (player) {
        player.style.left = state.x + "px";
        player.style.top = state.y + "px";
      }

      checkTasks();
      renderBlood();
    }

    function loop(){
      movePlayer();
      requestAnimationFrame(loop);
    }

    window.addEventListener("keydown", e => {
      state.keys[e.key] = true;
    });

    window.addEventListener("keyup", e => {
      state.keys[e.key] = false;
    });

    render();
    loop();
  </script>
</body>
</html>
