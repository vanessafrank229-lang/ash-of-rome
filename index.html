<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash of Rome</title>
  <style>
    :root{
      --bg:#efe7dc;
      --panel:rgba(255,248,239,0.88);
      --panel-solid:#fff8ef;
      --text:#211c18;
      --muted:#655d55;
      --gold:#b08946;
      --line:#d9c8ad;
      --choice:#f7eedf;
      --choice-hover:#eedfc7;
      --shadow:0 18px 48px rgba(0,0,0,0.14);
      --soft-shadow:0 8px 22px rgba(0,0,0,0.12);
    }

    body.theme-1{
      --bg:#efe7dc;
      --panel:rgba(255,248,239,0.88);
      --panel-solid:#fff8ef;
      --text:#211c18;
      --muted:#655d55;
      --gold:#b08946;
      --line:#d9c8ad;
      --choice:#f7eedf;
      --choice-hover:#eedfc7;
    }

    body.theme-2{
      --bg:#e5d8c7;
      --panel:rgba(241,229,215,0.89);
      --panel-solid:#f1e5d7;
      --text:#2a231e;
      --muted:#62584f;
      --gold:#906a49;
      --line:#c2af98;
      --choice:#e9dbc8;
      --choice-hover:#dbc6ad;
    }

    body.theme-3{
      --bg:#b8ab9d;
      --panel:rgba(205,192,178,0.88);
      --panel-solid:#cdc0b2;
      --text:#28221e;
      --muted:#534a42;
      --gold:#755843;
      --line:#a08d7b;
      --choice:#c5b5a4;
      --choice-hover:#b39d89;
    }

    body.theme-4{
      --bg:#6d6760;
      --panel:rgba(132,123,114,0.88);
      --panel-solid:#847b72;
      --text:#f1ebe4;
      --muted:#ddd2c9;
      --gold:#6f4136;
      --line:#5d554f;
      --choice:#776d65;
      --choice-hover:#665c55;
    }

    body.theme-5{
      --bg:#383635;
      --panel:rgba(74,69,67,0.9);
      --panel-solid:#4a4543;
      --text:#f4eee8;
      --muted:#cdc3ba;
      --gold:#5a2b26;
      --line:#34302e;
      --choice:#514947;
      --choice-hover:#433d3a;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--text);
      background:var(--bg);
      transition:background 0.8s ease,color 0.5s ease;
      min-height:100vh;
    }

    .app{
      max-width:1100px;
      margin:0 auto;
      padding:22px 16px 56px;
    }

    .top{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .title-wrap h1{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
      letter-spacing:0.02em;
    }

    .subtitle{
      margin-top:7px;
      color:var(--muted);
      line-height:1.55;
      max-width:720px;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      padding:8px 12px;
      border:1px solid var(--line);
      border-radius:999px;
      background:var(--panel-solid);
      box-shadow:var(--soft-shadow);
      color:var(--muted);
      font-size:0.92rem;
      white-space:nowrap;
    }

    .layout{
      display:grid;
      grid-template-columns: 1.2fr 0.95fr;
      gap:18px;
      align-items:start;
    }

    @media (max-width: 900px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    .scene-card, .story-card{
      background:var(--panel);
      backdrop-filter: blur(6px);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .scene-stage{
      position:relative;
      width:100%;
      min-height:620px;
      background:#ddd;
    }

    @media (max-width: 900px){
      .scene-stage{
        min-height:480px;
      }
    }

    @media (max-width: 640px){
      .scene-stage{
        min-height:400px;
      }
    }

    .sky{
      position:absolute;
      inset:0;
      transition:all 0.8s ease;
    }

    .sky.bright{
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.38) 0 9%, transparent 10%),
        linear-gradient(180deg, #86c9ff 0%, #d7f0ff 42%, #f5e8d5 100%);
    }

    .sky.warm{
      background:
        radial-gradient(circle at 20% 18%, rgba(255,246,212,0.45) 0 8%, transparent 10%),
        linear-gradient(180deg, #d3bc8f 0%, #ead7bb 44%, #d8cab5 100%);
    }

    .sky.dirty{
      background:
        radial-gradient(circle at 25% 20%, rgba(210,196,164,0.15) 0 8%, transparent 10%),
        linear-gradient(180deg, #8a8277 0%, #99907f 38%, #746d67 100%);
    }

    .sky.ash{
      background:
        radial-gradient(circle at 22% 18%, rgba(179,172,160,0.12) 0 7%, transparent 9%),
        linear-gradient(180deg, #4b4a49 0%, #585552 38%, #3a3837 100%);
    }

    .sun-moon{
      position:absolute;
      top:44px;
      left:68px;
      width:90px;
      height:90px;
      border-radius:50%;
      transition:all 0.8s ease;
      box-shadow:0 0 40px rgba(255,255,255,0.25);
    }

    .sunny{
      background:radial-gradient(circle at 35% 35%, #fffbe7 0%, #ffe39c 42%, #efba4d 82%, rgba(239,186,77,0.1) 100%);
      opacity:1;
    }

    .fading-sun{
      background:radial-gradient(circle at 35% 35%, #efe4c0 0%, #c7a971 45%, #937151 80%, rgba(147,113,81,0.12) 100%);
      opacity:0.85;
    }

    .hidden-sun{
      background:radial-gradient(circle at 35% 35%, #8d8377 0%, #625d58 48%, #4a4744 82%, rgba(74,71,68,0.12) 100%);
      opacity:0.4;
      filter:blur(1px);
    }

    .architecture,
    .forest-layer,
    .feast-room,
    .ruin-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .rome-bright .col,
    .rome-warm .col,
    .rome-dirty .col,
    .rome-ash .col{
      position:absolute;
      bottom:150px;
      width:56px;
      border-radius:14px 14px 0 0;
    }

    .rome-bright .col{
      background:linear-gradient(180deg, #fffdf8 0%, #f3ece2 70%, #d8c6aa 100%);
      box-shadow:inset 0 -16px 28px rgba(145,119,73,0.08);
    }

    .rome-warm .col{
      background:linear-gradient(180deg, #efe6d9 0%, #d9ccb9 70%, #b99f7e 100%);
    }

    .rome-dirty .col{
      background:linear-gradient(180deg, #b9afa2 0%, #968977 70%, #706255 100%);
    }

    .rome-ash .col{
      background:linear-gradient(180deg, #7f7871 0%, #5c5752 70%, #413d3a 100%);
    }

    .rome-bright .wall,
    .rome-warm .wall,
    .rome-dirty .wall,
    .rome-ash .wall{
      position:absolute;
      left:8%;
      right:8%;
      bottom:0;
      height:190px;
      border-radius:28px 28px 0 0;
    }

    .rome-bright .wall{
      background:
        linear-gradient(180deg, #fffaf1 0%, #f5ead8 56%, #e0cfb4 100%);
      box-shadow: inset 0 -16px 20px rgba(185,156,111,0.12);
    }

    .rome-warm .wall{
      background:linear-gradient(180deg, #efe0cb 0%, #d7c2a2 56%, #b39173 100%);
    }

    .rome-dirty .wall{
      background:linear-gradient(180deg, #b8aa9c 0%, #8f7f6d 56%, #675849 100%);
    }

    .rome-ash .wall{
      background:linear-gradient(180deg, #7b756f 0%, #595550 56%, #3f3d3a 100%);
    }

    .stain{
      position:absolute;
      border-radius:50%;
      opacity:0.18;
      filter:blur(2px);
    }

    .stain.s1{ width:120px; height:48px; left:16%; top:38%; background:#7f4e3a; }
    .stain.s2{ width:140px; height:54px; right:19%; top:46%; background:#5f4639; }
    .stain.s3{ width:86px; height:32px; left:48%; top:58%; background:#4e3d33; }

    .crack{
      position:absolute;
      width:2px;
      background:#453d39;
      opacity:0.42;
      transform-origin:top center;
    }

    .cr1{ height:110px; left:25%; top:38%; transform:rotate(24deg); }
    .cr2{ height:86px; left:57%; top:42%; transform:rotate(-18deg); }
    .cr3{ height:92px; right:24%; top:34%; transform:rotate(13deg); }

    .forest-layer .tree{
      position:absolute;
      bottom:120px;
      width:28px;
      border-radius:10px 10px 0 0;
      background:linear-gradient(180deg, #6f4a2b 0%, #4f341e 100%);
    }

    .forest-layer .crown{
      position:absolute;
      border-radius:50%;
    }

    .forest-bright .tree{ background:linear-gradient(180deg, #7b4f30 0%, #5a3921 100%); }
    .forest-dark .tree{ background:linear-gradient(180deg, #463428 0%, #31241c 100%); }

    .forest-bright .crown{ background:radial-gradient(circle at 35% 35%, #8bd16d 0%, #5f9e43 68%, #497534 100%); }
    .forest-dark .crown{ background:radial-gradient(circle at 35% 35%, #5e6d55 0%, #3f4a3d 68%, #2f372d 100%); }

    .ground{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:140px;
    }

    .ground.bright{
      background:linear-gradient(180deg, #a3c26d 0%, #78934a 65%, #617238 100%);
    }

    .ground.dirty{
      background:linear-gradient(180deg, #746b58 0%, #574f43 65%, #443d35 100%);
    }

    .feast-room .back-wall{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, #6a5950 0%, #50423b 48%, #413733 100%);
    }

    .feast-room .table{
      position:absolute;
      left:8%;
      right:8%;
      bottom:60px;
      height:110px;
      border-radius:18px 18px 0 0;
      background:linear-gradient(180deg, #5f4336 0%, #3b2a23 100%);
      box-shadow:0 -6px 0 rgba(255,255,255,0.05) inset;
    }

    .feast-room .candle{
      position:absolute;
      width:16px;
      bottom:158px;
      background:#e4d8c1;
      border-radius:4px 4px 0 0;
    }

    .feast-room .flame{
      position:absolute;
      width:18px;
      height:26px;
      border-radius:50% 50% 50% 50%;
      background:radial-gradient(circle at 50% 30%, #fff8da 0%, #ffc96f 45%, rgba(255,184,66,0.12) 100%);
      top:-22px;
      left:-1px;
      box-shadow:0 0 18px rgba(255,195,92,0.55);
    }

    .scene-fade{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,0.04) 0%, rgba(0,0,0,0.07) 42%, rgba(0,0,0,0.3) 100%);
      pointer-events:none;
    }

    .character-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .character{
      position:absolute;
      bottom:0;
      width:260px;
      height:470px;
      transition:all 0.6s ease;
      filter:drop-shadow(0 10px 22px rgba(0,0,0,0.38));
    }

    .character.right{ right:30px; }
    .character.left{ left:30px; }

    @media (max-width: 640px){
      .character{
        width:205px;
        height:380px;
      }
      .character.right{ right:10px; }
      .character.left{ left:10px; }
    }

    .body-robe{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:170px;
      height:280px;
      border-radius:80px 80px 26px 26px;
      overflow:hidden;
    }

    .titus .body-robe{
      background:linear-gradient(180deg, #c9ced7 0%, #aab2bf 56%, #7d8694 100%);
      border:4px solid #c39a4a;
    }

    .titus.dark .body-robe{
      background:linear-gradient(180deg, #8e8d96 0%, #6d6e78 56%, #4b4f56 100%);
      border-color:#6a4b35;
    }

    .lavinia .body-robe{
      background:linear-gradient(180deg, #f1dbc7 0%, #d7b89a 55%, #b89074 100%);
      border:4px solid #d0a86f;
    }

    .lavinia.silent .body-robe{
      background:linear-gradient(180deg, #b89f90 0%, #8b7465 55%, #645248 100%);
      border-color:#6e5443;
    }

    .head{
      position:absolute;
      top:52px;
      left:50%;
      transform:translateX(-50%);
      width:112px;
      height:126px;
      border-radius:52px 52px 48px 48px;
      background:linear-gradient(180deg, #f1cfaf 0%, #ddb28d 100%);
      z-index:3;
    }

    .lavinia .head{
      background:linear-gradient(180deg, #f3d7c1 0%, #e1b79b 100%);
    }

    .hair{
      position:absolute;
      top:34px;
      left:50%;
      transform:translateX(-50%);
      width:132px;
      height:130px;
      border-radius:60px 60px 48px 48px;
      z-index:2;
    }

    .titus .hair{
      background:linear-gradient(180deg, #6f6f74 0%, #505057 100%);
      clip-path:ellipse(50% 44% at 50% 28%);
    }

    .lavinia .hair{
      background:linear-gradient(180deg, #7e4e32 0%, #5f3925 100%);
      height:170px;
      width:142px;
      clip-path:ellipse(50% 48% at 50% 24%);
    }

    .eye{
      position:absolute;
      top:58px;
      width:14px;
      height:10px;
      border-radius:50%;
      background:#31231d;
      z-index:4;
    }

    .eye.left{ left:28px; }
    .eye.right{ right:28px; }

    .brow{
      position:absolute;
      top:48px;
      width:22px;
      height:5px;
      background:#5d463a;
      border-radius:10px;
      z-index:4;
    }

    .brow.left{ left:22px; transform:rotate(-8deg); }
    .brow.right{ right:22px; transform:rotate(8deg); }

    .nose{
      position:absolute;
      top:68px;
      left:50%;
      transform:translateX(-50%);
      width:10px;
      height:20px;
      border-radius:5px;
      background:rgba(171,110,79,0.46);
      z-index:4;
    }

    .mouth{
      position:absolute;
      bottom:28px;
      left:50%;
      transform:translateX(-50%);
      z-index:4;
      transition:all 0.5s ease;
    }

    .titus .mouth{
      width:34px;
      height:16px;
      border-bottom:4px solid #7c4337;
      border-radius:0 0 30px 30px;
    }

    .titus.neutral .mouth{
      width:30px;
      height:4px;
      border-bottom:3px solid #6e4036;
      border-radius:6px;
    }

    .titus.grim .mouth{
      width:34px;
      height:10px;
      border-top:4px solid #603730;
      border-bottom:none;
      border-radius:18px 18px 0 0;
      bottom:34px;
    }

    .lavinia .mouth{
      width:28px;
      height:4px;
      background:#8b4c45;
      border-radius:999px;
    }

    .lavinia.silent .mouth{
      width:44px;
      height:14px;
      background:linear-gradient(180deg, #6a4038 0%, #4d2f2c 100%);
      border-radius:999px;
      box-shadow:
        0 0 0 2px rgba(56,34,33,0.24) inset,
        0 0 0 1px rgba(0,0,0,0.18);
    }

    .lavinia.silent .mouth::before,
    .lavinia.silent .mouth::after{
      content:"";
      position:absolute;
      top:-2px;
      bottom:-2px;
      width:2px;
      background:#2a1c1b;
      opacity:0.55;
    }

    .lavinia.silent .mouth::before{ left:11px; }
    .lavinia.silent .mouth::after{ right:11px; }

    .arm{
      position:absolute;
      top:186px;
      width:34px;
      height:150px;
      border-radius:20px;
      z-index:1;
      transition:all 0.5s ease;
    }

    .titus .arm{
      background:linear-gradient(180deg, #d9dee4 0%, #9ba5b2 100%);
      border:3px solid #c39a4a;
    }

    .titus.dark .arm{
      background:linear-gradient(180deg, #8a8a94 0%, #646873 100%);
      border-color:#6a4b35;
    }

    .lavinia .arm{
      background:linear-gradient(180deg, #f0d4bf 0%, #d9b297 100%);
      border:3px solid #d0a86f;
    }

    .lavinia.silent .arm{
      background:linear-gradient(180deg, #b8a090 0%, #896f62 100%);
      border-color:#6e5443;
    }

    .arm.left{ left:28px; transform:rotate(9deg); }
    .arm.right{ right:28px; transform:rotate(-9deg); }

    .hand{
      position:absolute;
      bottom:-12px;
      left:50%;
      transform:translateX(-50%);
      width:34px;
      height:34px;
      border-radius:50%;
      background:#e1b490;
    }

    .lavinia .hand{ background:#e4baa0; }
    .titus .hand{ background:#ddb18d; }

    .lavinia.silent .hand{
      display:none;
    }

    .lavinia.silent .arm{
      height:118px;
      opacity:0.72;
    }

    .lavinia.silent .arm::after{
      content:"";
      position:absolute;
      bottom:-6px;
      left:50%;
      transform:translateX(-50%);
      width:26px;
      height:16px;
      border-radius:10px;
      background:linear-gradient(180deg, #633b36 0%, #442927 100%);
      box-shadow:0 0 0 1px rgba(0,0,0,0.18);
    }

    .sword{
      position:absolute;
      right:18px;
      top:174px;
      width:18px;
      height:200px;
      z-index:0;
    }

    .blade{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      width:8px;
      height:164px;
      border-radius:6px;
      background:linear-gradient(180deg, #f7fbff 0%, #d6dbe2 46%, #9aa1ab 100%);
      box-shadow:0 0 0 1px rgba(0,0,0,0.16);
    }

    .hilt{
      position:absolute;
      bottom:26px;
      left:50%;
      transform:translateX(-50%);
      width:46px;
      height:10px;
      border-radius:999px;
      background:#c39a4a;
    }

    .grip{
      position:absolute;
      bottom:0;
      left:50%;
      transform:translateX(-50%);
      width:12px;
      height:34px;
      border-radius:8px;
      background:#7d5640;
    }

    .sword.stained .blade{
      background:linear-gradient(180deg, #d9d9db 0%, #a99f99 30%, #786968 68%, #534447 100%);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.22),
        inset 0 -40px 18px rgba(92,37,35,0.28);
    }

    .sword.stained .hilt{ background:#85593d; }
    .sword.stained .grip{ background:#573d2f; }

    .blood-smear{
      position:absolute;
      width:18px;
      height:72px;
      left:50%;
      top:48px;
      transform:translateX(-50%) rotate(7deg);
      background:linear-gradient(180deg, rgba(112,32,30,0.05) 0%, rgba(112,32,30,0.46) 40%, rgba(60,14,15,0.12) 100%);
      border-radius:16px;
    }

    .dialogue{
      padding:22px;
    }

    .scene-title{
      margin:0 0 8px 0;
      font-size:1.55rem;
    }

    .scene-meta{
      margin:0 0 16px 0;
      color:var(--muted);
      line-height:1.5;
    }

    .story{
      min-height:210px;
      line-height:1.84;
      font-size:1.06rem;
      white-space:pre-line;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      gap:12px;
      margin-top:16px;
    }

    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 16px;
      background:var(--choice);
      color:var(--text);
      cursor:pointer;
      font:inherit;
      transition:background 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
    }

    .choice:hover{
      background:var(--choice-hover);
      transform:translateY(-1px);
    }

    .choice:active{
      transform:translateY(0);
    }

    .character-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:14px;
      margin-top:16px;
    }

    .char-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:var(--choice);
      padding:16px;
      text-align:left;
      cursor:pointer;
      transition:background 0.18s ease, transform 0.12s ease;
      font:inherit;
      color:var(--text);
    }

    .char-card:hover{
      background:var(--choice-hover);
      transform:translateY(-2px);
    }

    .char-card h3{
      margin:0 0 8px;
      font-size:1.2rem;
    }

    .char-card p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .small-btn{
      border:1px solid var(--line);
      border-radius:12px;
      padding:10px 12px;
      background:transparent;
      color:var(--text);
      cursor:pointer;
      font:inherit;
    }

    .small-btn:hover{
      background:var(--choice);
    }

    .note{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--line);
      color:var(--muted);
      line-height:1.6;
      font-size:0.95rem;
    }

    .memory-list{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:12px;
    }

    .memory{
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,0.08);
      font-size:0.9rem;
    }

    .symbol{
      letter-spacing:0.08em;
      font-style:italic;
    }

    .sound-box{
      margin-top:12px;
      border-top:1px solid var(--line);
      padding-top:12px;
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.5;
    }

    .ending-story{
      min-height:auto;
    }
  </style>
</head>
<body class="theme-1">
  <div class="app">
    <div class="top">
      <div class="title-wrap">
        <h1>Ash of Rome</h1>
        <div class="subtitle">A visual interactive tragedy inspired by Titus Andronicus. Act 1 begins bright and ceremonial. Act 2 sinks into revenge, silence, and ruin.</div>
      </div>
      <div class="stats">
        <div class="pill" id="actStat">Act —</div>
        <div class="pill" id="charStat">Character —</div>
        <div class="pill" id="violenceStat">Violence 0</div>
        <div class="pill" id="memoryStat">Memories 0/3</div>
        <div class="pill" id="swordStat">Sword Honorable</div>
      </div>
    </div>

    <div class="layout">
      <div class="scene-card">
        <div class="scene-stage" id="sceneStage">
          <div class="sky bright" id="sky"></div>
          <div class="sun-moon sunny" id="sun"></div>

          <div class="architecture rome-bright" id="architectureLayer"></div>
          <div class="forest-layer" id="forestLayer"></div>
          <div class="ruin-layer" id="ruinLayer"></div>
          <div class="feast-room" id="feastLayer"></div>

          <div class="character-layer" id="characterLayer"></div>
          <div class="scene-fade"></div>
        </div>
      </div>

      <div class="story-card">
        <div class="dialogue">
          <div id="game"></div>

          <div class="sound-box">
            <div>Sound: simple built-in ambient tones and click sounds.</div>
            <div class="controls">
              <button class="small-btn" id="toggleSoundBtn">Sound On</button>
              <button class="small-btn" id="playToneBtn">Play Ambience</button>
              <button class="small-btn" id="stopToneBtn">Stop Ambience</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const state = {
      node: "intro",
      act: 0,
      character: null,
      violence: 0,
      memories: [],
      sword: "Honorable",
      log: [],
      laviniaSilent: false,
      soundOn: true,
      ambienceOn: false
    };

    const memoryNames = {
      honor: "Honor in Rome",
      family: "Family Pride",
      grief: "The Seed of Grief"
    };

    let audioCtx = null;
    let ambienceNodes = [];

    function ensureAudio(){
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioCtx = new Ctx();
      }
      return audioCtx;
    }

    function simpleTone(freq = 220, duration = 0.09, type = "triangle", gainValue = 0.02){
      if (!state.soundOn) return;
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = gainValue;
      osc.connect(gain);
      gain.connect(ctx.destination);
      const now = ctx.currentTime;
      gain.gain.setValueAtTime(gainValue, now);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.start(now);
      osc.stop(now + duration);
    }

    function choiceClickSound(){
      simpleTone(250, 0.08, "triangle", 0.018);
      setTimeout(() => simpleTone(180, 0.11, "sine", 0.014), 45);
    }

    function startAmbience(){
      if (!state.soundOn) return;
      const ctx = ensureAudio();
      if (!ctx) return;
      stopAmbience();

      const master = ctx.createGain();
      master.gain.value = 0.018;
      master.connect(ctx.destination);

      const osc1 = ctx.createOscillator();
      const osc2 = ctx.createOscillator();
      const lfo = ctx.createOscillator();
      const lfoGain = ctx.createGain();

      osc1.type = "sine";
      osc2.type = "triangle";
      lfo.type = "sine";

      const base = state.act < 2 ? 196 : 132;
      osc1.frequency.value = base;
      osc2.frequency.value = base / 2;
      lfo.frequency.value = 0.15;
      lfoGain.gain.value = 8;

      lfo.connect(lfoGain);
      lfoGain.connect(osc1.frequency);

      osc1.connect(master);
      osc2.connect(master);

      osc1.start();
      osc2.start();
      lfo.start();

      ambienceNodes = [osc1, osc2, lfo, master];
      state.ambienceOn = true;
      updateSoundButtons();
    }

    function stopAmbience(){
      if (ambienceNodes.length) {
        ambienceNodes.forEach(node => {
          try { node.stop && node.stop(); } catch(e){}
          try { node.disconnect && node.disconnect(); } catch(e){}
        });
      }
      ambienceNodes = [];
      state.ambienceOn = false;
      updateSoundButtons();
    }

    function updateSoundButtons(){
      const toggle = document.getElementById("toggleSoundBtn");
      const play = document.getElementById("playToneBtn");
      const stop = document.getElementById("stopToneBtn");
      if (toggle) toggle.textContent = state.soundOn ? "Sound On" : "Sound Off";
      if (play) play.disabled = !state.soundOn;
      if (stop) stop.disabled = !state.soundOn;
    }

    function addMemory(key){
      if(!state.memories.includes(key)) {
        state.memories.push(key);
      }
    }

    function updateTheme(){
      let level = 1;
      if (state.act === 1) {
        if (state.violence >= 3) level = 2;
      }
      if (state.act === 2) {
        if (state.violence <= 4) level = 3;
        else if (state.violence <= 8) level = 4;
        else level = 5;
      }
      document.body.className = "theme-" + level;
    }

    function updateStats(){
      document.getElementById("actStat").textContent = "Act " + (state.act || "—");
      document.getElementById("charStat").textContent = "Character " + (state.character || "—");
      document.getElementById("violenceStat").textContent = "Violence " + state.violence;
      document.getElementById("memoryStat").textContent = "Memories " + state.memories.length + "/3";
      document.getElementById("swordStat").textContent = "Sword " + state.sword;
    }

    function chooseCharacter(character){
      state.character = character;
      state.node = character === "Titus" ? "titus1" : "lavinia1";
      state.log.push("Character selected: " + character);
      choiceClickSound();
      render();
    }

    function choose(index){
      const node = nodes[state.node];
      const choices = typeof node.choices === "function" ? node.choices() : node.choices;
      const selected = choices[index];

      if(selected.violence) state.violence += selected.violence;
      if(selected.memory) addMemory(selected.memory);
      if(selected.sword) state.sword = selected.sword;
      if(selected.silent === true) state.laviniaSilent = true;
      if(selected.note) state.log.push(selected.note);

      choiceClickSound();
      state.node = selected.next;
      render();
    }

    function restart(){
      state.node = "intro";
      state.act = 0;
      state.character = null;
      state.violence = 0;
      state.memories = [];
      state.sword = "Honorable";
      state.log = [];
      state.laviniaSilent = false;
      choiceClickSound();
      render();
    }

    function getEndingTone(){
      if(state.violence <= 6){
        return "You tried to hold onto dignity. The game let you phrase violence as restraint, justice, or sorrow. It still ended in blood.";
      } else if(state.violence <= 10){
        return "You moved through the story by degrees, each decision a little harsher than the last. The descent felt reasonable while it was happening. That is part of the horror.";
      } else {
        return "You embraced revenge openly. By the end, honor had rotted into appetite. The people on screen no longer resemble civilized Romans as much as wounded creatures acting on instinct.";
      }
    }

    function currentSceneType(){
      if (["lavinia2", "turningPoint"].includes(state.node)) return "forest";
      if (["act2silence", "act2breaking", "memoryGrief", "bloodDemandsBlood"].includes(state.node)) return "ruins";
      if (["feast", "finalChoice"].includes(state.node)) return "feast";
      if (state.node === "ending") return "ash";
      return "rome";
    }

    function currentVisualMood(){
      if (state.act === 0) return "bright";
      if (state.act === 1 && state.violence < 3) return "bright";
      if (state.act === 1) return "warm";
      if (state.act === 2 && state.violence <= 4) return "dirty";
      return "ash";
    }

    function renderArchitecture(type, mood){
      const architecture = document.getElementById("architectureLayer");
      const forest = document.getElementById("forestLayer");
      const ruins = document.getElementById("ruinLayer");
      const feast = document.getElementById("feastLayer");

      architecture.innerHTML = "";
      forest.innerHTML = "";
      ruins.innerHTML = "";
      feast.innerHTML = "";

      if (type === "rome") {
        const cls = mood === "bright" ? "rome-bright" : mood === "warm" ? "rome-warm" : mood === "dirty" ? "rome-dirty" : "rome-ash";
        architecture.className = "architecture " + cls;
        architecture.innerHTML = `
          <div class="wall"></div>
          <div class="col" style="left:12%; height:270px;"></div>
          <div class="col" style="left:28%; height:310px;"></div>
          <div class="col" style="left:44%; height:285px;"></div>
          <div class="col" style="left:60%; height:320px;"></div>
          <div class="col" style="left:76%; height:268px;"></div>
          ${mood !== "bright" ? `
            <div class="stain s1"></div>
            <div class="stain s2"></div>
            <div class="stain s3"></div>
          ` : ``}
          ${mood === "ash" || mood === "dirty" ? `
            <div class="crack cr1"></div>
            <div class="crack cr2"></div>
            <div class="crack cr3"></div>
          ` : ``}
        `;
      } else if (type === "forest") {
        architecture.className = "architecture";
        const forestClass = mood === "bright" ? "forest-bright" : "forest-dark";
        forest.className = "forest-layer " + forestClass;
        forest.innerHTML = `
          <div class="tree" style="left:8%; height:230px;"></div>
          <div class="crown" style="left:2%; bottom:260px; width:130px; height:130px;"></div>

          <div class="tree" style="left:24%; height:300px;"></div>
          <div class="crown" style="left:16%; bottom:310px; width:170px; height:150px;"></div>

          <div class="tree" style="left:47%; height:255px;"></div>
          <div class="crown" style="left:39%; bottom:280px; width:160px; height:140px;"></div>

          <div class="tree" style="left:72%; height:320px;"></div>
          <div class="crown" style="left:65%; bottom:330px; width:175px; height:150px;"></div>

          <div class="ground ${mood === "bright" ? "bright" : "dirty"}"></div>
        `;
      } else if (type === "ruins") {
        ruins.className = "ruin-layer";
        ruins.innerHTML = `
          <div class="architecture rome-ash">
            <div class="wall"></div>
            <div class="col" style="left:12%; height:190px;"></div>
            <div class="col" style="left:28%; height:230px;"></div>
            <div class="col" style="left:44%; height:200px;"></div>
            <div class="col" style="left:60%; height:250px;"></div>
            <div class="col" style="left:76%; height:180px;"></div>
            <div class="stain s1"></div>
            <div class="stain s2"></div>
            <div class="stain s3"></div>
            <div class="crack cr1"></div>
            <div class="crack cr2"></div>
            <div class="crack cr3"></div>
          </div>
        `;
      } else if (type === "feast") {
        feast.className = "feast-room";
        feast.innerHTML = `
          <div class="back-wall"></div>
          <div class="table"></div>
          <div class="candle" style="left:18%;"><div class="flame"></div></div>
          <div class="candle" style="left:36%;"><div class="flame"></div></div>
          <div class="candle" style="right:36%;"><div class="flame"></div></div>
          <div class="candle" style="right:18%;"><div class="flame"></div></div>
        `;
      } else if (type === "ash") {
        ruins.className = "ruin-layer";
        ruins.innerHTML = `
          <div class="architecture rome-ash">
            <div class="wall"></div>
            <div class="col" style="left:12%; height:140px;"></div>
            <div class="col" style="left:28%; height:180px;"></div>
            <div class="col" style="left:44%; height:130px;"></div>
            <div class="col" style="left:60%; height:170px;"></div>
            <div class="col" style="left:76%; height:120px;"></div>
            <div class="stain s1"></div>
            <div class="stain s2"></div>
            <div class="stain s3"></div>
            <div class="crack cr1"></div>
            <div class="crack cr2"></div>
            <div class="crack cr3"></div>
          </div>
        `;
      }
    }

    function renderSky(type, mood){
      const sky = document.getElementById("sky");
      const sun = document.getElementById("sun");

      if (mood === "bright") {
        sky.className = "sky bright";
        sun.className = "sun-moon sunny";
      } else if (mood === "warm") {
        sky.className = "sky warm";
        sun.className = "sun-moon fading-sun";
      } else if (mood === "dirty") {
        sky.className = "sky dirty";
        sun.className = "sun-moon hidden-sun";
      } else {
        sky.className = "sky ash";
        sun.className = "sun-moon hidden-sun";
      }

      if (type === "forest" && mood === "bright") {
        sun.style.top = "36px";
        sun.style.left = "78px";
      } else {
        sun.style.top = "44px";
        sun.style.left = "68px";
      }
    }

    function titusMoodClass(){
      if (state.act === 0) return "";
      if (state.act === 1 && state.violence <= 2) return "";
      if (state.act === 1) return "neutral";
      if (state.act === 2 && state.violence <= 6) return "neutral";
      return "grim";
    }

    function renderCharacter(){
      const layer = document.getElementById("characterLayer");
      layer.innerHTML = "";

      if (state.node === "intro" || state.node === "ending") return;

      if (state.character === "Titus" || ["titus1","titus2","titus3","memoryHonor","memoryGrief","act2breaking","bloodDemandsBlood","feast","finalChoice"].includes(state.node)) {
        const mood = titusMoodClass();
        const dark = state.act === 2 ? "dark" : "";
        const swordClass = state.sword === "Honorable" ? "" : "stained";
        layer.innerHTML = `
          <div class="character titus ${dark} ${mood} right">
            <div class="hair"></div>
            <div class="head">
              <div class="brow left"></div>
              <div class="brow right"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
            </div>
            <div class="body-robe"></div>
            <div class="arm left"><div class="hand"></div></div>
            <div class="arm right"><div class="hand"></div></div>
            <div class="sword ${swordClass}">
              <div class="blade"></div>
              ${swordClass ? `<div class="blood-smear"></div>` : ``}
              <div class="hilt"></div>
              <div class="grip"></div>
            </div>
          </div>
        `;
        return;
      }

      if (state.character === "Lavinia" || ["lavinia1","lavinia2","turningPoint","act2silence"].includes(state.node)) {
        const silent = state.laviniaSilent || state.node === "act2silence";
        layer.innerHTML = `
          <div class="character lavinia ${silent ? "silent" : ""} left">
            <div class="hair"></div>
            <div class="head">
              <div class="brow left"></div>
              <div class="brow right"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="nose"></div>
              <div class="mouth"></div>
            </div>
            <div class="body-robe"></div>
            <div class="arm left"><div class="hand"></div></div>
            <div class="arm right"><div class="hand"></div></div>
          </div>
        `;
      }
    }

    const nodes = {
      intro: {
        render: () => `
          <h2 class="scene-title">Choose your path into the tragedy</h2>
          <p class="scene-meta">Act 1 represents the better state. Act 2 represents the worse. The player is offered choices, but the ending remains fixed by design.</p>
          <div class="story">Rome still glows beneath a bright sky. Marble walls remain pearl white. Order still appears possible.

You may begin as Titus, a Roman general who looks honorable and rational before revenge consumes him.

Or you may begin as Lavinia, who starts with voice, presence, and freedom before the story reduces her to silence and mutilation.

No matter what path you choose, the tragedy closes in the same place.</div>

          <div class="character-grid">
            <button class="char-card" data-character="Titus">
              <h3>Titus</h3>
              <p>He begins composed, respected, and almost warm. As revenge grows, his face hardens, his smile disappears, and his sword becomes a shameful thing.</p>
            </button>
            <button class="char-card" data-character="Lavinia">
              <h3>Lavinia</h3>
              <p>She begins vivid and expressive. In Act 2, the game makes her silence visible: her mouth is sealed and her hands are gone.</p>
            </button>
          </div>
        `
      },

      titus1: {
        act: 1,
        title: "Level 1 — Return to Rome",
        meta: "Act 1. Ceremony, sunlight, and public honor.",
        text: `The city receives you in warmth and applause. Pearl-white marble catches the light. Gold glints across armor, banners, and temple stone. At your side hangs Virtus, a sword polished so brightly it resembles a promise.

A captured enemy kneels before you and begs for mercy. The crowd watches, eager to see what form Roman strength will take.`,
        choices: [
          { label: "Spare him. Rome shows strength through mercy.", next: "titus2", violence: 1, note: "He is removed from sight and executed anyway in the name of order." },
          { label: "Execute him. Rome must be feared.", next: "titus2", violence: 2, note: "The crowd praises the execution as disciplined necessity." },
          { label: "Let the gods decide his fate.", next: "titus2", violence: 1, note: "Priests take over. Ritual only changes the style of the death." }
        ]
      },

      titus2: {
        act: 1,
        title: "Level 2 — The Throne Decision",
        meta: "Politics still pretends to be reason.",
        text: `Rome turns from victory to succession. Nobles speak of law. Soldiers speak of force. Everyone calls their own wish justice.

You are asked where your support lies. The sky is still bright, but the brightness has begun to look theatrical, as if the city is performing order instead of possessing it.`,
        choices: [
          { label: "Choose the rightful heir. Order must prevail.", next: "titus3", violence: 1, note: "Your choice deepens division under the language of law." },
          { label: "Choose the stronger leader. Rome needs power.", next: "titus3", violence: 2, note: "Practicality hardens into threat almost at once." },
          { label: "Refuse to choose. Let fate unfold.", next: "titus3", violence: 1, note: "Refusal still feeds the same conflict." }
        ]
      },

      titus3: {
        act: 1,
        title: "Level 3 — Seeds of Revenge",
        meta: "The player still believes morality can interrupt the fall.",
        text: `A wrong done to your family becomes impossible to ignore. Public insult, wounded pride, and old grievance begin weaving themselves together.

Virtus still gleams, but now it feels less ceremonial in your hand. Less oath than tool.`,
        choices: [
          { label: "Forgive them. This ends here.", next: "memoryHonor", violence: 1, note: "Mercy is interpreted as weakness. The wound remains open." },
          { label: "Punish them fairly.", next: "memoryHonor", violence: 2, note: "Fairness satisfies no one. Resentment sharpens." },
          { label: "Make them suffer.", next: "memoryHonor", violence: 3, note: "Revenge becomes visible, and therefore easier to continue." }
        ]
      },

      lavinia1: {
        act: 1,
        title: "Level 1 — Bright Rome",
        meta: "Act 1. Voice, grace, and daylight.",
        text: `You are Lavinia. The city is still beautiful enough to trust. Light pours over the palace halls, and the marble seems too clean for anything monstrous to happen within it.

Your voice still belongs to you. Your body still obeys you. The world still appears answerable to language.`,
        choices: [
          { label: "Speak gently with the court.", next: "lavinia2", violence: 0, note: "Gentleness earns approval, but also attention." },
          { label: "Speak boldly for your family.", next: "lavinia2", violence: 1, note: "Confidence gives you presence, but it also makes you visible." },
          { label: "Remain careful and observant.", next: "lavinia2", violence: 0, note: "Silence delays conflict, but never removes it." }
        ]
      },

      lavinia2: {
        act: 1,
        title: "Level 2 — The Forest Invitation",
        meta: "The last place that still resembles peace.",
        text: `The hunt begins beneath soft sunlight. The forest seems almost painted: green, gold, and harmless. It is the kind of scene that belongs to a story before it knows it is tragic.

Still, something in the air feels slightly wrong. Not enough to name. Enough to feel.`,
        choices: [
          { label: "Stay on the safe path.", next: "memoryFamily", violence: 0, note: "The path narrows. Safety proves decorative." },
          { label: "Explore deeper into the forest.", next: "memoryFamily", violence: 1, note: "Curiosity changes the route, not the result." },
          { label: "Call out for company.", next: "memoryFamily", violence: 0, note: "Your voice echoes back with no protection attached." }
        ]
      },

      memoryHonor: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting fragments of Titus's past.",
        text: `You find a fragment of Titus's memory:

A younger Titus stands before Rome believing honor and identity are the same thing. Virtus rests at his side unstained, ceremonial, almost holy. He still believes violence can remain noble if it serves duty.

The memory fades too quickly to trust.`,
        choices: [
          { label: "Take the fragment and continue.", next: "turningPoint", memory: "honor", note: "You keep the memory, but it changes nothing." }
        ]
      },

      memoryFamily: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting fragments of Titus's past.",
        text: `You uncover a fragment of Titus's memory:

There is warmth in the household. Family pride appears solid, almost architectural, like something made of stone. The memory suggests a world in which loyalty still means protection.

Then it cracks apart.`,
        choices: [
          { label: "Take the fragment and walk on.", next: "turningPoint", memory: "family", note: "The forest feels darker after the memory ends." }
        ]
      },

      turningPoint: {
        act: 1,
        title: "Turning Point — The Forest Closes",
        meta: "The line between Act 1 and Act 2.",
        text: `The sunlight thins. Colors lose their warmth. A branch snaps somewhere behind you.

For one last moment, the game pretends that caution, confidence, or speed might save you. Then it reveals what tragedy always reveals: the path was narrowing long before you saw it.`,
        choices: [
          { label: "Who is there?", next: "act2silence", violence: 1, note: "No answer comes that language can meet." },
          { label: "Show yourself.", next: "act2silence", violence: 1, note: "The world responds with force, not clarity." },
          { label: "Run.", next: "act2silence", violence: 1, note: "Movement becomes useless. Escape is denied." }
        ]
      },

      act2silence: {
        act: 2,
        title: "Level 4 — Silence",
        meta: "Act 2. Speech collapses. Beauty decays.",
        text: () => {
          if(state.character === "Lavinia"){
            return `You wake in a changed world. The sky has gone dirty. The light is no longer warm but sickly. Brown and grey have replaced ivory and gold.

You try to speak.

Nothing comes.

You try to reach forward.

Your hands are gone.

The game has taken from you the powers it gave you at the start, and now it makes that loss visible.`;
          } else {
            return `Rome no longer looks clean. The walls seem yellowed, cracked, and tired. News reaches Titus and changes the texture of the entire world.

What was once political injury becomes personal ruin. Somewhere nearby, Lavinia struggles to communicate through grief that language can no longer carry.

Even now, the game still offers choices.`;
          }
        },
        choices: () => {
          if(state.character === "Lavinia"){
            return [
              { label: "[trace symbols in the dirt]", next: "act2breaking", violence: 1, silent: true, note: "They only partly understand what you try to say." },
              { label: "[gesture with your body]", next: "act2breaking", violence: 1, silent: true, note: "They see pain, but not its full meaning." },
              { label: "[stand in stillness]", next: "act2breaking", violence: 0, silent: true, note: "Silence communicates suffering, not explanation." }
            ];
          } else {
            return [
              { label: "Ask what happened.", next: "act2breaking", violence: 1, note: "The question is calm. The answer cannot be." },
              { label: "Demand names.", next: "act2breaking", violence: 2, note: "You leap from grief toward revenge." },
              { label: "Swear revenge at once.", next: "act2breaking", violence: 3, note: "The oath arrives before reason does." }
            ];
          }
        }
      },

      act2breaking: {
        act: 2,
        title: "Level 5 — The Breaking of Titus",
        meta: "Honor remains visible on the outside, but revenge now governs the inside.",
        text: `Virtus no longer looks ceremonial. A dark stain clings to the blade. No matter how it is cleaned, something remains. What began as a symbol of Roman honor now feels heavy, ugly, and shameful.

Titus still appears composed to others. But his decisions no longer come from order. They come from injury.`,
        choices: [
          { label: "We will seek justice.", next: "memoryGrief", violence: 2, sword: "Stained", note: "Justice now sounds like revenge wearing formal language." },
          { label: "We will make them pay.", next: "memoryGrief", violence: 3, sword: "Stained", note: "Balance gives way to retaliation." },
          { label: "They will suffer as we did.", next: "memoryGrief", violence: 4, sword: "Stained", note: "Pain becomes the measure of meaning." }
        ]
      },

      memoryGrief: {
        act: 2,
        title: "Side Quest — Final Memory Fragment",
        meta: "Understanding the tragedy does not stop it.",
        text: `The final fragment opens:

Titus remembers not only duty, but wounded pride. He remembers how quickly honor could become self-righteousness, and how easily self-righteousness could become violence. The seed of revenge was always there. Grief merely watered it.

The memory does not redeem him. It only explains him.`,
        choices: [
          { label: "Take the fragment and continue.", next: "bloodDemandsBlood", memory: "grief", note: "You now understand more, and can prevent nothing." }
        ]
      },

      bloodDemandsBlood: {
        act: 2,
        title: "Level 6 — Blood Demands Blood",
        meta: "There is no nonviolent option now. Only degrees of brutality.",
        text: `An enemy falls within reach. In another kind of story, this might be the moment where mercy breaks the cycle.

In this story, mercy only changes the texture of the same ruin.

The room smells of iron, damp stone, and exhaustion.`,
        choices: [
          { label: "End it quickly.", next: "feast", violence: 2, sword: "Corrupted", note: "Efficiency does not cleanse cruelty." },
          { label: "Force a confession.", next: "feast", violence: 3, sword: "Corrupted", note: "Pain is made to imitate truth." },
          { label: "Make them suffer.", next: "feast", violence: 4, sword: "Corrupted", note: "Cruelty no longer needs an excuse." }
        ]
      },

      feast: {
        act: 2,
        title: "Level 7 — The Feast",
        meta: "Ceremony becomes one more mask for violence.",
        text: `A table is set. Candles shiver. The room pretends to be civilized, but the illusion has become grotesque. The walls are no longer pearl white. They have turned stained and dull, as if the building itself has absorbed the corruption around it.

This is revenge at its ugliest: not open force alone, but force dressed in ritual and politeness.`,
        choices: [
          { label: "Remain calm.", next: "finalChoice", violence: 2, note: "Cold control makes the horror sharper." },
          { label: "Taunt them.", next: "finalChoice", violence: 3, note: "Words become blades before the blade is drawn." },
          { label: "Reveal the truth slowly.", next: "finalChoice", violence: 4, note: "Delay becomes a form of cruelty." }
        ]
      },

      finalChoice: {
        act: 2,
        title: "Level 8 — No Choice Left",
        meta: "The final illusion of agency.",
        text: `Bodies, grief, rage, and consequence surround you. The tragedy is nearly complete.

The game offers one final decision, not because it can save anyone, but because tragedy loves to imitate freedom even as it destroys it.

Virtus now feels nothing like honor. It feels like history reduced to a weapon.`,
        choices: [
          { label: "Stop.", next: "ending", violence: 1, note: "You hesitate. The violence continues anyway." },
          { label: "Finish it.", next: "ending", violence: 2, note: "You move without the comfort of illusion." }
        ]
      },

      ending: {
        act: 2,
        render: () => `
          <h2 class="scene-title">Ending — Ash</h2>
          <p class="scene-meta">All paths end in tragedy. What changes is only the tone of the descent.</p>

          <div class="story ending-story">The sky has turned grey and ugly. The brightness of Act 1 is gone. Pearl white walls have become brown, dull, and stained. Rome no longer looks like civilization at peace with itself. It looks like the ruins of people who called their violence justice until they could no longer tell the difference.

${getEndingTone()}

${state.character === "Lavinia"
? "Lavinia's path makes the loss of agency painfully literal. She begins with voice and ends with visible silence: her mouth sealed, her hands gone, her meaning forced through suffering."
: "Titus's path makes corruption gradual. He begins as an honorable Roman general and ends as a man whose face hardens as surely as his choices do."}

${state.memories.length === 3
? "You collected all three memory fragments. Together they reveal that the tragedy was not a sudden break, but a slow exposure of what was already present beneath the surface."
: "You did not collect every memory fragment. Even so, the ending remains unchanged. The story withholds detail, but not fate."}

No matter what choices you made, the story ends the same way: revenge consumes honor, violence replaces speech, and human beings descend toward the animal logic of hurt, retaliation, and ruin.</div>

          <div class="memory-list">
            ${state.memories.length
              ? state.memories.map(m => `<div class="memory">${memoryNames[m]}</div>`).join("")
              : `<div class="memory">No memory fragments collected</div>`
            }
          </div>

          <div class="controls">
            <button class="small-btn" id="restartBtn">Play again</button>
          </div>

          <div class="note">Final violence score: ${state.violence}. Final sword state: ${state.sword}. The ending is fixed by design.</div>
        `
      }
    };

    function render(){
      const game = document.getElementById("game");
      const node = nodes[state.node];

      if(node.act) state.act = node.act;

      if(node.render){
        game.innerHTML = node.render();
      } else {
        const text = typeof node.text === "function" ? node.text() : node.text;
        const choices = typeof node.choices === "function" ? node.choices() : node.choices;

        game.innerHTML = `
          <h2 class="scene-title">${node.title}</h2>
          <p class="scene-meta">${node.meta}</p>
          <div class="story">${text}</div>
          <div class="choices">
            ${choices.map((choice, index) => `
              <button class="choice" data-index="${index}">
                ${state.laviniaSilent && state.character === "Lavinia" && state.act === 2
                  ? `<span class="symbol">${choice.label}</span>`
                  : choice.label}
              </button>
            `).join("")}
          </div>
          <div class="note">${state.log.length ? state.log[state.log.length - 1] : "Choose a path."}</div>
        `;
      }

      const type = currentSceneType();
      const mood = currentVisualMood();

      renderSky(type, mood);
      renderArchitecture(type, mood);
      renderCharacter();

      updateStats();
      updateTheme();
      bindEvents();

      if (state.ambienceOn) {
        stopAmbience();
        startAmbience();
      }
    }

    function bindEvents(){
      document.querySelectorAll("[data-character]").forEach(btn => {
        btn.addEventListener("click", () => chooseCharacter(btn.getAttribute("data-character")));
      });

      document.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => choose(Number(btn.getAttribute("data-index"))));
      });

      const restartBtn = document.getElementById("restartBtn");
      if(restartBtn){
        restartBtn.addEventListener("click", restart);
      }

      const toggleSoundBtn = document.getElementById("toggleSoundBtn");
      if (toggleSoundBtn) {
        toggleSoundBtn.onclick = () => {
          state.soundOn = !state.soundOn;
          if (!state.soundOn) stopAmbience();
          else choiceClickSound();
          updateSoundButtons();
        };
      }

      const playToneBtn = document.getElementById("playToneBtn");
      if (playToneBtn) {
        playToneBtn.onclick = () => {
          if (!state.soundOn) return;
          choiceClickSound();
          startAmbience();
        };
      }

      const stopToneBtn = document.getElementById("stopToneBtn");
      if (stopToneBtn) {
        stopToneBtn.onclick = () => {
          stopAmbience();
        };
      }

      updateSoundButtons();
    }

    render();
  </script>
</body>
</html>
