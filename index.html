<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash of Rome</title>
  <style>
    :root{
      --bg:#f6efe4;
      --panel:#fff9f0;
      --text:#1f1a17;
      --muted:#6c655d;
      --border:#d8cab4;
      --choice:#f8efdf;
      --choiceHover:#efe0c6;
      --shadow:rgba(0,0,0,0.12);
    }

    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--text);
      background:linear-gradient(180deg,#92c7ff 0%, #f6efe4 45%, #f6efe4 100%);
      min-height:100vh;
      transition:background 0.8s ease,color 0.5s ease;
    }

    body.stage-1{
      background:linear-gradient(180deg,#92c7ff 0%, #f6efe4 45%, #f6efe4 100%);
    }

    body.stage-2{
      background:linear-gradient(180deg,#cab48d 0%, #e6dac8 45%, #e6dac8 100%);
    }

    body.stage-3{
      background:linear-gradient(180deg,#9f8b76 0%, #b8aa99 48%, #b8aa99 100%);
    }

    body.stage-4{
      background:linear-gradient(180deg,#68625c 0%, #756e67 48%, #756e67 100%);
      color:#f2ebe4;
    }

    body.stage-5{
      background:linear-gradient(180deg,#3a3939 0%, #474240 52%, #474240 100%);
      color:#f4efea;
    }

    *{ box-sizing:border-box; }

    .container{
      max-width:1000px;
      margin:0 auto;
      padding:24px 16px 60px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:clamp(2rem,4vw,3rem);
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.5;
    }

    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .pill{
      background:var(--panel);
      color:var(--muted);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 12px;
      box-shadow:0 8px 24px var(--shadow);
      font-size:0.92rem;
    }

    body.stage-4 .pill,
    body.stage-5 .pill{
      background:#5a534d;
      color:#ddd2c8;
      border-color:#4b443e;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      box-shadow:0 16px 44px var(--shadow);
      padding:22px;
      overflow:hidden;
    }

    body.stage-4 .card,
    body.stage-5 .card{
      background:#5a534d;
      border-color:#4b443e;
    }

    .visual-stage{
      width:100%;
      height:340px;
      position:relative;
      margin-bottom:18px;
      border-radius:18px;
      overflow:hidden;
      border:1px solid var(--border);
      background:#d8d0c7;
    }

    body.stage-4 .visual-stage,
    body.stage-5 .visual-stage{
      border-color:#4b443e;
      background:#3d3937;
    }

    #bgVisual{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(0.95);
    }

    #charVisual{
      position:absolute;
      bottom:0;
      right:20px;
      height:95%;
      max-width:45%;
      object-fit:contain;
      display:none;
      filter:drop-shadow(0 10px 18px rgba(0,0,0,0.25));
    }

    .scene-title{
      margin:0 0 8px 0;
      font-size:1.5rem;
    }

    .scene-meta{
      margin:0 0 18px 0;
      color:var(--muted);
      line-height:1.5;
    }

    body.stage-4 .scene-meta,
    body.stage-5 .scene-meta,
    body.stage-4 .sub,
    body.stage-5 .sub{
      color:#d6cbc1;
    }

    .story{
      min-height:220px;
      white-space:pre-line;
      line-height:1.82;
      font-size:1.05rem;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      gap:12px;
      margin-top:10px;
    }

    button{
      font:inherit;
    }

    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:var(--choice);
      color:var(--text);
      border-radius:16px;
      padding:14px 16px;
      cursor:pointer;
      transition:background 0.18s ease, transform 0.12s ease;
    }

    .choice:hover{
      background:var(--choiceHover);
      transform:translateY(-1px);
    }

    body.stage-4 .choice,
    body.stage-5 .choice{
      background:#6a625b;
      color:#f2ebe4;
      border-color:#534b45;
    }

    body.stage-4 .choice:hover,
    body.stage-5 .choice:hover{
      background:#5a524c;
    }

    .character-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .character-card{
      border:1px solid var(--border);
      background:var(--choice);
      border-radius:18px;
      padding:16px;
      text-align:left;
      cursor:pointer;
      transition:background 0.18s ease, transform 0.12s ease;
    }

    .character-card:hover{
      background:var(--choiceHover);
      transform:translateY(-2px);
    }

    .character-card h3{
      margin:0 0 8px 0;
    }

    .character-card p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .note{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--border);
      color:var(--muted);
      font-size:0.95rem;
      line-height:1.6;
    }

    body.stage-4 .note,
    body.stage-5 .note{
      color:#d6cbc1;
      border-top-color:#534b45;
    }

    .memory-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }

    .memory{
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 10px;
      font-size:0.88rem;
      background:rgba(255,255,255,0.1);
    }

    .small-btn{
      border:1px solid var(--border);
      background:transparent;
      color:inherit;
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
      margin-top:16px;
    }

    @media (max-width: 640px){
      .visual-stage{ height:250px; }
      #charVisual{ max-width:55%; right:8px; }
      .story{ min-height:260px; }
      .card{ padding:18px; }
    }
  </style>
</head>
<body class="stage-1">
  <div class="container">
    <div class="header">
      <div>
        <h1>Ash of Rome</h1>
        <div class="sub">A browser-based interactive tragedy inspired by Titus Andronicus.</div>
      </div>
      <div class="stats">
        <div class="pill" id="actStat">Act —</div>
        <div class="pill" id="charStat">Character —</div>
        <div class="pill" id="violenceStat">Violence 0</div>
        <div class="pill" id="memoryStat">Memories 0/3</div>
        <div class="pill" id="swordStat">Sword Honorable</div>
      </div>
    </div>

    <div class="card">
      <div class="visual-stage">
        <img id="bgVisual" src="" alt="Scene background">
        <img id="charVisual" src="" alt="Character">
      </div>
      <div id="game"></div>
    </div>
  </div>

  <script>
    const state = {
      node: "intro",
      act: 0,
      character: null,
      violence: 0,
      memories: [],
      sword: "Honorable",
      log: [],
      laviniaSilent: false
    };

    const memoryNames = {
      honor: "Honor in Rome",
      family: "Family Pride",
      grief: "The Seed of Grief"
    };

    function addMemory(key){
      if(!state.memories.includes(key)){
        state.memories.push(key);
      }
    }

    function updateTheme(){
      let stage = 1;

      if(state.act === 1){
        stage = state.violence >= 3 ? 2 : 1;
      }

      if(state.act === 2){
        if(state.violence <= 4) stage = 3;
        else if(state.violence <= 8) stage = 4;
        else stage = 5;
      }

      document.body.className = "stage-" + stage;
    }

    function updateStats(){
      document.getElementById("actStat").textContent = "Act " + (state.act || "—");
      document.getElementById("charStat").textContent = "Character " + (state.character || "—");
      document.getElementById("violenceStat").textContent = "Violence " + state.violence;
      document.getElementById("memoryStat").textContent = "Memories " + state.memories.length + "/3";
      document.getElementById("swordStat").textContent = "Sword " + state.sword;
    }

    function setVisuals(bg, char){
      const bgVisual = document.getElementById("bgVisual");
      const charVisual = document.getElementById("charVisual");

      bgVisual.src = bg || "";

      if(char){
        charVisual.src = char;
        charVisual.style.display = "block";
      } else {
        charVisual.style.display = "none";
      }
    }

    function chooseCharacter(character){
      state.character = character;
      state.node = character === "Titus" ? "titus1" : "lavinia1";
      state.log.push("Character selected: " + character);
      render();
    }

    function choose(index){
      const node = nodes[state.node];
      const choices = typeof node.choices === "function" ? node.choices() : node.choices;
      const selected = choices[index];

      if(selected.violence) state.violence += selected.violence;
      if(selected.memory) addMemory(selected.memory);
      if(selected.sword) state.sword = selected.sword;
      if(selected.silent === true) state.laviniaSilent = true;
      if(selected.note) state.log.push(selected.note);

      state.node = selected.next;
      render();
    }

    function restart(){
      state.node = "intro";
      state.act = 0;
      state.character = null;
      state.violence = 0;
      state.memories = [];
      state.sword = "Honorable";
      state.log = [];
      state.laviniaSilent = false;
      render();
    }

    function getEndingTone(){
      if(state.violence <= 6){
        return "You tried to preserve dignity, but the story still carried you into blood. The tragedy is quieter, not kinder.";
      } else if(state.violence <= 10){
        return "You moved step by step into revenge. Each choice seemed understandable in the moment. That is part of the horror.";
      } else {
        return "You embraced revenge openly. By the end, honor had decayed into appetite, and the characters resembled wounded animals acting on instinct.";
      }
    }

    function getVisuals(nodeName){
      const titusLight = "https://via.placeholder.com/420x700/f0e2c8/222222?text=Titus";
      const titusDark = "https://via.placeholder.com/420x700/66574d/f4eee8?text=Dark+Titus";
      const laviniaLight = "https://via.placeholder.com/420x700/f3e6df/222222?text=Lavinia";
      const laviniaSilent = "https://via.placeholder.com/420x700/8e8178/f4eee8?text=Silent+Lavinia";
      const youngTitus = "https://via.placeholder.com/420x700/e8dccb/222222?text=Young+Titus";

      const map = {
        intro: {
          bg: "https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1400&q=80",
          char: ""
        },
        titus1: {
          bg: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=1400&q=80",
          char: titusLight
        },
        titus2: {
          bg: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=1400&q=80",
          char: titusLight
        },
        titus3: {
          bg: "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=1400&q=80",
          char: titusLight
        },
        lavinia1: {
          bg: "https://images.unsplash.com/photo-1511818966892-d7d671e672a2?auto=format&fit=crop&w=1400&q=80",
          char: laviniaLight
        },
        lavinia2: {
          bg: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1400&q=80",
          char: laviniaLight
        },
        memoryHonor: {
          bg: "https://images.unsplash.com/photo-1524492412937-b28074a5d7da?auto=format&fit=crop&w=1400&q=80",
          char: youngTitus
        },
        memoryFamily: {
          bg: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1400&q=80",
          char: youngTitus
        },
        turningPoint: {
          bg: "https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1400&q=80",
          char: state.character === "Lavinia" ? laviniaLight : titusLight
        },
        act2silence: {
          bg: "https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80",
          char: state.character === "Lavinia" ? laviniaSilent : titusDark
        },
        act2breaking: {
          bg: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1400&q=80",
          char: titusDark
        },
        memoryGrief: {
          bg: "https://images.unsplash.com/photo-1493246507139-91e8fad9978e?auto=format&fit=crop&w=1400&q=80",
          char: youngTitus
        },
        bloodDemandsBlood: {
          bg: "https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1400&q=80",
          char: titusDark
        },
        feast: {
          bg: "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1400&q=80",
          char: titusDark
        },
        finalChoice: {
          bg: "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1400&q=80",
          char: titusDark
        },
        ending: {
          bg: "https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1400&q=80",
          char: ""
        }
      };

      return map[nodeName] || map.intro;
    }

    const nodes = {
      intro: {
        render: () => `
          <h2 class="scene-title">Choose your path into the tragedy</h2>
          <p class="scene-meta">Act 1 represents the better state. Act 2 represents the worse. Every path still leads to the same tragic end.</p>
          <div class="story">Rome still appears bright. The sky is clear. Marble walls remain pale and clean. Order still seems possible.

You may begin as Titus, a Roman general who appears honorable and rational before revenge reshapes him.

Or you may begin as Lavinia, who starts with voice, presence, and freedom before the story reduces her to silence.

The player is offered choices. The tragedy offers none.</div>

          <div class="character-grid">
            <button class="character-card" data-character="Titus">
              <h3>Titus</h3>
              <p>Start as an honorable Roman general. His decisions become more violent as revenge overtakes reason.</p>
            </button>

            <button class="character-card" data-character="Lavinia">
              <h3>Lavinia</h3>
              <p>Start with voice and agency. As the game darkens, those powers are stripped away.</p>
            </button>
          </div>
        `
      },

      titus1: {
        act: 1,
        title: "Level 1 — Return to Rome",
        meta: "Act 1. Bright Rome. Ceremony and public honor.",
        text: `The city receives you beneath a warm sky. White marble reflects the sunlight. Gold flashes along banners, armor, and temple stone. At your side hangs Virtus, polished bright enough to seem almost sacred.

A captured enemy kneels and begs for mercy. The crowd waits to see what Roman strength looks like in your hands.`,
        choices: [
          { label: "Spare him. Rome shows strength through mercy.", next: "titus2", violence: 1, note: "He is taken away and executed anyway in the name of order." },
          { label: "Execute him. Rome must be feared.", next: "titus2", violence: 2, note: "The crowd praises the execution as discipline." },
          { label: "Let the gods decide his fate.", next: "titus2", violence: 1, note: "Ritual changes the style of death, not the result." }
        ]
      },

      titus2: {
        act: 1,
        title: "Level 2 — The Throne Decision",
        meta: "Politics still sounds like reason.",
        text: `Rome turns from victory to succession. Nobles speak of law. Soldiers speak of power. Each side calls its wish justice.

You are asked where your support lies. The world is still bright, but the brightness now feels slightly theatrical.`,
        choices: [
          { label: "Choose the rightful heir. Order must prevail.", next: "titus3", violence: 1, note: "Your choice deepens division under the language of law." },
          { label: "Choose the stronger leader. Rome needs power.", next: "titus3", violence: 2, note: "Practicality hardens into threat." },
          { label: "Refuse to choose. Let fate unfold.", next: "titus3", violence: 1, note: "Refusal still feeds the same conflict." }
        ]
      },

      titus3: {
        act: 1,
        title: "Level 3 — Seeds of Revenge",
        meta: "The player still believes morality can interrupt the fall.",
        text: `A wrong done to your family becomes impossible to ignore. Pride, grief, and insult begin weaving themselves together.

Virtus still gleams, but it feels less ceremonial now. Less oath than tool.`,
        choices: [
          { label: "Forgive them. This ends here.", next: "memoryHonor", violence: 1, note: "Mercy is taken for weakness." },
          { label: "Punish them fairly.", next: "memoryHonor", violence: 2, note: "Fairness satisfies no one." },
          { label: "Make them suffer.", next: "memoryHonor", violence: 3, note: "Revenge becomes visible and easier to continue." }
        ]
      },

      lavinia1: {
        act: 1,
        title: "Level 1 — Bright Rome",
        meta: "Act 1. Voice, grace, and daylight.",
        text: `You are Lavinia. The city is still beautiful enough to trust. Light pours through palace corridors. The marble seems too clean for anything monstrous to happen within it.

Your voice still belongs to you. Your body still obeys you. The world still appears answerable to language.`,
        choices: [
          { label: "Speak gently with the court.", next: "lavinia2", violence: 0, note: "Gentleness earns approval, but also attention." },
          { label: "Speak boldly for your family.", next: "lavinia2", violence: 1, note: "Confidence makes you visible." },
          { label: "Remain careful and observant.", next: "lavinia2", violence: 0, note: "Silence delays conflict, but never removes it." }
        ]
      },

      lavinia2: {
        act: 1,
        title: "Level 2 — The Forest Invitation",
        meta: "The last place that still resembles peace.",
        text: `The hunt begins beneath soft sunlight. The forest looks golden, green, and harmless. It is the kind of scene that belongs to a story before it knows it is tragic.

Still, something in the air feels wrong. Not enough to name. Enough to feel.`,
        choices: [
          { label: "Stay on the safe path.", next: "memoryFamily", violence: 0, note: "The path narrows. Safety proves decorative." },
          { label: "Explore deeper into the forest.", next: "memoryFamily", violence: 1, note: "Curiosity changes the route, not the ending." },
          { label: "Call out for company.", next: "memoryFamily", violence: 0, note: "Your voice echoes back with no protection attached." }
        ]
      },

      memoryHonor: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting Titus's past.",
        text: `You find a fragment of Titus's memory:

A younger Titus stands before Rome believing honor and identity are the same thing. Virtus rests at his side unstained, ceremonial, almost holy. He still believes violence can remain noble if it serves duty.

The memory fades too quickly to trust.`,
        choices: [
          { label: "Take the fragment and continue.", next: "turningPoint", memory: "honor", note: "You keep the memory, but it changes nothing." }
        ]
      },

      memoryFamily: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting Titus's past.",
        text: `You uncover a fragment of Titus's memory:

There is warmth in the household. Family pride appears solid, almost architectural. The memory suggests a world in which loyalty still means protection.

Then it cracks apart.`,
        choices: [
          { label: "Take the fragment and walk on.", next: "turningPoint", memory: "family", note: "The forest feels darker after the memory ends." }
        ]
      },

      turningPoint: {
        act: 1,
        title: "Turning Point — The Forest Closes",
        meta: "The line between Act 1 and Act 2.",
        text: `The sunlight thins. Colors lose their warmth. A branch snaps behind you.

For one last moment, the game pretends caution, confidence, or speed might save you. Then tragedy reveals what it always reveals: the path was narrowing long before you saw it.`,
        choices: [
          { label: "Who is there?", next: "act2silence", violence: 1, note: "No answer comes that language can meet." },
          { label: "Show yourself.", next: "act2silence", violence: 1, note: "The world responds with force, not clarity." },
          { label: "Run.", next: "act2silence", violence: 1, note: "Escape is denied." }
        ]
      },

      act2silence: {
        act: 2,
        title: "Level 4 — Silence",
        meta: "Act 2. Speech collapses. Beauty decays.",
        text: () => {
          if(state.character === "Lavinia"){
            return `You wake in a changed world. The sky has gone dirty. Brown and grey have replaced ivory and gold.

You try to speak.

Nothing comes.

You try to reach forward.

The absence of your hands becomes the center of the scene.

The game has taken from you the powers it gave you at the start.`;
          } else {
            return `Rome no longer looks clean. The walls seem yellowed, cracked, and tired. News reaches Titus and changes the texture of the whole world.

What was once political injury becomes personal ruin. Somewhere nearby, Lavinia struggles to communicate through grief that language can no longer carry.

Even now, the game still offers choices.`;
          }
        },
        choices: () => {
          if(state.character === "Lavinia"){
            return [
              { label: "[trace symbols in the dirt]", next: "act2breaking", violence: 1, silent: true, note: "They only partly understand what you try to say." },
              { label: "[gesture with your body]", next: "act2breaking", violence: 1, silent: true, note: "They see pain, but not its full meaning." },
              { label: "[stand in stillness]", next: "act2breaking", violence: 0, silent: true, note: "Silence communicates suffering, not explanation." }
            ];
          }
          return [
            { label: "Ask what happened.", next: "act2breaking", violence: 1, note: "The question is calm. The answer cannot be." },
            { label: "Demand names.", next: "act2breaking", violence: 2, note: "You leap from grief toward revenge." },
            { label: "Swear revenge at once.", next: "act2breaking", violence: 3, note: "The oath arrives before reason does." }
          ];
        }
      },

      act2breaking: {
        act: 2,
        title: "Level 5 — The Breaking of Titus",
        meta: "Honor remains visible on the outside, but revenge governs the inside.",
        text: `Virtus no longer looks ceremonial. A dark stain clings to the blade. No matter how it is cleaned, something remains. What began as a symbol of honor now feels heavy, ugly, and shameful.

Titus still appears composed to others. But his decisions no longer come from order. They come from injury.`,
        choices: [
          { label: "We will seek justice.", next: "memoryGrief", violence: 2, sword: "Stained", note: "Justice now sounds like revenge in formal language." },
          { label: "We will make them pay.", next: "memoryGrief", violence: 3, sword: "Stained", note: "Balance gives way to retaliation." },
          { label: "They will suffer as we did.", next: "memoryGrief", violence: 4, sword: "Stained", note: "Pain becomes the measure of meaning." }
        ]
      },

      memoryGrief: {
        act: 2,
        title: "Side Quest — Final Memory Fragment",
        meta: "Understanding the tragedy does not stop it.",
        text: `The final fragment opens:

Titus remembers not only duty, but wounded pride. He remembers how quickly honor could become self-righteousness, and how easily self-righteousness could become violence. The seed of revenge was always there. Grief merely watered it.

The memory does not redeem him. It only explains him.`,
        choices: [
          { label: "Take the fragment and continue.", next: "bloodDemandsBlood", memory: "grief", note: "You now understand more, and can prevent nothing." }
        ]
      },

      bloodDemandsBlood: {
        act: 2,
        title: "Level 6 — Blood Demands Blood",
        meta: "There is no nonviolent option now. Only degrees of brutality.",
        text: `An enemy falls within reach. In another story, this might be the moment where mercy breaks the cycle.

In this story, mercy only changes the texture of the same ruin.

The room smells of iron, damp stone, and exhaustion.`,
        choices: [
          { label: "End it quickly.", next: "feast", violence: 2, sword: "Corrupted", note: "Efficiency does not cleanse cruelty." },
          { label: "Force a confession.", next: "feast", violence: 3, sword: "Corrupted", note: "Pain is made to imitate truth." },
          { label: "Make them suffer.", next: "feast", violence: 4, sword: "Corrupted", note: "Cruelty no longer needs an excuse." }
        ]
      },

      feast: {
        act: 2,
        title: "Level 7 — The Feast",
        meta: "Ceremony becomes one more mask for violence.",
        text: `A table is set. Candles tremble. The room pretends to be civilized, but the illusion has become grotesque. The walls are no longer pearl white. They have turned stained and dull, as if the building itself has absorbed the corruption around it.

This is revenge at its ugliest: force dressed in ritual and politeness.`,
        choices: [
          { label: "Remain calm.", next: "finalChoice", violence: 2, note: "Cold control makes the horror sharper." },
          { label: "Taunt them.", next: "finalChoice", violence: 3, note: "Words become blades before the blade is drawn." },
          { label: "Reveal the truth slowly.", next: "finalChoice", violence: 4, note: "Delay becomes a form of cruelty." }
        ]
      },

      finalChoice: {
        act: 2,
        title: "Level 8 — No Choice Left",
        meta: "The final illusion of agency.",
        text: `Bodies, grief, rage, and consequence surround you. The tragedy is nearly complete.

The game offers one last decision, not because it can save anyone, but because tragedy likes to imitate freedom even as it destroys it.

Virtus now feels nothing like honor. It feels like history reduced to a weapon.`,
        choices: [
          { label: "Stop.", next: "ending", violence: 1, note: "You hesitate. The violence continues anyway." },
          { label: "Finish it.", next: "ending", violence: 2, note: "You move without the comfort of illusion." }
        ]
      },

      ending: {
        act: 2,
        render: () => `
          <h2 class="scene-title">Ending — Ash</h2>
          <p class="scene-meta">All paths end in tragedy. What changes is only the tone of the descent.</p>

          <div class="story">The sky has turned grey and ugly. The brightness of Act 1 is gone. Pearl white walls have become brown, dull, and stained. Rome no longer looks like civilization at peace with itself. It looks like the remains of people who called their violence justice until they could no longer tell the difference.

${getEndingTone()}

${state.character === "Lavinia"
? "Lavinia's path makes the loss of agency painfully literal. She begins with voice and ends in forced silence. The player experiences helplessness instead of heroism."
: "Titus's path makes corruption gradual. He begins as an honorable Roman general and ends as a man who has taught himself to call revenge by nobler names."}

${state.memories.length === 3
? "You collected all three memory fragments. Together they reveal that the tragedy was not a sudden break, but a slow exposure of what was already present beneath the surface."
: "You did not collect every memory fragment. Even so, the ending remains unchanged. The story withholds detail, but not fate."}

No matter what choices you made, the story ends the same way: revenge consumes honor, violence replaces speech, and human beings descend toward the animal logic of hurt, retaliation, and ruin.</div>

          <div class="memory-list">
            ${state.memories.length
              ? state.memories.map(m => `<div class="memory">${memoryNames[m]}</div>`).join("")
              : `<div class="memory">No memory fragments collected</div>`
            }
          </div>

          <button class="small-btn" id="restartBtn">Play again</button>
          <div class="note">Final violence score: ${state.violence}. Final sword state: ${state.sword}. The ending is fixed by design.</div>
        `
      }
    };

    function render(){
      const game = document.getElementById("game");
      const node = nodes[state.node];

      if(node.act) state.act = node.act;

      const visuals = getVisuals(state.node);
      setVisuals(visuals.bg, visuals.char);

      if(node.render){
        game.innerHTML = node.render();
      } else {
        const text = typeof node.text === "function" ? node.text() : node.text;
        const choices = typeof node.choices === "function" ? node.choices() : node.choices;

        game.innerHTML = `
          <h2 class="scene-title">${node.title}</h2>
          <p class="scene-meta">${node.meta}</p>
          <div class="story">${text}</div>
          <div class="choices">
            ${choices.map((choice, index) => `
              <button class="choice" data-index="${index}">${choice.label}</button>
            `).join("")}
          </div>
          <div class="note">${state.log.length ? state.log[state.log.length - 1] : "Choose a path."}</div>
        `;
      }

      updateStats();
      updateTheme();

      document.querySelectorAll("[data-character]").forEach(btn => {
        btn.addEventListener("click", () => {
          chooseCharacter(btn.getAttribute("data-character"));
        });
      });

      document.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => {
          choose(Number(btn.getAttribute("data-index")));
        });
      });

      const restartBtn = document.getElementById("restartBtn");
      if(restartBtn){
        restartBtn.addEventListener("click", restart);
      }
    }

    render();
  </script>
</body>
</html>
