<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ash of Rome</title>
  <style>
    :root{
      --bg:#f6efe4;
      --sky1:#8ec5ff;
      --sky2:#f6efe4;
      --panel:#fff9f0;
      --text:#1f1a17;
      --muted:#6c655d;
      --accent:#b08a47;
      --border:#d8cab4;
      --choice:#f8efdf;
      --choiceHover:#efe0c6;
      --shadow:rgba(0,0,0,0.10);
    }

    body.stage-1{
      --bg:#f6efe4;
      --sky1:#8ec5ff;
      --sky2:#f6efe4;
      --panel:#fff9f0;
      --text:#1f1a17;
      --muted:#6c655d;
      --accent:#b08a47;
      --border:#d8cab4;
      --choice:#f8efdf;
      --choiceHover:#efe0c6;
      --shadow:rgba(0,0,0,0.10);
    }

    body.stage-2{
      --bg:#e7dbc9;
      --sky1:#c9b38b;
      --sky2:#e7dbc9;
      --panel:#efe2d0;
      --text:#2a231d;
      --muted:#64594f;
      --accent:#8a6948;
      --border:#c1ae97;
      --choice:#e7d8c5;
      --choiceHover:#d8c2a7;
      --shadow:rgba(0,0,0,0.15);
    }

    body.stage-3{
      --bg:#b8aa9a;
      --sky1:#9d8975;
      --sky2:#b8aa9a;
      --panel:#cbbcab;
      --text:#25201b;
      --muted:#50473f;
      --accent:#6d5440;
      --border:#a28f7d;
      --choice:#c2b19f;
      --choiceHover:#b19a86;
      --shadow:rgba(0,0,0,0.22);
    }

    body.stage-4{
      --bg:#706760;
      --sky1:#5f5751;
      --sky2:#706760;
      --panel:#82776d;
      --text:#f1ebe3;
      --muted:#ddd1c7;
      --accent:#673730;
      --border:#5a524c;
      --choice:#766b63;
      --choiceHover:#655b54;
      --shadow:rgba(0,0,0,0.30);
    }

    body.stage-5{
      --bg:#3c3836;
      --sky1:#303032;
      --sky2:#3c3836;
      --panel:#4b4542;
      --text:#f4efe8;
      --muted:#cec4bb;
      --accent:#552823;
      --border:#342f2d;
      --choice:#514947;
      --choiceHover:#423d3a;
      --shadow:rgba(0,0,0,0.45);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Georgia, "Times New Roman", serif;
      color:var(--text);
      background:linear-gradient(180deg, var(--sky1) 0%, var(--sky2) 42%, var(--bg) 100%);
      min-height:100vh;
      transition:background 0.8s ease, color 0.5s ease;
    }

    .container{
      max-width:980px;
      margin:0 auto;
      padding:24px 16px 56px;
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:clamp(2rem, 4vw, 3rem);
      letter-spacing:0.02em;
    }

    .sub{
      margin-top:6px;
      color:var(--muted);
      line-height:1.5;
    }

    .stats{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .pill{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 12px;
      box-shadow:0 8px 24px var(--shadow);
      color:var(--muted);
      font-size:0.92rem;
    }

    .card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:24px;
      box-shadow:0 16px 44px var(--shadow);
      padding:22px;
    }

    .visual-stage{
      width:100%;
      height:360px;
      position:relative;
      overflow:hidden;
      border-radius:18px;
      margin-bottom:18px;
      border:1px solid var(--border);
      background:#d9d1c6;
      box-shadow:0 10px 24px rgba(0,0,0,0.12) inset;
    }

    #bgVisual{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      filter:saturate(0.98) contrast(1.02);
    }

    .scene-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.02) 45%, rgba(0,0,0,0.28) 100%);
      pointer-events:none;
    }

    #charVisual{
      position:absolute;
      bottom:0;
      right:24px;
      height:96%;
      max-width:40%;
      object-fit:contain;
      filter:drop-shadow(0 8px 18px rgba(0,0,0,0.35));
      display:none;
    }

    .scene-title{
      margin:0 0 8px 0;
      font-size:1.55rem;
    }

    .scene-meta{
      margin:0 0 16px 0;
      color:var(--muted);
      line-height:1.5;
    }

    .story{
      min-height:210px;
      white-space:pre-line;
      line-height:1.82;
      font-size:1.06rem;
      margin-bottom:18px;
    }

    .choices{
      display:grid;
      gap:12px;
      margin-top:14px;
    }

    button{
      font:inherit;
    }

    .choice{
      width:100%;
      text-align:left;
      border:1px solid var(--border);
      background:var(--choice);
      color:var(--text);
      border-radius:16px;
      padding:14px 16px;
      cursor:pointer;
      transition:background 0.18s ease, transform 0.12s ease, border-color 0.18s ease;
    }

    .choice:hover{
      background:var(--choiceHover);
      transform:translateY(-1px);
    }

    .character-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(240px,1fr));
      gap:14px;
      margin-top:16px;
    }

    .character-card{
      border:1px solid var(--border);
      background:var(--choice);
      border-radius:18px;
      padding:16px;
      cursor:pointer;
      text-align:left;
      transition:background 0.18s ease, transform 0.12s ease;
    }

    .character-card:hover{
      background:var(--choiceHover);
      transform:translateY(-2px);
    }

    .character-card h3{
      margin:0 0 8px 0;
      font-size:1.2rem;
    }

    .character-card p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
    }

    .footer-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .small-btn{
      border:1px solid var(--border);
      background:transparent;
      color:var(--text);
      border-radius:12px;
      padding:10px 12px;
      cursor:pointer;
    }

    .small-btn:hover{
      background:var(--choice);
    }

    .note{
      margin-top:16px;
      padding-top:14px;
      border-top:1px solid var(--border);
      color:var(--muted);
      line-height:1.6;
      font-size:0.95rem;
    }

    .memory-list{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-top:12px;
    }

    .memory{
      border:1px solid var(--border);
      border-radius:999px;
      padding:6px 10px;
      background:rgba(255,255,255,0.08);
      font-size:0.9rem;
    }

    .symbol{
      letter-spacing:0.08em;
      font-style:italic;
    }

    .broken .choice{
      border-style:dashed;
    }

    .silent .choice{
      font-style:italic;
    }

    @media (max-width:640px){
      .card{ padding:18px; }
      .visual-stage{ height:250px; }
      #charVisual{
        right:10px;
        max-width:52%;
      }
      .story{ min-height:250px; }
    }
  </style>
</head>
<body class="stage-1">
  <div class="container">
    <div class="header">
      <div>
        <h1>Ash of Rome</h1>
        <div class="sub">A visual interactive tragedy inspired by Titus Andronicus. Act 1 is bright and ordered. Act 2 decays into revenge, silence, and inevitability.</div>
      </div>
      <div class="stats">
        <div class="pill" id="actStat">Act —</div>
        <div class="pill" id="charStat">Character —</div>
        <div class="pill" id="violenceStat">Violence 0</div>
        <div class="pill" id="memoryStat">Memories 0/3</div>
        <div class="pill" id="swordStat">Sword Honorable</div>
      </div>
    </div>

    <div class="card" id="card">
      <div class="visual-stage">
        <img id="bgVisual" src="" alt="Scene background">
        <div class="scene-overlay"></div>
        <img id="charVisual" src="" alt="Character">
      </div>
      <div id="game"></div>
    </div>
  </div>

  <script>
    const state = {
      node: "intro",
      act: 0,
      character: null,
      violence: 0,
      memories: [],
      sword: "Honorable",
      log: [],
      laviniaSilent: false
    };

    const memoryNames = {
      honor: "Honor in Rome",
      family: "Family Pride",
      grief: "The Seed of Grief"
    };

    function addMemory(key){
      if(!state.memories.includes(key)){
        state.memories.push(key);
      }
    }

    function updateTheme(){
      let level = 1;

      if (state.act === 1) {
        if (state.violence >= 3) level = 2;
      }

      if (state.act === 2) {
        if (state.violence <= 4) level = 3;
        else if (state.violence <= 8) level = 4;
        else level = 5;
      }

      document.body.className = "stage-" + level;

      const card = document.getElementById("card");
      card.classList.toggle("broken", state.act === 2);
      card.classList.toggle("silent", state.laviniaSilent);
    }

    function updateStats(){
      document.getElementById("actStat").textContent = "Act " + (state.act || "—");
      document.getElementById("charStat").textContent = "Character " + (state.character || "—");
      document.getElementById("violenceStat").textContent = "Violence " + state.violence;
      document.getElementById("memoryStat").textContent = "Memories " + state.memories.length + "/3";
      document.getElementById("swordStat").textContent = "Sword " + state.sword;
    }

    function chooseCharacter(character){
      state.character = character;
      state.node = character === "Titus" ? "titus1" : "lavinia1";
      state.log.push("Character selected: " + character);
      render();
    }

    function choose(index){
      const node = nodes[state.node];
      const choices = typeof node.choices === "function" ? node.choices() : node.choices;
      const selected = choices[index];

      if(selected.violence) state.violence += selected.violence;
      if(selected.memory) addMemory(selected.memory);
      if(selected.sword) state.sword = selected.sword;
      if(selected.silent === true) state.laviniaSilent = true;
      if(selected.note) state.log.push(selected.note);

      state.node = selected.next;
      render();
    }

    function restart(){
      state.node = "intro";
      state.act = 0;
      state.character = null;
      state.violence = 0;
      state.memories = [];
      state.sword = "Honorable";
      state.log = [];
      state.laviniaSilent = false;
      render();
    }

    function getEndingTone(){
      if(state.violence <= 6){
        return "You tried to hold onto dignity. The game let you phrase violence as restraint, justice, or sorrow. It still ended in blood.";
      } else if(state.violence <= 10){
        return "You moved through the story by degrees, each decision a little harsher than the last. The descent felt reasonable while it was happening. That is part of the horror.";
      } else {
        return "You embraced revenge openly. By the end, honor had rotted into appetite. The people on screen no longer resemble civilized Romans as much as wounded creatures acting on instinct.";
      }
    }

    function setVisuals(bg, char){
      const bgVisual = document.getElementById("bgVisual");
      const charVisual = document.getElementById("charVisual");
      bgVisual.src = bg || "";
      charVisual.src = char || "";
      charVisual.style.display = char ? "block" : "none";
    }

    function currentVisual(){
      const brightRome = "https://images.unsplash.com/photo-1552832230-c0197dd311b5?auto=format&fit=crop&w=1400&q=80";
      const forestBright = "https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=1400&q=80";
      const forestDark = "https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=1400&q=80";
      const ruinsDark = "https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=1400&q=80";
      const hallDark = "https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1400&q=80";
      const ashEnding = "https://images.unsplash.com/photo-1511497584788-876760111969?auto=format&fit=crop&w=1400&q=80";

      const titusBright = "https://via.placeholder.com/420x700/e2d7c5/222222?text=Titus";
      const titusMid = "https://via.placeholder.com/420x700/c8b59f/222222?text=Titus";
      const titusDark = "https://via.placeholder.com/420x700/6e6158/f5f0eb?text=Dark+Titus";
      const titusCorrupt = "https://via.placeholder.com/420x700/4e4440/f5f0eb?text=Corrupted+Titus";
      const laviniaBright = "https://via.placeholder.com/420x700/f1e4dc/222222?text=Lavinia";
      const laviniaSilent = "https://via.placeholder.com/420x700/8a7f77/f5f0eb?text=Silent+Lavinia";
      const memoryTitus = "https://via.placeholder.com/420x700/e0d7c8/222222?text=Young+Titus";

      switch(state.node){
        case "intro":
          return { bg: brightRome, char: "" };
        case "titus1":
        case "titus2":
          return { bg: brightRome, char: titusBright };
        case "titus3":
          return { bg: brightRome, char: titusMid };
        case "lavinia1":
          return { bg: brightRome, char: laviniaBright };
        case "lavinia2":
          return { bg: forestBright, char: laviniaBright };
        case "memoryHonor":
        case "memoryFamily":
          return { bg: brightRome, char: memoryTitus };
        case "turningPoint":
          return { bg: forestDark, char: state.character === "Lavinia" ? laviniaBright : titusMid };
        case "act2silence":
          return { bg: ruinsDark, char: state.character === "Lavinia" ? laviniaSilent : titusDark };
        case "act2breaking":
        case "memoryGrief":
          return { bg: ruinsDark, char: titusDark };
        case "bloodDemandsBlood":
          return { bg: ruinsDark, char: titusCorrupt };
        case "feast":
        case "finalChoice":
          return { bg: hallDark, char: titusCorrupt };
        case "ending":
          return { bg: ashEnding, char: "" };
        default:
          return { bg: brightRome, char: "" };
      }
    }

    const nodes = {
      intro: {
        render: () => `
          <h2 class="scene-title">Choose your path into the tragedy</h2>
          <p class="scene-meta">Act 1 represents the better state. Act 2 represents the worse. The player is offered choices, but the ending remains fixed by design.</p>
          <div class="story">Rome still glows beneath a bright sky. Marble walls remain pearl white. Order still appears possible.

You may begin as Titus, a Roman general who looks honorable and rational before revenge consumes him.

Or you may begin as Lavinia, who starts with voice, presence, and freedom before the story reduces her to silence.

No matter what path you choose, the tragedy closes in the same place.</div>

          <div class="character-grid">
            <button class="character-card" data-character="Titus">
              <h3>Titus</h3>
              <p>Begin as a respected general. Your decisions sound measured at first, but gradually become more violent. Your sword begins as a sign of honor and ends as a shameful instrument.</p>
            </button>

            <button class="character-card" data-character="Lavinia">
              <h3>Lavinia</h3>
              <p>Begin with full voice and expression. As the game darkens, your ability to speak and act is taken away. The player feels helplessness instead of control.</p>
            </button>
          </div>
        `
      },

      titus1: {
        act: 1,
        title: "Level 1 — Return to Rome",
        meta: "Act 1. The better state. Ceremony, sunlight, and public honor.",
        text: `The city receives you in warmth and applause. Pearl-white marble catches the light. Gold glints across armor, banners, and temple stone. At your side hangs Virtus, a sword polished so brightly it resembles a promise.

A captured enemy kneels before you and begs for mercy. The crowd watches, eager to see what form Roman strength will take.`,
        choices: [
          { label: "Spare him. Rome shows strength through mercy.", next: "titus2", violence: 1, note: "He is removed from sight and executed anyway in the name of order." },
          { label: "Execute him. Rome must be feared.", next: "titus2", violence: 2, note: "The crowd praises the execution as disciplined necessity." },
          { label: "Let the gods decide his fate.", next: "titus2", violence: 1, note: "Priests take over. Ritual only changes the style of the death." }
        ]
      },

      titus2: {
        act: 1,
        title: "Level 2 — The Throne Decision",
        meta: "Politics still pretends to be reason.",
        text: `Rome turns from victory to succession. Nobles speak of law. Soldiers speak of force. Everyone calls their own wish justice.

You are asked where your support lies. The sky is still bright, but the brightness has begun to look theatrical, as if the city is performing order instead of possessing it.`,
        choices: [
          { label: "Choose the rightful heir. Order must prevail.", next: "titus3", violence: 1, note: "Your choice deepens division under the language of law." },
          { label: "Choose the stronger leader. Rome needs power.", next: "titus3", violence: 2, note: "Practicality hardens into threat almost at once." },
          { label: "Refuse to choose. Let fate unfold.", next: "titus3", violence: 1, note: "Refusal still feeds the same conflict." }
        ]
      },

      titus3: {
        act: 1,
        title: "Level 3 — Seeds of Revenge",
        meta: "The player still believes morality can interrupt the fall.",
        text: `A wrong done to your family becomes impossible to ignore. Public insult, wounded pride, and old grievance begin weaving themselves together.

Virtus still gleams, but now it feels less ceremonial in your hand. Less oath than tool.`,
        choices: [
          { label: "Forgive them. This ends here.", next: "memoryHonor", violence: 1, note: "Mercy is interpreted as weakness. The wound remains open." },
          { label: "Punish them fairly.", next: "memoryHonor", violence: 2, note: "Fairness satisfies no one. Resentment sharpens." },
          { label: "Make them suffer.", next: "memoryHonor", violence: 3, note: "Revenge becomes visible, and therefore easier to continue." }
        ]
      },

      lavinia1: {
        act: 1,
        title: "Level 1 — Bright Rome",
        meta: "Act 1. The better state. Voice, grace, and daylight.",
        text: `You are Lavinia. The city is still beautiful enough to trust. Light pours over the palace halls, and the marble seems too clean for anything monstrous to happen within it.

Your voice still belongs to you. Your body still obeys you. The world still appears answerable to language.`,
        choices: [
          { label: "Speak gently with the court.", next: "lavinia2", violence: 0, note: "Gentleness earns approval, but also attention." },
          { label: "Speak boldly for your family.", next: "lavinia2", violence: 1, note: "Confidence gives you presence, but it also makes you visible." },
          { label: "Remain careful and observant.", next: "lavinia2", violence: 0, note: "Silence delays conflict, but never removes it." }
        ]
      },

      lavinia2: {
        act: 1,
        title: "Level 2 — The Forest Invitation",
        meta: "The last place that still resembles peace.",
        text: `The hunt begins beneath soft sunlight. The forest seems almost painted: green, gold, and harmless. It is the kind of scene that belongs to a story before it knows it is tragic.

Still, something in the air feels slightly wrong. Not enough to name. Enough to feel.`,
        choices: [
          { label: "Stay on the safe path.", next: "memoryFamily", violence: 0, note: "The path narrows. Safety proves decorative." },
          { label: "Explore deeper into the forest.", next: "memoryFamily", violence: 1, note: "Curiosity changes the route, not the result." },
          { label: "Call out for company.", next: "memoryFamily", violence: 0, note: "Your voice echoes back with no protection attached." }
        ]
      },

      memoryHonor: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting fragments of Titus's past.",
        text: `You find a fragment of Titus's memory:

A younger Titus stands before Rome believing honor and identity are the same thing. Virtus rests at his side unstained, ceremonial, almost holy. He still believes violence can remain noble if it serves duty.

The memory fades too quickly to trust.`,
        choices: [
          { label: "Take the fragment and continue.", next: "turningPoint", memory: "honor", note: "You keep the memory, but it changes nothing." }
        ]
      },

      memoryFamily: {
        act: 1,
        title: "Side Quest — Memory Fragment",
        meta: "Collecting fragments of Titus's past.",
        text: `You uncover a fragment of Titus's memory:

There is warmth in the household. Family pride appears solid, almost architectural, like something made of stone. The memory suggests a world in which loyalty still means protection.

Then it cracks apart.`,
        choices: [
          { label: "Take the fragment and walk on.", next: "turningPoint", memory: "family", note: "The forest feels darker after the memory ends." }
        ]
      },

      turningPoint: {
        act: 1,
        title: "Turning Point — The Forest Closes",
        meta: "The line between Act 1 and Act 2.",
        text: `The sunlight thins. Colors lose their warmth. A branch snaps somewhere behind you.

For one last moment, the game pretends that caution, confidence, or speed might save you. Then it reveals what tragedy always reveals: the path was narrowing long before you saw it.`,
        choices: [
          { label: "Who is there?", next: "act2silence", violence: 1, note: "No answer comes that language can meet." },
          { label: "Show yourself.", next: "act2silence", violence: 1, note: "The world responds with force, not clarity." },
          { label: "Run.", next: "act2silence", violence: 1, note: "Movement becomes useless. Escape is denied." }
        ]
      },

      act2silence: {
        act: 2,
        title: "Level 4 — Silence",
        meta: "Act 2. The worse state. Speech collapses. Beauty decays.",
        text: () => {
          if(state.character === "Lavinia"){
            return `You wake in a changed world. The sky has gone dirty. The light is no longer warm but sickly. Brown and grey have replaced ivory and gold.

You try to speak.

Nothing comes.

You try to reach forward.

The absence of your hands becomes the center of the scene.

The game has taken from you the powers it gave you at the start.`;
          } else {
            return `Rome no longer looks clean. The walls seem yellowed, cracked, and tired. News reaches Titus and changes the texture of the entire world.

What was once political injury becomes personal ruin. Somewhere nearby, Lavinia struggles to communicate through grief that language can no longer carry.

Even now, the game still offers choices.`;
          }
        },
        choices: () => {
          if(state.character === "Lavinia"){
            return [
              { label: "[trace symbols in the dirt]", next: "act2breaking", violence: 1, silent: true, note: "They only partly understand what you try to say." },
              { label: "[gesture with your body]", next: "act2breaking", violence: 1, silent: true, note: "They see pain, but not its full meaning." },
              { label: "[stand in stillness]", next: "act2breaking", violence: 0, silent: true, note: "Silence communicates suffering, not explanation." }
            ];
          } else {
            return [
              { label: "Ask what happened.", next: "act2breaking", violence: 1, note: "The question is calm. The answer cannot be." },
              { label: "Demand names.", next: "act2breaking", violence: 2, note: "You leap from grief toward revenge." },
              { label: "Swear revenge at once.", next: "act2breaking", violence: 3, note: "The oath arrives before reason does." }
            ];
          }
        }
      },

      act2breaking: {
        act: 2,
        title: "Level 5 — The Breaking of Titus",
        meta: "Honor remains visible on the outside, but revenge now governs the inside.",
        text: `Virtus no longer looks ceremonial. A dark stain clings to the blade. No matter how it is cleaned, something remains. What began as a symbol of Roman honor now feels heavy, ugly, and shameful.

Titus still appears composed to others. But his decisions no longer come from order. They come from injury.`,
        choices: [
          { label: "We will seek justice.", next: "memoryGrief", violence: 2, sword: "Stained", note: "Justice now sounds like revenge wearing formal language." },
          { label: "We will make them pay.", next: "memoryGrief", violence: 3, sword: "Stained", note: "Balance gives way to retaliation." },
          { label: "They will suffer as we did.", next: "memoryGrief", violence: 4, sword: "Stained", note: "Pain becomes the measure of meaning." }
        ]
      },

      memoryGrief: {
        act: 2,
        title: "Side Quest — Final Memory Fragment",
        meta: "Understanding the tragedy does not stop it.",
        text: `The final fragment opens:

Titus remembers not only duty, but wounded pride. He remembers how quickly honor could become self-righteousness, and how easily self-righteousness could become violence. The seed of revenge was always there. Grief merely watered it.

The memory does not redeem him. It only explains him.`,
        choices: [
          { label: "Take the fragment and continue.", next: "bloodDemandsBlood", memory: "grief", note: "You now understand more, and can prevent nothing." }
        ]
      },

      bloodDemandsBlood: {
        act: 2,
        title: "Level 6 — Blood Demands Blood",
        meta: "There is no nonviolent option now. Only degrees of brutality.",
        text: `An enemy falls within reach. In another kind of story, this might be the moment where mercy breaks the cycle.

In this story, mercy only changes the texture of the same ruin.

The room smells of iron, damp stone, and exhaustion.`,
        choices: [
          { label: "End it quickly.", next: "feast", violence: 2, sword: "Corrupted", note: "Efficiency does not cleanse cruelty." },
          { label: "Force a confession.", next: "feast", violence: 3, sword: "Corrupted", note: "Pain is made to imitate truth." },
          { label: "Make them suffer.", next: "feast", violence: 4, sword: "Corrupted", note: "Cruelty no longer needs an excuse." }
        ]
      },

      feast: {
        act: 2,
        title: "Level 7 — The Feast",
        meta: "Ceremony becomes one more mask for violence.",
        text: `A table is set. Candles shiver. The room pretends to be civilized, but the illusion has become grotesque. The walls are no longer pearl white. They have turned stained and dull, as if the building itself has absorbed the corruption around it.

This is revenge at its ugliest: not open force alone, but force dressed in ritual and politeness.`,
        choices: [
          { label: "Remain calm.", next: "finalChoice", violence: 2, note: "Cold control makes the horror sharper." },
          { label: "Taunt them.", next: "finalChoice", violence: 3, note: "Words become blades before the blade is drawn." },
          { label: "Reveal the truth slowly.", next: "finalChoice", violence: 4, note: "Delay becomes a form of cruelty." }
        ]
      },

      finalChoice: {
        act: 2,
        title: "Level 8 — No Choice Left",
        meta: "The final illusion of agency.",
        text: `Bodies, grief, rage, and consequence surround you. The tragedy is nearly complete.

The game offers one final decision, not because it can save anyone, but because tragedy loves to imitate freedom even as it destroys it.

Virtus now feels nothing like honor. It feels like history reduced to a weapon.`,
        choices: [
          { label: "Stop.", next: "ending", violence: 1, note: "You hesitate. The violence continues anyway." },
          { label: "Finish it.", next: "ending", violence: 2, note: "You move without the comfort of illusion." }
        ]
      },

      ending: {
        act: 2,
        render: () => `
          <h2 class="scene-title">Ending — Ash</h2>
          <p class="scene-meta">All paths end in tragedy. What changes is only the tone of the descent.</p>

          <div class="story">The sky has turned grey and ugly. The brightness of Act 1 is gone. Pearl white walls have become brown, dull, and stained. Rome no longer looks like civilization at peace with itself. It looks like the ruins of people who called their violence justice until they could no longer tell the difference.

${getEndingTone()}

${state.character === "Lavinia"
? "Lavinia's path makes the loss of agency painfully literal. She begins with voice and ends in forced silence. The player experiences helplessness instead of heroism."
: "Titus's path makes corruption gradual. He begins as an honorable Roman general and ends as a man who has taught himself to call revenge by nobler names."}

${state.memories.length === 3
? "You collected all three memory fragments. Together they reveal that the tragedy was not a sudden break, but a slow exposure of what was already present beneath the surface."
: "You did not collect every memory fragment. Even so, the ending remains unchanged. The story withholds detail, but not fate."}

No matter what choices you made, the story ends the same way: revenge consumes honor, violence replaces speech, and human beings descend toward the animal logic of hurt, retaliation, and ruin.</div>

          <div class="memory-list">
            ${state.memories.length
              ? state.memories.map(m => `<div class="memory">${memoryNames[m]}</div>`).join("")
              : `<div class="memory">No memory fragments collected</div>`
            }
          </div>

          <div class="footer-row">
            <button class="small-btn" id="restartBtn">Play again</button>
          </div>

          <div class="note">Final violence score: ${state.violence}. Final sword state: ${state.sword}. The ending is fixed by design.</div>
        `
      }
    };

    function render(){
      const game = document.getElementById("game");
      const node = nodes[state.node];

      if(node.act) state.act = node.act;

      if(node.render){
        game.innerHTML = node.render();
      } else {
        const text = typeof node.text === "function" ? node.text() : node.text;
        const choices = typeof node.choices === "function" ? node.choices() : node.choices;

        game.innerHTML = `
          <h2 class="scene-title">${node.title}</h2>
          <p class="scene-meta">${node.meta}</p>
          <div class="story">${text}</div>
          <div class="choices">
            ${choices.map((choice, index) => `
              <button class="choice" data-index="${index}">
                ${state.laviniaSilent && state.character === "Lavinia" && state.act === 2
                  ? `<span class="symbol">${choice.label}</span>`
                  : choice.label}
              </button>
            `).join("")}
          </div>
          <div class="note">${state.log.length ? state.log[state.log.length - 1] : "Choose a path."}</div>
        `;
      }

      const visual = currentVisual();
      setVisuals(visual.bg, visual.char);

      updateStats();
      updateTheme();
      bindEvents();
    }

    function bindEvents(){
      document.querySelectorAll("[data-character]").forEach(btn => {
        btn.addEventListener("click", () => {
          chooseCharacter(btn.getAttribute("data-character"));
        });
      });

      document.querySelectorAll(".choice").forEach(btn => {
        btn.addEventListener("click", () => {
          choose(Number(btn.getAttribute("data-index")));
        });
      });

      const restartBtn = document.getElementById("restartBtn");
      if(restartBtn){
        restartBtn.addEventListener("click", restart);
      }
    }

    render();
  </script>
</body>
</html>
